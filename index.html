    window.addFund = function() {
        const type = document.getElementById('fundType').value;
        const date = document.getElementById('fundDate').value; 
        const amt = parseFloat(document.getElementById('fundAmt').value); 
        let desc = ""; let contributor = "";
        
        if (type === 'in') {
            contributor = document.getElementById('fundContributor').value;
            if(!contributor) return customAlert("Select a contributor.");
            desc = "Contribution";
        } else {
            desc = document.getElementById('fundDesc').value;
            if(!desc) return customAlert("Enter expense description.");
        }

        if (isNaN(amt) || amt <= 0 || !date) return customAlert("Enter valid date and amount.");
        
        const funds = getDB('funds'); 
        funds.push({ id: generateId(), date, desc, amount: amt, type, contributor }); 
        setDB('funds', funds); 
        addNotification(`💰 New ${type==='in'?'Income':'Expense'} Recorded: ₱${amt}`);
        loadModule('Funds');
    }
    window.deleteFund = function(id) { 
        customConfirm("Are you sure you want to delete this transaction?", () => {
            setDB('funds', getDB('funds').filter(f => f.id !== id)); loadModule('Funds'); 
        });
    }

    // --- RESOURCES ---
    function renderResources(container) {
        const res = getDB('resources'); let html = '';
        
        const allUsedTags = [...new Set(res.flatMap(r => r.tags || []))];
        const allTags = [...new Set([...defaultResTags, ...allUsedTags])];
        const dlTags = allTags.map(t => `<div class="tag-chip" onclick="appendResTag('${t}')">+ ${t}</div>`).join('');

        if (isAdmin()) {
            html += `
            <div class="glass admin-panel" id="resAdminPanel">
                <h4 style="margin-top:0; color:var(--accent)" id="resFormTitle">Admin: Add Resource</h4>
                <div class="flex-row" style="margin-bottom:10px;">
                    <input id="resTitle" placeholder="Resource Title" style="flex:2;">
                    <select id="resType" style="flex:1;" onchange="
                        document.getElementById('resUrl').style.display = this.value === 'link' ? 'block' : 'none';
                        document.getElementById('resFile').style.display = this.value === 'file' ? 'block' : 'none';
                    ">
                        <option value="link">Web Link</option>
                        <option value="file">Upload File</option>
                    </select>
                </div>
                <div class="flex-row" style="margin-bottom:10px;">
                    <input id="resUrl" placeholder="Target URL" style="flex:2; display:block; margin:0;">
                    <input id="resFile" type="file" style="flex:2; display:none; margin:0; padding: 9px;" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,.zip,.rar">
                    <input id="resDesc" placeholder="Short Description" style="flex:2; margin:0;">
                </div>
                <div class="flex-row">
                    <input id="resTags" placeholder="Tags (Comma separated, e.g. Survey, Docs)" style="flex:3; margin:0;">
                    <button id="resSubmitBtn" onclick="addResource()" style="flex:1; margin:0;">Add Resource</button>
                    <button id="resCancelBtn" onclick="cancelEditResource()" style="flex:0.5; margin:0; display:none; background:rgba(255,255,255,0.1);">Cancel</button>
                </div>
                <div style="display:flex; gap:5px; margin-top:10px; flex-wrap:wrap;">
                    <span style="font-size:10px; color:var(--text-muted); margin-right:5px; line-height:20px;">Quick Tags:</span>
                    ${dlTags}
                </div>
            </div>`;
        }

        const filterChips = allTags.map(t => `
            <div class="tag-chip ${resActiveTag === t ? 'active' : ''}" onclick="setResTag('${t}')">${t}</div>
        `).join('');

        html += `
        <div class="glass card">
            <div style="display:flex; gap:10px; margin-bottom: 15px;">
                <input class="res-search" placeholder="🔍 Search resources by title or description..." value="${resSearchTerm}" onkeyup="setResSearch(this.value)" id="resSearchInput">
            </div>
            <div style="display:flex; gap:5px; margin-bottom: 20px; flex-wrap:wrap;">
                <div class="tag-chip ${resActiveTag === null ? 'active' : ''}" onclick="setResTag(null)">All</div>
                ${filterChips}
            </div>
            <div style="display:flex; flex-direction:column; gap:8px;">
        `;

        let filteredRes = res.filter(r => {
            const matchesSearch = !resSearchTerm || r.title.toLowerCase().includes(resSearchTerm) || r.desc.toLowerCase().includes(resSearchTerm);
            const matchesTag = !resActiveTag || (r.tags && r.tags.includes(resActiveTag));
            return matchesSearch && matchesTag;
        });

        if (filteredRes.length === 0) {
            html += `<p style="color:var(--text-muted); text-align:center;">No resources found.</p>`;
        } else {
            filteredRes.forEach(r => {
                const isFile = r.type === 'file';
                const tagDisplay = (r.tags || []).map(t => `<span style="background:rgba(255,255,255,0.1); padding:2px 4px; border-radius:4px; font-size:9px; margin-right:4px;">${t}</span>`).join('');
                
                html += `
                    <div style="display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; padding: 10px; background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 8px;">
                        <div style="display:flex; align-items:center; flex:1; min-width: 200px;">
                            <div style="width: 30px; height: 30px; border-radius: 6px; background: rgba(34,211,238,0.1); color: var(--secondary); display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 16px; margin-right: 12px; flex-shrink:0;">${isFile ? '📄' : '🔗'}</div>
                            <div>
                                <div style="font-weight:bold; font-size:13px; color:var(--text);">${r.title}</div>
                                <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">${r.desc} ${isFile && r.fileName ? `(${r.fileName})` : ''}</div>
                                <div style="margin-top:4px;">${tagDisplay}</div>
                            </div>
                        </div>
                        <div style="display:flex; gap:6px; justify-content: flex-end; width:100%; max-width: max-content; margin-top: 5px;">
                            ${isFile 
                                ? `<button class="success" onclick="downloadFile('${r.url}', '${r.fileName || 'resource'}')" style="width:auto; padding:6px 12px; margin:0; font-size:11px;">Download</button>`
                                : `<button class="success" onclick="window.open('${r.url}', '_blank')" style="width:auto; padding:6px 12px; margin:0; font-size:11px;">Open</button>`
                            }
                            ${isAdmin() ? `
                                <button class="icon-btn" style="background:rgba(255,255,255,0.1); color:var(--text); padding: 6px 12px; border-radius:8px; font-size:11px;" onclick="editResource(${r.id})">Edit</button>
                                <button class="danger" onclick="deleteResource(${r.id})" style="width:auto; padding:6px 12px; margin:0; font-size:11px;">Drop</button>
                            ` : ''}
                        </div>
                    </div>`;
            });
        }
        html += `</div></div>`; container.innerHTML = html;
        
        if(resSearchTerm !== '') {
            const el = document.getElementById('resSearchInput');
            if(el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
        }
    }
    
    window.setResSearch = (val) => { 
        resSearchTerm = val.toLowerCase(); 
        renderResources(document.getElementById('contentArea')); 
    }
    window.setResTag = (tag) => { resActiveTag = resActiveTag === tag ? null : tag; loadModule('Resources', true); }
    window.appendResTag = (tag) => {
        const input = document.getElementById('resTags');
        let current = input.value.split(',').map(t=>t.trim()).filter(t=>t);
        if(!current.includes(tag)) current.push(tag);
        input.value = current.join(', ');
    }

    window.editResource = function(id) {
        const r = getDB('resources').find(x => x.id === id);
        if(!r) return;
        editingResourceId = id;
        document.getElementById('resTitle').value = r.title;
        document.getElementById('resType').value = r.type;
        
        if(r.type === 'link') {
            document.getElementById('resUrl').style.display = 'block';
            document.getElementById('resFile').style.display = 'none';
            document.getElementById('resUrl').value = r.url;
        } else {
            document.getElementById('resUrl').style.display = 'none';
            document.getElementById('resFile').style.display = 'block';
        }
        
        document.getElementById('resDesc').value = r.desc;
        document.getElementById('resTags').value = (r.tags || []).join(', ');
        
        document.getElementById('resFormTitle').innerText = "Admin: Edit Resource";
        document.getElementById('resSubmitBtn').innerText = "Update";
        document.getElementById('resCancelBtn').style.display = "block";
        document.getElementById('resAdminPanel').scrollIntoView({ behavior: 'smooth' });
    }

    window.cancelEditResource = function() { editingResourceId = null; loadModule('Resources'); }

    window.addResource = async function() {
        const title = document.getElementById('resTitle').value; 
        const type = document.getElementById('resType').value;
        const desc = document.getElementById('resDesc').value;
        const tagsStr = document.getElementById('resTags').value;
        const tags = tagsStr.split(',').map(t=>t.trim()).filter(t=>t);

        if(!title) return customAlert("Title is required.");

        let res = getDB('resources');
        let existing = editingResourceId ? res.find(r => r.id === editingResourceId) : null;

        if (type === 'link') {
            const url = document.getElementById('resUrl').value;
            if(!url) return customAlert("URL is required.");
            
            if (existing) {
                existing.title = title; existing.type = type; existing.url = url; existing.desc = desc; existing.tags = tags;
            } else {
                res.push({ id: generateId(), title, type, url, desc, tags }); 
            }
            editingResourceId = null;
            setDB('resources', res); 
            addNotification(`🔗 New Resource Added: ${title}`);
            loadModule('Resources');
        } else {
            const fileInput = document.getElementById('resFile');
            if(!fileInput.files[0] && !existing) return customAlert("Please select a file.");
            
            if (fileInput.files[0]) {
                const file = fileInput.files[0];
                if(file.size > 250000) return customAlert("File is too large for database storage. Use Web Link instead.");
                
                document.getElementById('syncStatus').style.display = "block";
                document.getElementById('syncStatus').innerText = "⏳ Processing file...";
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (existing) {
                        existing.title = title; existing.type = type; existing.url = e.target.result; existing.desc = desc; existing.fileName = file.name; existing.tags = tags;
                    } else {
                        res.push({ id: generateId(), title, type, url: e.target.result, desc, fileName: file.name, tags }); 
                    }
                    editingResourceId = null;
                    setDB('resources', res); 
                    addNotification(`📄 New File Added: ${title}`);
                    loadModule('Resources');
                };
                reader.readAsDataURL(file);
            } else if (existing) {
                existing.title = title; existing.type = type; existing.desc = desc; existing.tags = tags;
                editingResourceId = null;
                setDB('resources', res); loadModule('Resources');
            }
        }
    }
    window.deleteResource = function(id) { 
        customConfirm("Are you sure you want to drop this resource?", () => {
            setDB('resources', getDB('resources').filter(r => r.id !== id)); loadModule('Resources'); 
        });
    }

                                ${isAdmin() ? `
                                    <div style="display:flex; gap:5px;">
                                        <button class="success" style="padding: 4px; font-size: 10px; margin:0; flex:1;" onclick="event.stopPropagation(); toggleFeatured(${firstImg.id})">${firstImg.featured ? 'Unfeature' : 'Feature'}</button>
                                        <button class="danger" style="padding: 4px; font-size: 10px; margin:0;" onclick="event.stopPropagation(); deletePhoto(${firstImg.id})">Del</button>
                                    </div>
                                ` : ''}
                            </div>
                        </div>`;
                    } else {
                        // Standard single item
                        const safeCaption = (g.caption || '').replace(/'/g, "\\'");
                        html += `
                        <div class="gallery-item" onclick="openLightbox('${g.url}', '${safeCaption}')">
                            ${g.featured ? `<div class="feat-badge">⭐ Featured</div>` : ''}
                            <img src="${g.url}" alt="${g.caption}" onerror="this.src='https://via.placeholder.com/300x300/1E293B/ef4444?text=Broken+Link'">
                            <div class="gallery-caption">
                                <div style="margin-bottom: ${isAdmin() ? '5px' : '0'};">${g.caption} ${isAll ? ` <span style="color:var(--text-muted); font-size:9px;">(${g.folder||'Uncategorized'})</span>` : ''}</div>
                                ${isAdmin() ? `
                                    <div style="display:flex; gap:5px;">
                                        <button class="success" style="padding: 4px; font-size: 10px; margin:0; flex:1;" onclick="event.stopPropagation(); toggleFeatured(${g.id})">${g.featured ? 'Unfeature' : 'Feature'}</button>
                                        <button class="danger" style="padding: 4px; font-size: 10px; margin:0;" onclick="event.stopPropagation(); deletePhoto(${g.id})">Del</button>
                                    </div>
                                ` : ''}
                            </div>
                        </div>`;
                    }
                });
                html += `</div>`;
            }
        }
        container.innerHTML = html;
    }

    // Lightbox Logic & Swiper
    let lightboxImages = [];
    let currentLightboxIndex = 0;
    let touchStartX = 0;

    window.openLightbox = function(url, caption, batchId = null) {
        const gal = getDB('gallery');
        if (batchId && batchId !== 'undefined' && batchId !== 'null') {
            lightboxImages = gal.filter(g => g.batchId === batchId);
        } else {
            lightboxImages = [{url, caption}];
        }
        
        currentLightboxIndex = lightboxImages.findIndex(img => img.url === url);
        if(currentLightboxIndex === -1) currentLightboxIndex = 0;
        
        updateLightboxUI();
        document.getElementById('lightboxModal').style.display = 'flex';
    }

    function updateLightboxUI() {
        if(!lightboxImages.length) return;
        const imgObj = lightboxImages[currentLightboxIndex];
        document.getElementById('lightboxImg').src = imgObj.url;
        
        let counterTxt = lightboxImages.length > 1 ? ` (${currentLightboxIndex + 1}/${lightboxImages.length})` : '';
        document.getElementById('lightboxCaption').innerText = imgObj.caption + counterTxt;
    }

    window.closeLightbox = function() {
        document.getElementById('lightboxModal').style.display = 'none';
        document.getElementById('lightboxImg').src = '';
    }
    
    // Swipe Events for Lightbox
    const lbModal = document.getElementById('lightboxModal');
    lbModal.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
    lbModal.addEventListener('touchend', e => {
        if (lightboxImages.length <= 1) return;
        const touchEndX = e.changedTouches[0].screenX;
        if (touchEndX < touchStartX - 50 && currentLightboxIndex < lightboxImages.length - 1) {
            currentLightboxIndex++; updateLightboxUI();
        } else if (touchEndX > touchStartX + 50 && currentLightboxIndex > 0) {
            currentLightboxIndex--; updateLightboxUI();
        }
    });

    window.openGalleryFolder = function(fName) { currentGalleryFolder = fName; loadModule('Gallery', true); }
    window.closeGalleryFolder = function() { currentGalleryFolder = null; loadModule('Gallery', true); }
    
    window.toggleFeatured = function(id) {
        let gal = getDB('gallery');
        const photo = gal.find(g => g.id === id);
        if(photo) {
            photo.featured = !photo.featured;
            setDB('gallery', gal);
            loadModule('Gallery', true);
        }
    }

    window.addPhoto = async function() {
        const fileInput = document.getElementById('galFile');
        const urlInput = document.getElementById('galUrl');
        const caption = document.getElementById('galCap').value || 'Untitled';
        const folder = document.getElementById('galFolder').value.trim() || 'Uncategorized';
        
        const gal = getDB('gallery');

        if (urlInput && urlInput.value.trim() !== '') {
            gal.push({ id: generateId(), url: urlInput.value.trim(), caption: caption, folder: folder, featured: false, batchId: null });
            currentGalleryFolder = folder;
            setDB('gallery', gal); 
            addNotification(`🖼️ New Photo Added: ${caption}`);
            loadModule('Gallery');
            return;
        }

        if(fileInput && fileInput.files.length > 0) {
            try {
                const batchId = 'batch_' + Date.now();
                document.getElementById('syncStatus').style.display = "block";
                
                for(let i=0; i < fileInput.files.length; i++) {
                    const file = fileInput.files[i];
                    document.getElementById('syncStatus').innerText = `⏳ Uploading (${i+1}/${fileInput.files.length})...`;
                    
                    const formData = new FormData();
                    formData.append("file", file);
                    formData.append("upload_preset", "dadevs_preset");
                    
                    const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { 
                        method: "POST", body: formData 
                    });
                    
                    const data = await response.json();
                    if (!data.secure_url) throw new Error(data.error?.message || "Cloudinary API Rejected");
                    
                    let finalCaption = fileInput.files.length > 1 ? `${caption} (${i+1})` : caption;
                    gal.push({ id: generateId(), url: data.secure_url, caption: finalCaption, folder: folder, featured: false, batchId: fileInput.files.length > 1 ? batchId : null });
                }
                
                currentGalleryFolder = folder;
                setDB('gallery', gal); 
                addNotification(`🖼️ New Photos Added to ${folder}`);
                loadModule('Gallery');
                document.getElementById('syncStatus').innerText = "🟢 Sync Complete";
            } catch(e) {
                customAlert("Cloudinary Upload Failed. Please check if 'dadevs_preset' is set to Unsigned.\n\nFallback: Upload the photo to Discord or Drive and paste the link in Option 2.");
                document.getElementById('syncStatus').innerText = "🔴 Failed";
            }
            return;
        }
        customAlert("Please either select a file OR paste an image link.");
    }
    
    window.deletePhoto = function(id) { 
        customConfirm("Are you sure you want to delete this photo?", () => {
            let gal = getDB('gallery');
            const photo = gal.find(g => g.id === id);
            const targetFolder = photo ? (photo.folder || 'Uncategorized') : null;
            
            // If it's part of a batch and admin clicks delete, we'll just delete the single photo (or you can modify to filter by batchId if you prefer)
            gal = gal.filter(g => g.id !== id);
            
            if (targetFolder && currentGalleryFolder !== 'ALL_PHOTOS' && !gal.some(g => (g.folder || 'Uncategorized') === targetFolder)) {
                currentGalleryFolder = null; 
            }
            
            setDB('gallery', gal); loadModule('Gallery', true); 
        });
    }

    // --- SECURITY OVERRIDES ---
    document.addEventListener("contextmenu", e => e.preventDefault());
    document.addEventListener("keydown", e => {
        if (e.key === "F12" || (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) || (e.ctrlKey && e.key === "U")) {
            e.preventDefault(); customAlert("DaDevs Security Protocol: Developer Tools Locked.");
        }
    });

    window.onload = async () => { await initApp(); };
</script>
</body>

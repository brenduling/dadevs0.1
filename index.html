<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0F172A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DaDevs 0.1 - Workspace</title>
    <style>
        :root {
            --bg-1: #0F172A; --bg-2: #1E293B;
            --primary: #2D2A8C; --secondary: #22D3EE;
            --accent: #8B5CF6; --text: #f8fafc;
            --glass-bg: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
            
            /* Member Colors */
            --c-chua: #3b82f6;
            --c-vince: #8b5cf6;
            --c-tanya: #ec4899;
            --c-bren: #10b981;
            --c-ruth: #f97316;
            --c-team: #64748b;
        }
        body {
            margin: 0; font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
            color: var(--text); overflow: hidden; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: rgba(34, 211, 238, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(34, 211, 238, 0.6); }

        .glass {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .neon { color: var(--secondary); text-shadow: 0 0 8px rgba(34,211,238,0.4); }
        .accent { color: var(--accent); }
        
        .dadevs-logo {
            width: 50px; height: 50px; flex-shrink: 0; transition: transform 0.3s ease;
        }
        .dadevs-logo:hover { transform: scale(1.05) rotate(5deg); }
        
        /* Login */
        #login { padding: 40px; text-align: center; width: 320px; transition: opacity 0.5s; max-width: 90%; }
        input, select, textarea {
            width: 100%; padding: 10px 12px; margin: 8px 0; background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border); color: var(--text);
            border-radius: 8px; box-sizing: border-box; outline: none; font-family: inherit;
        }
        input:disabled, textarea:disabled { background: rgba(0,0,0,0.5); color: #666; cursor: not-allowed; border-color: rgba(255,255,255,0.05); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        input:focus:not(:disabled), select:focus, textarea:focus { border-color: var(--secondary); }
        button {
            width: 100%; padding: 12px; background: var(--accent); color: var(--text);
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
            margin-top: 5px;
        }
        button:hover { background: var(--primary); box-shadow: 0 0 15px rgba(34,211,238,0.35); }
        button.danger { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; }
        button.danger:hover { background: #ef4444; color: #fff; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        
        /* App Layout */
        #app { display: none; width: 100vw; height: 100vh; flex-direction: row; }
        
        /* Sidebar */
        #sidebar {
            width: 250px; display: flex; flex-direction: column; border-right: 1px solid var(--glass-border);
            border-radius: 0; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
            background: rgba(15, 23, 42, 0.5); flex-shrink: 0; overflow: hidden;
        }
        #sidebar.collapsed { width: 75px; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; height: 85px; box-sizing: border-box; border-bottom: 1px solid var(--glass-border); white-space: nowrap; }
        #sidebar.collapsed .sidebar-header { justify-content: center; padding: 20px 0; }
        #sidebar.collapsed .brand-text { display: none; }
        .toggle-btn { background: none; border: none; color: var(--text); padding: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 5px; transition: 0.2s; margin: 0; width: auto; }
        .toggle-btn:hover { color: var(--secondary); background: rgba(255,255,255,0.1); box-shadow: none; }
        .nav-links { flex: 1; padding: 15px 10px; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; gap: 8px; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; white-space: nowrap; font-weight: 500; font-size: 14px; }
        .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
        .nav-item:hover, .nav-item.active { background: rgba(34,211,238,0.1); color: var(--secondary); transform: translateX(5px); }
        #sidebar.collapsed .nav-item { justify-content: center; padding: 12px 0; transform: none; }
        #sidebar.collapsed .nav-item:hover { transform: translateY(-2px); }
        #sidebar.collapsed .nav-text { display: none; }
        .sidebar-footer { padding: 20px; border-top: 1px solid var(--glass-border); white-space: nowrap; display: flex; flex-direction: column; gap: 15px; }
        #sidebar.collapsed .sidebar-footer { padding: 20px 0; align-items: center; }
        #sidebar.collapsed .user-info { display: none; }
        .logout-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin: 0; width: 100%; }
        .logout-btn:hover { background: #ef4444; color: #fff; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        #sidebar.collapsed .logout-btn { padding: 10px; width: auto; border: none; background: transparent; }
        #sidebar.collapsed .logout-btn-text { display: none; }

        /* Main Content */
        #main { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; transition: 0.3s; min-width: 0; }
        .card { padding: 20px; margin-bottom: 20px; transition: transform 0.3s; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; } 
        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; } 
        
        .contact-link { display: flex; justify-content: center; align-items: center; width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .contact-link:hover { background: var(--secondary); color: #000; transform: translateY(-3px); border-color: var(--secondary); box-shadow: 0 4px 10px rgba(34,211,238,0.4); }

        /* Sprint Elements */
        .sprint-accordion { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
        .sprint-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: rgba(34, 211, 238, 0.05); transition: 0.2s; }
        .sprint-header:hover { background: rgba(34, 211, 238, 0.1); }
        .sprint-details { padding: 15px; border-top: 1px solid var(--glass-border); display: none; font-size: 13px; color: #ccc; }
        
        .kanban-board { display: flex; gap: 20px; min-height: 400px; overflow-x: auto; padding-bottom: 20px;}
        .kanban-col { flex: 1; min-width: 280px; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 15px; border: 1px solid var(--glass-border); }
        .kanban-col h3 { margin-top: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--secondary); border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
        .task-card { background: var(--glass-bg); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--glass-border); transition: 0.2s; cursor: grab; position: relative;}
        .task-card:hover { border-color: var(--secondary); transform: translateY(-2px); }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #ef4444; cursor: pointer; padding: 0; width: auto; font-size: 12px; }
        
        .admin-panel { padding: 20px; margin-bottom: 20px; border-left: 4px solid var(--accent); }
        .admin-panel .flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        /* Timeline Table + Gantt */
        .phase-header { background: rgba(34, 211, 238, 0.15); padding: 10px 15px; border-radius: 8px; font-weight: bold; color: var(--secondary); cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid rgba(34, 211, 238, 0.3); }
        .phase-header:hover { background: rgba(34, 211, 238, 0.25); }
        .timeline-table { width: 100%; border-collapse: collapse; min-width: 900px; }
        .timeline-table th { text-align: left; padding: 10px; font-size: 11px; color: #aaa; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); }
        .timeline-table td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; vertical-align: middle; }
        .gantt-track { background: rgba(0,0,0,0.3); height: 24px; border-radius: 12px; position: relative; overflow: hidden; border: 1px solid var(--glass-border); width: 250px; }
        .gantt-bar { position: absolute; height: 100%; border-radius: 12px; display: flex; align-items: center; font-size: 11px; font-weight: bold; color: #fff; box-sizing: border-box; overflow: hidden; transition: 0.3s; box-shadow: 0 0 10px rgba(34,211,238,0.4);}
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .gallery-item { position: relative; border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-border); aspect-ratio: 1 / 1; transition: 0.3s; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .gallery-item:hover img { transform: scale(1.05); }
        .gallery-caption { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); padding: 10px; font-size: 12px; backdrop-filter: blur(5px); }
        .folder-overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; cursor: pointer; transition: 0.3s;}
        .gallery-item:hover .folder-overlay { background: rgba(15, 23, 42, 0.5); }
        
        /* Resource Search & Tags */
        .res-search { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: #fff; border-radius: 8px; margin-bottom: 15px; outline: none; }
        .res-search:focus { border-color: var(--secondary); box-shadow: 0 0 10px rgba(34,211,238,0.2); }
        .tag-chip { background: rgba(34,211,238,0.1); color: var(--secondary); padding: 4px 12px; border-radius: 12px; font-size: 11px; cursor: pointer; border: 1px solid rgba(34,211,238,0.3); transition: 0.2s; white-space: nowrap; user-select: none; }
        .tag-chip:hover, .tag-chip.active { background: var(--secondary); color: #000; }
        .resource-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; margin-bottom: 10px; transition: 0.2s;}
        .resource-item:hover { border-color: rgba(34,211,238,0.3); transform: translateX(2px);}
        .resource-icon { width: 40px; height: 40px; border-radius: 8px; background: rgba(34,211,238,0.1); color: var(--secondary); display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 20px; margin-right: 15px; flex-shrink:0;}

        /* Calendar */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-top: 15px; }
        .cal-header { font-weight: bold; color: var(--secondary); font-size: 12px; padding-bottom: 10px; }
        .cal-day { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px; border: 1px solid var(--glass-border); min-height: 50px; position: relative; display: flex; flex-direction: column; align-items: center;}
        .cal-day.empty { background: transparent; border: none; }
        .cal-day.today { border-color: var(--secondary); background: rgba(34,211,238,0.1); }
        .cal-event-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; }
        .event-meeting { background: #3b82f6; box-shadow: 0 0 5px #3b82f6;}
        .event-overnight { background: #8b5cf6; box-shadow: 0 0 5px #8b5cf6;}
        .event-defense { background: #ef4444; box-shadow: 0 0 5px #ef4444;}
        .event-birthday { background: #f59e0b; box-shadow: 0 0 5px #f59e0b;}
        .event-other { background: #10b981; box-shadow: 0 0 5px #10b981;}
        .event-list-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--glass-border);}
        
        button.icon-btn { width: auto; padding: 8px 15px; background: rgba(255,255,255,0.1); margin: 0; }
        button.icon-btn:hover { background: var(--secondary); color: #000; }

        @media (max-width: 1200px) { .grid-5 { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 992px) { #main { padding: 20px; } .grid-3 { grid-template-columns: 1fr; } }
        @media (max-width: 768px) {
            #sidebar { width: 200px; } #sidebar.collapsed { width: 65px; } #main { padding: 15px; } 
            .grid-2 { grid-template-columns: 1fr; } .grid-5 { grid-template-columns: repeat(2, 1fr); }
            .admin-panel .flex-row { flex-direction: column; align-items: stretch; } .admin-panel .flex-row > * { width: 100%; margin-bottom: 5px; }
            .gantt-row { flex-direction: column; align-items: flex-start; } .gantt-label { width: 100%; margin-bottom: 5px; } .gantt-track { width: 100%; margin-bottom: 10px; }
            .resource-item { flex-direction: column; align-items: flex-start; gap: 15px; } .resource-item > div:last-child { width: 100%; justify-content: space-between; }
        }
    </style>
</head>

    function compressImage(file, maxSize = 800, quality = 0.6) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    if (width > height && width > maxSize) { height *= maxSize / width; width = maxSize; } 
                    else if (height > maxSize) { width *= maxSize / height; height = maxSize; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    };

    const defaultResTags = ["Sheets", "Title Defense", "Survey", "Docs"];

    let currentUser = null;

    let currentGalleryFolder = null;

    let editingMemberId = null;
    let resSearchTerm = '';

    // V15 Reset for Contact Details feature
    const DB_KEY = 'dadevs_db_v15';

    async function initDB(manualSync = false) {
        if (localStorage.getItem('dd_version') !== 'v15') {
            localStorage.removeItem('dadevs_db_v14'); localStorage.setItem('dd_version', 'v15');
        }
        if (ENABLE_CLOUD_SYNC && JSONBIN_BIN_ID && JSONBIN_MASTER_KEY) {
            document.getElementById('syncStatus').innerText = manualSync ? "☁️ Manual Syncing..." : "☁️ Syncing...";
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest?t=${new Date().getTime()}`, { 
                    method: 'GET', headers: { 'X-Master-Key': JSONBIN_MASTER_KEY, 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }, cache: 'no-store' 
                });
                const data = await res.json();
                if (data.record) {
                    appDB = { ...appDB, ...data.record };
                    if(!appDB.sprints) appDB.sprints = [];
                    if(!appDB.members || appDB.members.length === 0) appDB.members = [
                        { id: "Bren", fullName: "Bren", role: "Team Lead", birthday: "", messenger: "", github: "", gmail: "", phone: "" },
                        { id: "Chua", fullName: "Chua", role: "Developer", birthday: "", messenger: "", github: "", gmail: "", phone: "" },
                        { id: "Tanya", fullName: "Tanya", role: "Developer", birthday: "", messenger: "", github: "", gmail: "", phone: "" },
                        { id: "Vince", fullName: "Vince", role: "Developer", birthday: "", messenger: "", github: "", gmail: "", phone: "" },
                        { id: "Ruth", fullName: "Ruth", role: "Developer", birthday: "", messenger: "", github: "", gmail: "", phone: "" }
                    ];
                    localStorage.setItem(DB_KEY, JSON.stringify(appDB));
                }
                document.getElementById('syncStatus').innerText = "🟢 Online";
                if (manualSync) { loadModule(currentModule, true); alert("System Synced Successfully!"); }
            } catch(e) { 
                console.error("Sync error", e); document.getElementById('syncStatus').innerText = "🔴 Offline (Using Cache)"; 
                const local = localStorage.getItem(DB_KEY); if (local) appDB = JSON.parse(local);
            }
        } else {
            const local = localStorage.getItem(DB_KEY); if (local) appDB = JSON.parse(local);
            document.getElementById('syncStatus').innerText = "💾 Local Mode";
        }
    }

    async function saveDB() {
        if (ENABLE_CLOUD_SYNC && JSONBIN_BIN_ID && JSONBIN_MASTER_KEY && isAdmin()) {
            document.getElementById('syncStatus').innerText = "⏳ Saving...";
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_MASTER_KEY }, body: JSON.stringify(appDB)
                });
                document.getElementById('syncStatus').innerText = "🟢 Saved to Cloud";
                localStorage.setItem(DB_KEY, JSON.stringify(appDB)); 
            } catch(e) { 
                console.error("Save error", e); document.getElementById('syncStatus').innerText = "🔴 Save Failed"; 
                localStorage.setItem(DB_KEY, JSON.stringify(appDB)); 
            }
        } else {
            localStorage.setItem(DB_KEY, JSON.stringify(appDB));
        }
    }

    const getDB = (table) => appDB[table] || [];
    const setDB = (table, data) => { appDB[table] = data; saveDB(); };
    const generateId = () => Math.floor(Math.random() * 1000000);
    const isAdmin = () => currentUser && currentUser.role === 'admin';

    window.addEventListener('storage', (e) => {
        if (e.key === DB_KEY && currentUser && !ENABLE_CLOUD_SYNC) {
            appDB = JSON.parse(e.newValue || "{}"); loadModule(currentModule, true);
        }
    });

    let autoSyncTimer;
    function startAutoSync() {
        if (ENABLE_CLOUD_SYNC && !isAdmin()) {
            if(autoSyncTimer) clearInterval(autoSyncTimer);
            autoSyncTimer = setInterval(async () => { await initDB(); loadModule(currentModule, true); }, 5000);
        }
    }

    window.login = async function() {
        const u = document.getElementById("user").value; const p = document.getElementById("pass").value;
        if (users[u] && users[u].pass === p) { localStorage.setItem("session_user", u); await initApp(); } 
        else { document.getElementById("err").style.display = "block"; }
    }

    window.logout = function() { localStorage.removeItem("session_user"); location.reload(); }

    async function initApp() {
        const session = localStorage.getItem("session_user");
        if (session && users[session]) {
            currentUser = users[session]; 
            document.getElementById("login").style.display = "none";
            document.getElementById("app").style.display = "flex";
            if (window.innerWidth <= 992) document.getElementById('sidebar').classList.add('collapsed');

            if (isAdmin()) document.getElementById('manualSyncBtn').style.display = "inline-block";

            const footerHTML = `
                <div class="user-info">
                    <div style="color: var(--secondary); font-weight: bold;">${currentUser.name}</div>
                    <div style="font-size: 11px; color: #aaa;">Role: ${currentUser.role.toUpperCase()}</div>
                </div>
                <button class="logout-btn" onclick="logout()" title="Logout">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    <span class="logout-btn-text">Logout</span>
                </button>
            `;
            document.getElementById("sidebarFooter").innerHTML = footerHTML;
            
            await initDB();
            renderNav(); 
            loadModule("Dashboard");
            startAutoSync();
        } else {
            document.getElementById("login").style.display = "block"; document.getElementById("app").style.display = "none";
        }
    }

    window.toggleSidebar = function() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function renderNav() {
        const n = document.getElementById("navLinks");
        n.innerHTML = modules.map(m => `
            <div class="nav-item ${m === currentModule ? 'active' : ''}" onclick="loadModule('${m}')" title="${m}">
                ${navIcons[m]} <span class="nav-text">${m}</span>
            </div>
        `).join('');
    }

    window.addEventListener('resize', () => {
        if(currentUser) {
            if (window.innerWidth <= 992) document.getElementById('sidebar').classList.add('collapsed');
            else document.getElementById('sidebar').classList.remove('collapsed');
        }
    });

    window.loadModule = function(m, silent = false) {
        currentModule = m; document.getElementById("viewTitle").innerText = m;
        
        if (m !== 'Gallery') currentGalleryFolder = null;
        if (m !== 'Timeline') editingTimelineId = null;
        if (m !== 'Team') editingMemberId = null;

        if(!silent) renderNav();
        if(!silent && window.innerWidth <= 992) document.getElementById('sidebar').classList.add('collapsed');
        
        const c = document.getElementById("contentArea");
        switch(m) {
            case "Dashboard": renderDashboard(c); break;
            case "Team": renderTeam(c); break;
            case "Timeline": renderTimeline(c); break;
            case "Sprint Board": renderSprintBoard(c); break;
            case "Calendar": renderCalendar(c); break;
            case "Funds": renderFunds(c); break;
            case "Resources": renderResources(c); break;
            case "Gallery": renderGallery(c); break;
        }
    }

    // --- MODULE: DASHBOARD ---
    function renderDashboard(container) {
        const sprints = getDB('sprints');
        const funds = getDB('funds');
        const timeline = getDB('timeline');
        const members = getDB('members');
        
        const totalFunds = funds.reduce((acc, curr) => curr.type === 'in' ? acc + curr.amount : acc - curr.amount, 0);
        const doneSprints = sprints.filter(s => s.status === 'Done').length;

        let html = `
            <div class="grid-2">
                <div class="glass card">
                    <h3 class="neon">Sprint Progress</h3>
                    <div style="background: rgba(255,255,255,0.1); border-radius: 10px; height: 10px; margin-top: 15px; overflow: hidden;">
                        <div style="width: ${sprints.length ? (doneSprints/sprints.length)*100 : 0}%; background: var(--secondary); height: 100%; box-shadow: 0 0 10px var(--secondary);"></div>
                    </div>
                    <p style="margin-top: 10px; font-size: 14px; color: #aaa;">${doneSprints} of ${sprints.length} Sprints Completed</p>
                </div>
                <div class="glass card">
                    <h3 class="neon">Financial Overview</h3>
                    <h2 style="margin: 10px 0; font-size: 32px;">₱${totalFunds.toLocaleString()}</h2>
                    <p style="font-size: 14px; color: #aaa;">Current available balance</p>
                </div>
            </div>
        `;

        html += `<h3 style="margin-top: 30px; margin-bottom: 15px; color: var(--secondary);">Team Overview</h3>`;
        html += `<div class="grid-5">`;
        
        members.forEach(m => {
            const mColor = memberColors[m.id] || 'var(--accent)';
            const mTasks = timeline.filter(t => t.owner === m.id);
            const mDone = mTasks.filter(t => t.progress == 100).length;
            const mFunds = funds.filter(f => f.type === 'in' && f.contributor === m.id).reduce((sum, f) => sum + f.amount, 0);

            html += `
                <div class="glass card" style="padding: 15px; border-top: 3px solid ${mColor}; text-align: center;">
                    <div style="font-weight: bold; color: ${mColor}; font-size: 16px;">${m.fullName}</div>
                    <div style="font-size: 10px; color: #aaa; margin-bottom: 10px;">${m.role}</div>
                    
                    <div style="font-size: 12px; color: #aaa; margin-bottom: 2px;">Contributions</div>
                    <div style="font-size: 16px; font-weight: bold; margin-bottom: 15px;">₱${mFunds}</div>
                    
                    <div style="font-size: 12px; color: #aaa; margin-bottom: 2px;">Timeline Tasks</div>
                    <div style="font-size: 14px; font-weight: bold;">${mDone} / ${mTasks.length} Done</div>
                </div>
            `;
        });
        
        html += `</div>`;
        container.innerHTML = html;
    }

    window.editMemberProfile = function(id) {
        const members = getDB('members');
        const m = members.find(x => x.id === id);
        if(!m) return;
        editingMemberId = id;
        loadModule('Team', true); 
        setTimeout(() => {
            document.getElementById('tmFullName').value = m.fullName || '';
            document.getElementById('tmRole').value = m.role || '';
            document.getElementById('tmBirthday').value = m.birthday || '';
            document.getElementById('tmMessenger').value = m.messenger || '';
            document.getElementById('tmGithub').value = m.github || '';
            document.getElementById('tmGmail').value = m.gmail || '';
            document.getElementById('tmPhone').value = m.phone || '';
            document.getElementById('teamAdminPanel').scrollIntoView({ behavior: 'smooth' });
        }, 50);
    }
    window.cancelEditMember = function() { editingMemberId = null; loadModule('Team'); }
    window.saveMemberProfile = function() {
        const fullName = document.getElementById('tmFullName').value;
        const role = document.getElementById('tmRole').value;
        const birthday = document.getElementById('tmBirthday').value;
        const messenger = document.getElementById('tmMessenger').value;
        const github = document.getElementById('tmGithub').value;
        const gmail = document.getElementById('tmGmail').value;
        const phone = document.getElementById('tmPhone').value;
        
        if(!fullName || !role) return alert("Name and Role are required.");
        
        let members = getDB('members');
        const idx = members.findIndex(x => x.id === editingMemberId);
        if (idx > -1) {
            members[idx] = { ...members[idx], fullName, role, birthday, messenger, github, gmail, phone };
            setDB('members', members);
        }
        editingMemberId = null;
        loadModule('Team');
    }

    // --- MODULE: CALENDAR ---
    function renderCalendar(container) {
        const manualEvents = getDB('calendar'); 
        const timeline = getDB('timeline');
        const members = getDB('members');
        const currentYear = viewDate.getFullYear();
        
        let allEvents = [...manualEvents];
        
        timeline.forEach(t => {
            if (t.scheduled) {
                allEvents.push({ id: 'tl_' + t.id, title: `Due: ${t.title}`, date: t.scheduled, type: 'timeline-task', owner: t.owner });
            }
        });

        members.forEach(m => {
            if (m.birthday) {
                const bdayMD = m.birthday.substring(5); 
                allEvents.push({ id: 'bday_' + m.id, title: `🎂 ${m.fullName}'s Bday`, date: `${currentYear}-${bdayMD}`, type: 'birthday', owner: m.id });
            }
        });

        let html = '';
        if (isAdmin()) {
            html += `
            <div class="glass admin-panel">
                <h4 style="margin-top:0; color:var(--accent)">Admin: Schedule Manual Event</h4>
                <div class="flex-row">
                    <input id="evTitle" placeholder="Event Title" style="flex:2;">
                    <input id="evDate" type="date" style="flex:1;">
                    <select id="evType" style="flex:1;">
                        <option value="meeting">Meeting</option><option value="overnight">Overnight</option>
                        <option value="defense">Defense</option><option value="other">Other</option>
                    </select>
                    <button onclick="addEvent()" style="flex:1; margin:0;">Schedule</button>
                </div>
            </div>`;
        }

        const currentMonth = viewDate.getMonth(); 
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        const todayStr = new Date().toISOString().split('T')[0];
        
        const monthEvents = allEvents.filter(e => { const eDate = new Date(e.date); return eDate.getMonth() === currentMonth && eDate.getFullYear() === currentYear; }).sort((a,b) => new Date(a.date) - new Date(b.date));

        html += `
        <div class="grid-3">
            <div class="glass card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                    <h3 style="margin:0;" class="neon">${monthNames[currentMonth]} ${currentYear}</h3>
                    <div style="display:flex; gap: 5px;">
                        <button class="icon-btn" onclick="changeMonth(-1)">&#8592;</button>
                        <button class="icon-btn" onclick="changeMonth(1)">&#8594;</button>
                    </div>
                </div>
                <div class="cal-grid">
                    <div class="cal-header">Sun</div><div class="cal-header">Mon</div><div class="cal-header">Tue</div>
                    <div class="cal-header">Wed</div><div class="cal-header">Thu</div><div class="cal-header">Fri</div><div class="cal-header">Sat</div>`;
        
        for(let i = 0; i < firstDay; i++) { html += `<div class="cal-day empty"></div>`; }
        for(let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isToday = dateStr === todayStr ? 'today' : '';
            const dayEvents = allEvents.filter(e => e.date === dateStr);
            
            let dots = ''; 
            dayEvents.forEach(e => { 
                let style = '';
                if (e.type === 'timeline-task') {
                    let color = memberColors[e.owner] || 'var(--accent)';
                    style = `background: ${color}; box-shadow: 0 0 5px ${color};`;
                }
                dots += `<div class="cal-event-dot event-${e.type}" style="${style}" title="${e.title}"></div>`; 
            });
            html += `<div class="cal-day ${isToday}"><div style="font-size:14px;">${d}</div><div style="display:flex; gap:3px; flex-wrap:wrap; justify-content:center; width:100%; margin-top:2px;">${dots}</div></div>`;
        }
        
        html += `</div></div>
            <div class="glass card" style="display:flex; flex-direction:column;">
                <h3 style="margin-top:0; color:var(--accent);">Scheduled Events & Deadlines</h3><div style="flex:1; overflow-y:auto; padding-right:5px;">`;
        if(monthEvents.length === 0) { html += `<p style="color:#aaa; font-size:14px; text-align:center;">No events scheduled this month.</p>`; } 
        else {
            monthEvents.forEach(e => {
                let style = '';
                if (e.type === 'timeline-task') {
                    let color = memberColors[e.owner] || 'var(--accent)';
                    style = `background: ${color}; box-shadow: 0 0 5px ${color};`;
                }
                const isTimeline = e.type === 'timeline-task';
                const isBday = e.type === 'birthday';
                
                let borderCol = 'transparent';
                if(isTimeline) borderCol = memberColors[e.owner] || 'var(--accent)';
                if(isBday) borderCol = '#f59e0b';

                html += `
                <div class="event-list-item" style="border-left: 3px solid ${borderCol}">

    function renderTimeline(container) {
        const timeline = getDB('timeline'); 
        const members = getDB('members');
        let html = '';
        
        if (isAdmin()) {
            const memberOpts = members.map(m => `<option value="${m.id}">${m.fullName}</option>`).join('');
            const uniquePhases = [...new Set(timeline.map(t => t.phase || 'Phase 1'))];
            const phaseListHtml = uniquePhases.map(f => `<option value="${f}">`).join('');

            html += `
            <div class="glass admin-panel" id="timelineAdminPanel">
                <h4 style="margin-top:0; color:var(--accent)" id="tlFormTitle">Admin: Add Timeline Task</h4>
                <datalist id="phaseOptions">${phaseListHtml}</datalist>
                <div class="flex-row" style="margin-bottom: 10px;">

                    <select id="tlOwner" style="flex:1; margin:0;">
                        <option value="" disabled selected>Assign Owner...</option>

                    </select>

                        const endInput = document.getElementById('tlEnd');
                        if(this.value == 100) { endInput.disabled = false; if(!endInput.value) endInput.value = new Date().toISOString().split('T')[0]; } 
                        else { endInput.disabled = true; endInput.value = ''; }
                    ">
                </div>
                <div class="flex-row">
                    <div style="flex:1; display:flex; flex-direction:column;">
                        <label style="font-size:10px; color:#aaa; margin-bottom:2px;">Start Date</label>
                        <input id="tlStart" type="date" style="margin:0;">
                    </div>
                    <div style="flex:1; display:flex; flex-direction:column;">
                        <label style="font-size:10px; color:#aaa; margin-bottom:2px;">Scheduled Deadline</label>
                        <input id="tlSched" type="date" style="margin:0;">
                    </div>
                    <div style="flex:1; display:flex; flex-direction:column;">
                        <label style="font-size:10px; color:#aaa; margin-bottom:2px;">End Date (Actual)</label>
                        <input id="tlEnd" type="date" style="margin:0;" disabled title="Only editable when progress is 100%">
                    </div>
                    <button id="tlSubmitBtn" onclick="submitTimeline()" style="flex:1; margin-top: 14px;">Add Task</button>
                    <button id="tlCancelBtn" onclick="cancelEditTimeline()" style="flex:0.5; margin-top: 14px; display:none; background:rgba(255,255,255,0.1);">Cancel</button>
                </div>
            </div>`;
        }
        
        html += `<div class="glass card" style="padding-bottom: 5px;"><h3 style="margin-top:0; margin-bottom: 20px;">Project Schedule & Timeline</h3>`;
        if (timeline.length === 0) { 
            html += `<p style="color:#aaa;">No timeline data generated by Admin yet.</p></div>`; 
        } else {
            const dates = timeline.flatMap(t => [new Date(t.start).getTime(), new Date(t.scheduled).getTime(), t.end ? new Date(t.end).getTime() : null]).filter(d => d);
            const minDate = Math.min(...dates); let maxDate = Math.max(...dates); let totalSpan = maxDate - minDate;
            if (totalSpan === 0) totalSpan = 86400000; totalSpan = totalSpan * 1.05;

            const phases = [...new Set(timeline.map(t => t.phase || 'Unphased'))];

            html += `<div style="overflow-x: auto; padding-bottom: 15px;">`;
            
            phases.forEach((phaseName, pIdx) => {
                const phaseTasks = timeline.filter(t => (t.phase || 'Unphased') === phaseName);
                
                html += `
                <div class="phase-container" style="margin-bottom: 15px;">
                    <div class="phase-header" onclick="document.getElementById('phase_${pIdx}').style.display = document.getElementById('phase_${pIdx}').style.display === 'none' ? 'table-row-group' : 'none';">
                        <span>📋 ${phaseName} (${phaseTasks.length} Tasks)</span>
                        <span style="font-size: 10px;">▼ Expand / Collapse</span>
                    </div>
                    <table class="timeline-table">
                        <thead>
                            <tr>
                                <th style="width: 70px;">Task ID</th>
                                <th style="width: 180px;">Task Name</th>
                                <th style="width: 80px;">Owner</th>
                                <th style="width: 90px;">Start</th>
                                <th style="width: 90px;">Sched.</th>
                                <th style="width: 90px;">Actual</th>

                                <th style="min-width: 250px;">Gantt Chart</th>

                            </tr>
                        </thead>
                        <tbody id="phase_${pIdx}">
                `;

                phaseTasks.forEach(t => {
                    const startT = new Date(t.start).getTime(); 
                    const schedT = new Date(t.scheduled).getTime();
                    const endT = t.end ? new Date(t.end).getTime() : schedT; 
                    
                    const leftPerc = ((startT - minDate) / totalSpan) * 100; 
                    let widthPerc = ((endT - startT) / totalSpan) * 100;
                    const schedPerc = ((schedT - minDate) / totalSpan) * 100;
                    if (widthPerc < 2) widthPerc = 2; 
                    
                    const prog = t.progress || 0;
                    const isDone = prog == 100;
                    const isLate = isDone && endT > schedT;
                    const owner = t.owner || 'Team';
                    const oColor = memberColors[owner] || 'var(--secondary)';
                    
                    const ownerName = members.find(m=>m.id===owner)?.fullName || owner;

                    let barColor = "linear-gradient(90deg, var(--primary), var(--secondary))"; 
                    if (isDone) barColor = isLate ? "linear-gradient(90deg, #ef4444, #b91c1c)" : "linear-gradient(90deg, #10b981, #059669)";

                    html += `
                        <tr>
                            <td style="color:var(--accent); font-weight:bold;">${t.taskId}</td>
                            <td style="font-weight:500;">${t.title}</td>
                            <td><span style="background:rgba(255,255,255,0.1); padding:3px 8px; border-radius:10px; font-size:11px; border-left: 3px solid ${oColor};">${ownerName}</span></td>
                            <td style="color:#aaa;">${t.start.substring(5)}</td>
                            <td style="color:var(--secondary);">${t.scheduled.substring(5)}</td>
                            <td style="color:${isDone ? (isLate ? '#ef4444' : '#10b981') : '#666'};">${t.end ? t.end.substring(5) : '---'}</td>
                            <td style="font-weight:bold;">${prog}%</td>
                            <td>
                                <div class="gantt-track">
                                    <div class="gantt-bar" style="left: ${leftPerc}%; width: ${widthPerc}%; background: ${barColor};">
                                        <div style="position:absolute; left:0; top:0; height:100%; width:${prog}%; background:rgba(0,0,0,0.4);"></div>
                                    </div>
                                    <div style="position:absolute; left:${schedPerc}%; top:0; height:100%; width:3px; background:var(--accent); z-index:2; box-shadow:0 0 8px var(--accent);" title="Scheduled Deadline: ${t.scheduled}"></div>
                                </div>
                            </td>
                            ${isAdmin() ? `
                            <td>
                                <div style="display:flex; gap:5px;">
                                    <button class="icon-btn" style="background:rgba(34,211,238,0.2); color:var(--secondary); padding: 4px 8px; border-radius:4px; font-size:10px;" onclick="editTimeline(${t.id})">Edit</button>
                                    <button class="delete-btn" style="position:relative; right:auto; top:auto; background:rgba(239, 68, 68, 0.2); padding: 4px 8px; border-radius:4px; font-size:10px;" onclick="deleteTimeline(${t.id})">Drop</button>
                                </div>
                            </td>
                            ` : ''}
                        </tr>
                    `;
                });
                html += `</tbody></table></div>`;
            });
            html += `</div></div>`; 
        }

        html += `<h3 style="margin-top: 30px; margin-bottom: 15px; color: var(--secondary);">Individual Task Records</h3>`;
        html += `<div class="grid-5" style="margin-bottom: 20px;">`;
        
        members.forEach(m => {
            const mTasks = timeline.filter(t => t.owner === m.id);
            const mColor = memberColors[m.id] || 'var(--accent)';
            
            html += `
                <div class="glass card" style="padding: 15px; border-top: 3px solid ${mColor};">
                    <div style="font-weight: bold; color: ${mColor}; margin-bottom: 10px; border-bottom: 1px solid var(--glass-border); padding-bottom: 5px;">${m.fullName}</div>
                    <div style="display:flex; flex-direction:column; gap:8px; max-height: 250px; overflow-y: auto; padding-right: 5px;">
            `;
            if (mTasks.length === 0) {
                html += `<div style="font-size: 11px; color: #aaa; text-align: center;">No assigned tasks</div>`;
            } else {
                mTasks.sort((a,b) => new Date(a.scheduled) - new Date(b.scheduled)).forEach(t => {
                    const isDone = t.progress == 100;
                    const isLate = isDone && new Date(t.end) > new Date(t.scheduled);
                    const borderCol = isDone ? (isLate ? '#ef4444' : '#10b981') : 'var(--glass-border)';
                    
                    html += `
                        <div style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; border: 1px solid ${borderCol};">
                            <div style="display:flex; justify-content:space-between; margin-bottom: 4px;">
                                <span style="font-weight:bold; font-size:12px; color:${isDone ? '#fff' : '#fff'};">${t.title}</span>
                                <span style="font-size:10px; color:var(--accent);">${t.taskId}</span>
                            </div>
                            <div style="font-size:10px; color:#aaa;">Target: ${t.scheduled}</div>
                            ${isDone ? `<div style="font-size:10px; color:${isLate ? '#ef4444' : '#10b981'};">Done: ${t.end} ${isLate?'(Late)':'(On Time)'}</div>` : ''}
                            
                            <div style="margin-top: 5px; background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; overflow: hidden;">
                                <div style="width: ${t.progress || 0}%; background: ${isDone ? (isLate ? '#ef4444' : '#10b981') : mColor}; height: 100%;"></div>
                            </div>
                            <div style="font-size:10px; color:${mColor}; text-align:right; margin-top:2px;">${t.progress || 0}%</div>
                        </div>
                    `;
                });
            }
            html += `</div></div>`;
        });
        html += `</div>`;

        container.innerHTML = html;
    }
    
    window.submitTimeline = function() {
        const phase = document.getElementById('tlPhase').value || 'Phase 1';
        const title = document.getElementById('tlTitle').value; 
        const owner = document.getElementById('tlOwner').value; 
        const start = document.getElementById('tlStart').value; 
        const sched = document.getElementById('tlSched').value;
        const progress = document.getElementById('tlProgress').value || 0;
        const end = document.getElementById('tlEnd').disabled ? "" : document.getElementById('tlEnd').value;
        
        if(!title || !owner || !start || !sched) return alert("Fill Task Name, Owner, Start, and Scheduled Dates."); 
        if(progress == 100 && !end) return alert("Please provide the Actual End Date for completed tasks.");
        if(end && new Date(start) > new Date(end)) return alert("Start date must be before actual end date.");
        
        let tl = getDB('timeline'); 
        
        if (editingTimelineId) {
            const idx = tl.findIndex(t => t.id === editingTimelineId);
            if (idx > -1) {
                tl[idx] = { ...tl[idx], phase, title, owner, start, end: end || null, scheduled: sched, progress: parseInt(progress) };
            }
            editingTimelineId = null;
        } else {
            let maxId = 0;
            tl.forEach(t => {
                if(t.taskId && t.taskId.startsWith('TSK-')) {
                    let num = parseInt(t.taskId.split('-')[1]);
                    if(num > maxId) maxId = num;
                }
            });
            const taskId = `TSK-${(maxId + 1).toString().padStart(3, '0')}`;
            tl.push({ id: generateId(), taskId, phase, title, owner, start, end: end || null, scheduled: sched, progress: parseInt(progress) }); 
        }
        
        setDB('timeline', tl); loadModule('Timeline');
    }
    
    window.editTimeline = function(id) {
        const tl = getDB('timeline').find(t => t.id === id);
        if(!tl) return;
        
        editingTimelineId = id;
        document.getElementById('tlPhase').value = tl.phase || 'Phase 1';
        document.getElementById('tlTitle').value = tl.title;
        
        const ownerSelect = document.getElementById('tlOwner');
        if([...ownerSelect.options].some(o => o.value === tl.owner)) ownerSelect.value = tl.owner;
        else ownerSelect.value = "Team";
        
        document.getElementById('tlStart').value = tl.start;
        document.getElementById('tlSched').value = tl.scheduled || tl.end || ''; 
        document.getElementById('tlProgress').value = tl.progress || 0;
        
        const endInput = document.getElementById('tlEnd');
        if (tl.progress == 100) { endInput.disabled = false; endInput.value = tl.end || ''; } 
        else { endInput.disabled = true; endInput.value = ''; }
        
        document.getElementById('tlFormTitle').innerText = `Admin: Edit Task ${tl.taskId}`;
        document.getElementById('tlSubmitBtn').innerText = "Update Task";
        document.getElementById('tlCancelBtn').style.display = "block";
        document.getElementById('timelineAdminPanel').scrollIntoView({ behavior: 'smooth' });
    }
    window.cancelEditTimeline = function() { editingTimelineId = null; loadModule('Timeline'); }
    window.deleteTimeline = function(id) { setDB('timeline', getDB('timeline').filter(t => t.id !== id)); loadModule('Timeline'); }

                            <div class="task-card" draggable="${isAdmin() ? 'true' : 'false'}" ondragstart="dragSprint(event, ${s.id})">
                                ${isAdmin() ? `<button class="delete-btn" onclick="deleteSprintContainer(${s.id})">✖</button>` : ''}
                                <div style="font-weight:bold; font-size: 14px; margin-bottom: 5px; color: var(--secondary);">${s.name}</div>
                                <div style="font-size: 11px; color: #aaa; margin-bottom: 8px;">Phase: ${s.phase} &bull; ${s.weeks} Weeks</div>
                                <div style="font-size: 12px; color: #ddd; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 4px; margin-bottom: 5px;">
                                    <strong>Obj:</strong> ${s.objectives}
                                </div>
                                <div style="font-size: 12px; color: #ddd; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 4px;">
                                    <strong>Del:</strong> ${s.deliverables}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        });
        html += `</div>`; container.innerHTML = html;
    }
    
    window.addSprintContainer = function() {
        const name = document.getElementById('smName').value;
        const weeks = document.getElementById('smWeeks').value;
        const phase = document.getElementById('smPhase').value;
        if(!name) return alert("Sprint Name is required.");
        const sprints = getDB('sprints');
        sprints.push({
            id: generateId(), name, weeks: weeks||1, phase: phase||'None',
            objectives: document.getElementById('smObj').value || 'TBD',
            deliverables: document.getElementById('smDel').value || 'TBD',
            status: 'To Do'
        });
        setDB('sprints', sprints); loadModule('Sprint Board');
    }
    window.deleteSprintContainer = function(id) { setDB('sprints', getDB('sprints').filter(s => s.id !== id)); loadModule('Sprint Board'); }
    window.allowDrop = function(ev) { if(isAdmin()) ev.preventDefault(); }
    window.dragSprint = function(ev, id) { if(isAdmin()) ev.dataTransfer.setData("sprintId", id); }
    window.dropSprint = function(ev, newStatus) {
        if(!isAdmin()) return; ev.preventDefault(); const id = parseInt(ev.dataTransfer.getData("sprintId"));
        let sprints = getDB('sprints'); const sIdx = sprints.findIndex(s => s.id === id);
        if (sIdx > -1) { sprints[sIdx].status = newStatus; setDB('sprints', sprints); loadModule('Sprint Board'); }
    }

    // --- RESOURCES ---
    function renderResources(container) {
        const res = getDB('resources'); let html = '';
        
        const allUsedTags = [...new Set(res.flatMap(r => r.tags || []))];
        const allTags = [...new Set([...defaultResTags, ...allUsedTags])];
        const dlTags = allTags.map(t => `<div class="tag-chip" onclick="appendResTag('${t}')">+ ${t}</div>`).join('');

        if (isAdmin()) {
            html += `
            <div class="glass admin-panel">
                <h4 style="margin-top:0; color:var(--accent)">Admin: Add Resource</h4>
                <div class="flex-row" style="margin-bottom:10px;">
                    <input id="resTitle" placeholder="Resource Title" style="flex:2;">
                    <select id="resType" style="flex:1;" onchange="
                        document.getElementById('resUrl').style.display = this.value === 'link' ? 'block' : 'none';
                        document.getElementById('resFile').style.display = this.value === 'file' ? 'block' : 'none';
                    ">
                        <option value="link">Web Link</option>
                        <option value="file">Upload File</option>
                    </select>
                </div>
                <div class="flex-row" style="margin-bottom:10px;">
                    <input id="resUrl" placeholder="Target URL" style="flex:2; display:block; margin:0;">
                    <input id="resFile" type="file" style="flex:2; display:none; margin:0; padding: 9px;" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,.zip,.rar">
                    <input id="resDesc" placeholder="Short Description" style="flex:2; margin:0;">
                </div>
                <div class="flex-row">
                    <input id="resTags" placeholder="Tags (Comma separated, e.g. Survey, Docs)" style="flex:3; margin:0;">
                    <button onclick="addResource()" style="flex:1; margin:0;">Add</button>
                </div>
                <div style="display:flex; gap:5px; margin-top:10px; flex-wrap:wrap;">
                    <span style="font-size:10px; color:#aaa; margin-right:5px; line-height:20px;">Quick Tags:</span>
                    ${dlTags}
                </div>
            </div>`;
        }

        const filterChips = allTags.map(t => `
            <div class="tag-chip ${resActiveTag === t ? 'active' : ''}" onclick="setResTag('${t}')">${t}</div>
        `).join('');

        html += `
        <div class="glass card">
            <div style="display:flex; gap:10px; margin-bottom: 15px;">
                <input class="res-search" placeholder="🔍 Search resources by title or description..." value="${resSearchTerm}" onkeyup="setResSearch(this.value)">
            </div>
            <div style="display:flex; gap:5px; margin-bottom: 20px; flex-wrap:wrap;">
                <div class="tag-chip ${resActiveTag === null ? 'active' : ''}" onclick="setResTag(null)">All</div>
                ${filterChips}
            </div>
            <div style="display:flex; flex-direction:column; gap:10px;">
        `;

        let filteredRes = res.filter(r => {
            const matchesSearch = !resSearchTerm || r.title.toLowerCase().includes(resSearchTerm) || r.desc.toLowerCase().includes(resSearchTerm);
            const matchesTag = !resActiveTag || (r.tags && r.tags.includes(resActiveTag));
            return matchesSearch && matchesTag;
        });

        if (filteredRes.length === 0) {
            html += `<p style="color:#aaa; text-align:center;">No resources found.</p>`;
        } else {
            filteredRes.forEach(r => {
                const isFile = r.type === 'file';
                const tagDisplay = (r.tags || []).map(t => `<span style="background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:4px; font-size:9px; margin-right:5px;">${t}</span>`).join('');
                
                html += `
                    <div class="resource-item">
                        <div style="display:flex; align-items:center; flex:1;">
                            <div class="resource-icon">${isFile ? '📄' : '🔗'}</div>
                            <div>
                                <div style="font-weight:bold; font-size:16px;">${r.title}</div>
                                <div style="font-size:12px; color:#aaa; margin-top:4px;">${r.desc} ${isFile && r.fileName ? `(${r.fileName})` : ''}</div>
                                <div style="margin-top:6px;">${tagDisplay}</div>
                            </div>
                        </div>
                        <div style="display:flex; gap:10px;">
                            ${isFile 
                                ? `<button onclick="downloadFile('${r.url}', '${r.fileName || 'resource'}')" style="width:auto; padding:8px 15px; margin:0;">Download</button>`
                                : `<button onclick="window.open('${r.url}', '_blank')" style="width:auto; padding:8px 15px; margin:0;">Open</button>`
                            }
                            ${isAdmin() ? `<button class="danger" onclick="deleteResource(${r.id})" style="width:auto; padding:8px 15px; margin:0;">Drop</button>` : ''}
                        </div>
                    </div>`;
            });
        }
        html += `</div></div>`; container.innerHTML = html;
    }
    
    window.setResSearch = (val) => { resSearchTerm = val.toLowerCase(); loadModule('Resources', true); }
    window.setResTag = (tag) => { resActiveTag = resActiveTag === tag ? null : tag; loadModule('Resources', true); }
    window.appendResTag = (tag) => {
        const input = document.getElementById('resTags');
        let current = input.value.split(',').map(t=>t.trim()).filter(t=>t);
        if(!current.includes(tag)) current.push(tag);
        input.value = current.join(', ');
    }

    window.addResource = async function() {
        const title = document.getElementById('resTitle').value; 
        const type = document.getElementById('resType').value;
        const desc = document.getElementById('resDesc').value;
        const tagsStr = document.getElementById('resTags').value;
        const tags = tagsStr.split(',').map(t=>t.trim()).filter(t=>t);

        if(!title) return alert("Title is required.");

        if (type === 'link') {
            const url = document.getElementById('resUrl').value;
            if(!url) return alert("URL is required.");
            const res = getDB('resources'); res.push({ id: generateId(), title, type, url, desc, tags }); 
            setDB('resources', res); loadModule('Resources');
        } else {
            const fileInput = document.getElementById('resFile');
            if(!fileInput.files[0]) return alert("Please select a file.");
            const file = fileInput.files[0];
            if(file.size > 250000) return alert("File is too large! Max size is 250KB for JSON database storage.");
            
            document.getElementById('syncStatus').innerText = "⏳ Processing file...";
            const reader = new FileReader();
            reader.onload = (e) => {
                const res = getDB('resources'); 
                res.push({ id: generateId(), title, type, url: e.target.result, desc, fileName: file.name, tags }); 
                setDB('resources', res); loadModule('Resources');
            };
            reader.readAsDataURL(file);
        }
    }
    window.deleteResource = function(id) { setDB('resources', getDB('resources').filter(r => r.id !== id)); loadModule('Resources'); }

    // --- GALLERY ---
    function renderGallery(container) {
        const gal = getDB('gallery'); let html = '';
        
        if (isAdmin()) {
            const uniqueFolders = [...new Set(gal.map(g => g.folder || 'Uncategorized'))];
            const dataListHtml = uniqueFolders.map(f => `<option value="${f}">`).join('');

            html += `
            <div class="glass admin-panel">
                <h4 style="margin-top:0; color:var(--accent)">Admin: Upload Photos</h4>
                <datalist id="folderOptions">${dataListHtml}</datalist>
                <div class="flex-row" style="align-items:flex-start;">
                    <div style="flex:2;">
                        <input id="galFile" type="file" multiple accept="image/*" style="margin:0; padding:9px;">
                        <div style="font-size: 10px; color: #ffaa00; margin-top: 5px;">* Select multiple images. Auto-compressed for cloud sync.</div>
                    </div>
                    <input id="galFolder" placeholder="Folder Name" list="folderOptions" style="flex:1; margin:0;" value="${currentGalleryFolder || ''}">
                    <input id="galCap" placeholder="Caption (Optional)" style="flex:1; margin:0;">
                    <button onclick="addPhoto()" style="flex:1; margin:0;">Upload</button>
                </div>
            </div>`;
        }

        if (currentGalleryFolder === null) {
            const folders = {};
            gal.forEach(g => {
                const fName = g.folder || 'Uncategorized';
                if(!folders[fName]) folders[fName] = { count: 0, cover: g.url };
                folders[fName].count++;
            });
            
            const folderNames = Object.keys(folders);
            if (folderNames.length === 0) {
                html += `<div><p style="color:#aaa;">No folders or images yet.</p></div>`;
            } else {
                html += `<div class="gallery-grid">`;
                folderNames.forEach(fName => {
                    html += `
                    <div class="gallery-item" style="cursor:pointer;" onclick="window.openGalleryFolder('${fName}')">
                        <img src="${folders[fName].cover}" alt="Folder Cover" style="opacity: 0.4;">
                        <div class="folder-overlay">
                            <div style="font-size: 40px; margin-bottom: 10px;">📁</div>
                            <div style="font-weight: bold; font-size: 16px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); text-align:center; padding: 0 10px;">${fName}</div>
                            <div style="font-size: 12px; color: var(--secondary); margin-top: 5px;">${folders[fName].count} Items</div>
                        </div>
                    </div>`;
                });
                html += `</div>`;
            }
        } else {
            html += `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 10px 15px; border-radius: 8px; border: 1px solid var(--glass-border);">
                <h3 style="margin:0; display:flex; align-items:center; gap: 10px;">
                    <span style="font-size:24px;">📁</span> ${currentGalleryFolder}
                </h3>
                <button class="icon-btn" onclick="window.closeGalleryFolder()" style="background: rgba(255,255,255,0.15);">🔙 Back to Folders</button>
            </div>`;
            
            const folderItems = gal.filter(g => (g.folder || 'Uncategorized') === currentGalleryFolder);
            
            if (folderItems.length === 0) {
                html += `<p style="color:#aaa;">Folder is empty.</p>`;
            } else {
                html += `<div class="gallery-grid">`;
                folderItems.forEach(g => {
                    html += `
                    <div class="gallery-item">
                        <img src="${g.url}" alt="${g.caption}" onerror="this.src='https://via.placeholder.com/300x300?text=Invalid+Image'">
                        <div class="gallery-caption">
                            <div style="margin-bottom: ${isAdmin() ? '5px' : '0'};">${g.caption}</div>
                            ${isAdmin() ? `<button class="danger" style="padding: 4px; font-size: 10px; margin:0;" onclick="deletePhoto(${g.id})">Delete</button>` : ''}
                        </div>
                    </div>`;
                });
                html += `</div>`;
            }
        }
        container.innerHTML = html;
    }

    window.openGalleryFolder = function(fName) { currentGalleryFolder = fName; loadModule('Gallery', true); }
    window.closeGalleryFolder = function() { currentGalleryFolder = null; loadModule('Gallery', true); }
    
    window.addPhoto = async function() {
        const fileInput = document.getElementById('galFile');
        const files = fileInput.files;
        const caption = document.getElementById('galCap').value || 'Untitled';
        const folder = document.getElementById('galFolder').value.trim() || 'Uncategorized';
        
        if(files.length === 0) return alert("Please select at least one image.");
        document.getElementById('syncStatus').innerText = "⏳ Compressing & Uploading...";
        
        const gal = getDB('gallery');
        
        for(let i=0; i < files.length; i++) {
            const base64 = await compressImage(files[i]);
            let finalCaption = files.length > 1 ? `${caption} (${i+1})` : caption;
            gal.push({ id: generateId(), url: base64, caption: finalCaption, folder: folder });
        }
        
        currentGalleryFolder = folder;
        setDB('gallery', gal); loadModule('Gallery');
    }
    
    window.deletePhoto = function(id) { 
        let gal = getDB('gallery');
        const photo = gal.find(g => g.id === id);
        const targetFolder = photo ? (photo.folder || 'Uncategorized') : null;
        gal = gal.filter(g => g.id !== id);
        if (targetFolder && !gal.some(g => (g.folder || 'Uncategorized') === targetFolder)) currentGalleryFolder = null; 
        setDB('gallery', gal); loadModule('Gallery', true); 
    }

    // --- SECURITY OVERRIDES ---
    document.addEventListener("contextmenu", e => e.preventDefault());
    document.addEventListener("keydown", e => {
        if (e.key === "F12" || (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) || (e.ctrlKey && e.key === "U")) {
            e.preventDefault(); alert("DaDevs Security Protocol: Developer Tools Locked.");
        }
    });

    window.onload = async () => { await initApp(); };
</script>
</body>
</html>

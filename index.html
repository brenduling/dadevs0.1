<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0F172A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>DaDevs 0.1 - Workspace</title>
    <style>
        :root {
            /* DaDevs 0.1 Deep Space Neon Palette */
            --bg-1: #0F172A; 
            --bg-2: #1E293B;
            --primary: #2D2A8C; 
            --secondary: #22D3EE; 
            --accent: #8B5CF6; 
            --text: #f8fafc;
            --glass-bg: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
            
            /* Member Colors */
            --c-chua: #3b82f6; 
            --c-vince: #8b5cf6; 
            --c-tanya: #ec4899; 
            --c-bren: #10b981; 
            --c-ruth: #f97316; 
            --c-team: #64748b; 
        }

        /* Light Theme Override */
        body.light-theme {
            --bg-1: #f8fafc; --bg-2: #e2e8f0;
            --text: #0f172a; --secondary: #0284c7; --accent: #7c3aed; --primary: #312e81;
            --glass-bg: rgba(255,255,255,0.85);
            --glass-border: rgba(0,0,0,0.15);
        }
        body.light-theme .neon { color: var(--primary); text-shadow: none; }
        body.light-theme input, body.light-theme select, body.light-theme textarea { background: rgba(255,255,255,0.9); color: #000; border: 1px solid #cbd5e1; }
        body.light-theme .timeline-table td { border-color: rgba(0,0,0,0.05); }
        body.light-theme .unique-member-card { background: linear-gradient(145deg, rgba(255,255,255,1) 0%, rgba(241,245,249,1) 100%); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        body {
            margin: 0; font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
            color: var(--text); overflow: hidden; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            transition: background 0.3s, color 0.3s;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: rgba(34, 211, 238, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(34, 211, 238, 0.6); }

        .glass {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .neon { color: var(--secondary); text-shadow: 0 0 8px rgba(34,211,238,0.4); }
        .accent { color: var(--accent); }
        
        .dadevs-logo { width: 50px; height: 50px; flex-shrink: 0; transition: transform 0.3s ease; }
        .dadevs-logo:hover { transform: scale(1.05) rotate(5deg); }
        
        /* Auto-Update Overlay Screen */
        #updateOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 99999; display: none; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: var(--text);
        }
        @keyframes pulseLogo { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        #updateOverlay .dadevs-logo { animation: pulseLogo 1.5s infinite ease-in-out; width: 80px; height: 80px; margin-bottom: 20px; }

        /* Auth Screen */
        #authScreen { padding: 40px; text-align: center; width: 340px; max-width: 90%; z-index: 10; transition: opacity 0.5s; display: none; }
        .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
        .auth-tab { flex: 1; padding: 10px; cursor: pointer; color: #888; transition: 0.3s; font-weight: bold; font-size: 14px; border-bottom: 2px solid transparent; }
        .auth-tab.active { color: var(--secondary); border-bottom-color: var(--secondary); text-shadow: 0 0 8px rgba(34, 211, 238, 0.3); }

        input, select, textarea {
            width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border); color: var(--text);
            border-radius: 8px; box-sizing: border-box; outline: none; font-family: inherit; font-size: 14px; transition: border-color 0.3s;
        }
        input:disabled, textarea:disabled { background: rgba(0,0,0,0.5); color: #666; cursor: not-allowed; border-color: rgba(255,255,255,0.05); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        input:focus:not(:disabled), select:focus, textarea:focus { border-color: var(--secondary); }
        
        button {
            width: 100%; padding: 12px; background: var(--accent); color: #fff;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 5px; font-size: 14px;
        }
        button:hover { background: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
        button:active { transform: translateY(0); }
        button.danger { background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #ef4444; }
        button.danger:hover { background: #ef4444; color: #fff; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
        button.success { background: rgba(16, 185, 129, 0.15); border: 1px solid #10b981; color: #10b981; }
        button.success:hover { background: #10b981; color: #fff; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        
        /* App Layout */
        #app { display: none; width: 100vw; height: 100vh; flex-direction: row; position: relative; }
        
        /* Sidebar */
        #sidebar {
            width: 250px; display: flex; flex-direction: column; border-right: 1px solid var(--glass-border);
            border-radius: 0; z-index: 1000; background: rgba(15, 23, 42, 0.95); flex-shrink: 0; overflow: hidden;
        }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; height: 85px; box-sizing: border-box; border-bottom: 1px solid var(--glass-border); white-space: nowrap; }
        .nav-links { flex: 1; padding: 15px 10px; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; gap: 8px; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; white-space: nowrap; font-weight: 500; font-size: 14px; }
        .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
        .nav-item:hover, .nav-item.active { background: rgba(34, 211, 238, 0.15); color: var(--secondary); transform: translateX(5px); border-left: 3px solid var(--secondary); }

        /* Main Content */
        #main { flex: 1; padding: 30px; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; transition: 0.3s; min-width: 0; position: relative; box-sizing: border-box; word-wrap: break-word;}
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; width: 100%; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;}
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .header-btn { background: rgba(255,255,255,0.1); border: none; color: var(--text); padding: 8px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 12px; transition: 0.3s; margin:0; font-weight: bold;}
        .header-btn:hover { background: var(--secondary); color: #000; transform: translateY(-2px); }
        
        .notif-bell { position: relative; cursor: pointer; font-size: 20px; padding: 5px; transition: transform 0.2s;}
        .notif-bell:hover { transform: scale(1.1); }
        .notif-dot { position: absolute; top: 0; right: 0; background: #ef4444; width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 5px #ef4444; display: none; }
        .notif-dropdown { position: absolute; top: 40px; right: 0; width: 250px; background: var(--bg-2); border: 1px solid var(--glass-border); border-radius: 8px; padding: 10px; z-index: 1000; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        /* Universal Chat Panel */
        #chatPanel {
            position: fixed; right: -350px; top: 0; width: 340px; max-width: 100vw; height: 100vh;
            background: var(--bg-1); border-left: 1px solid var(--glass-border);
            z-index: 2000; transition: right 0.3s ease; display:flex; flex-direction:column;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
        }
        #chatPanel.open { right: 0; }
        .chat-header { padding: 20px; border-bottom: 1px solid var(--glass-border); display:flex; justify-content:space-between; align-items:center; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display:flex; flex-direction:column; gap: 10px; }
        .chat-input-area { padding: 15px; border-top: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); }

        .card { padding: 20px; margin-bottom: 20px; transition: transform 0.3s; word-break: break-word; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; } 
        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; } 
        
        .contact-link { display: flex; justify-content: center; align-items: center; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; text-decoration: none; font-size: 16px; transition: 0.3s; }
        .contact-link:hover { background: var(--secondary); color: #000; transform: translateY(-4px); border-color: var(--secondary); box-shadow: 0 4px 12px rgba(34, 211, 238, 0.4); }
        
        .avatar-container { position: relative; display: inline-flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .native-avatar { border-radius: 50%; display: flex; justify-content: center; align-items: center; overflow: hidden; border: 3px solid var(--glass-border); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); flex-shrink: 0; }
        .native-avatar svg { fill: currentColor; }
        .avatar-img { border-radius: 50%; object-fit: cover; border: 3px solid var(--glass-border); box-shadow: 0 4px 15px rgba(0,0,0,0.5); flex-shrink: 0; width: 100%; height: 100%; }
        .avatar-sticker { position: absolute; bottom: -5px; right: -5px; font-size: 20px; background: var(--bg-1); border-radius: 50%; width: 28px; height: 28px; display: flex; justify-content: center; align-items: center; border: 2px solid var(--glass-border); box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 2; }
        
        .avatar-mini-wrapper { position: relative; width: 26px; height: 26px; flex-shrink: 0; display: inline-block; }
        .avatar-mini { width: 100% !important; height: 100% !important; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); flex-shrink: 0; display: inline-flex; justify-content: center; align-items: center; margin: 0; padding: 0;}
        .avatar-sticker-mini { position: absolute; bottom: -4px; right: -4px; font-size: 10px; background: var(--bg-1); border-radius: 50%; width: 14px; height: 14px; display: flex; justify-content: center; align-items: center; border: 1px solid var(--glass-border); z-index: 2; }

        .unique-member-card {
            border: 1px solid var(--glass-border); border-radius: 16px; 
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.2) 100%);
            position: relative; overflow: visible; margin-top: 30px; text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .unique-member-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.4); border-color: var(--secondary); }

        .kanban-board { display: flex; gap: 20px; min-height: 400px; overflow-x: auto; padding-bottom: 20px;}
        .kanban-col { flex: 1; min-width: 280px; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 15px; border: 1px solid var(--glass-border); }
        .task-card { background: var(--glass-bg); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--glass-border); transition: 0.2s; cursor: grab; position: relative;}
        .task-card:hover { border-color: var(--secondary); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #ef4444; cursor: pointer; padding: 0; width: auto; font-size: 12px; transition: transform 0.2s;}
        .delete-btn:hover { transform: scale(1.2); background: none; box-shadow: none; color: #ff0000; }
        
        .admin-panel { padding: 20px; margin-bottom: 20px; border-left: 4px solid var(--accent); }
        .admin-panel .flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        /* Timeline Table (Desktop) */
        .phase-header { background: rgba(34, 211, 238, 0.15); padding: 12px 15px; border-radius: 8px; font-weight: bold; color: var(--secondary); cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid rgba(34, 211, 238, 0.3); transition: 0.2s; }
        .phase-header:hover { background: rgba(34, 211, 238, 0.25); transform: translateX(2px); }
        .timeline-table { width: 100%; border-collapse: collapse; min-width: 900px; }
        .timeline-table th { text-align: left; padding: 12px 10px; font-size: 11px; color: #aaa; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); }
        .timeline-table td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; vertical-align: middle; }
        .gantt-track { background: rgba(0,0,0,0.4); height: 24px; border-radius: 12px; position: relative; overflow: hidden; border: 1px solid var(--glass-border); width: 100%; min-width: 150px; }
        .gantt-bar { position: absolute; height: 100%; border-radius: 12px; display: flex; align-items: center; font-size: 11px; font-weight: bold; color: #fff; box-sizing: border-box; overflow: hidden; transition: 0.3s; }
        
        /* Gallery UI */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .gallery-item { position: relative; border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-border); aspect-ratio: 1 / 1; transition: 0.3s; background: rgba(0,0,0,0.5); cursor: pointer;}
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
        .gallery-item:hover img { transform: scale(1.08); }
        .gallery-caption { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding: 15px 10px 10px 10px; font-size: 12px; transition: 0.3s; }
        .folder-overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.75); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; transition: 0.3s; backdrop-filter: blur(2px);}
        .gallery-item:hover .folder-overlay { background: rgba(15, 23, 42, 0.5); }

        /* Lightbox Image Viewer */
        #lightboxModal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 100000; display: none; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(8px); }
        #lightboxImg { max-width: 90vw; max-height: 80vh; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); object-fit: contain; }
        #lightboxCaption { margin-top: 20px; color: #fff; font-size: 18px; font-weight: bold; text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .close-lightbox { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content:center; align-items:center; font-weight: bold; font-size: 18px; transition: 0.2s;}
        .close-lightbox:hover { background: #ef4444; transform: rotate(90deg); }
        
        .res-search { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: var(--text); border-radius: 8px; margin-bottom: 15px; outline: none; transition: 0.3s;}
        .res-search:focus { border-color: var(--secondary); box-shadow: 0 0 10px rgba(34, 211, 238, 0.2); }
        .tag-chip { background: rgba(34, 211, 238, 0.1); color: var(--secondary); padding: 6px 14px; border-radius: 12px; font-size: 11px; font-weight: bold; cursor: pointer; border: 1px solid rgba(34, 211, 238, 0.3); transition: 0.2s; white-space: nowrap; user-select: none; }
        .tag-chip:hover, .tag-chip.active { background: var(--secondary); color: #000; transform: translateY(-2px); }
        
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-top: 15px; }
        .cal-header { font-weight: bold; color: var(--secondary); font-size: 12px; padding-bottom: 10px; }
        .cal-day { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px; border: 1px solid var(--glass-border); min-height: 50px; position: relative; display: flex; flex-direction: column; align-items: center; transition: 0.2s;}
        .cal-day:hover:not(.empty) { background: rgba(255,255,255,0.05); }
        .cal-day.empty { background: transparent; border: none; }
        .cal-day.today { border-color: var(--secondary); background: rgba(34, 211, 238, 0.15); }
        .cal-event-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; }
        
        .comment-box { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; padding: 12px; margin-bottom: 10px; transition: 0.2s;}
        .comment-box:hover { border-color: rgba(255,255,255,0.2); }
        .comment-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; color: #aaa; }
        .comment-author { font-weight: bold; color: var(--secondary); }
        .comment-body { font-size: 13px; word-break: break-word; color: var(--text); line-height: 1.4; }

        /* User Modal Overlay */
        #userModal { position: fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(0,0,0,0.8); z-index: 10000; display: none; justify-content:center; align-items:center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(5px);}
        .modal-content { background: var(--bg-1); border: 1px solid var(--glass-border); border-radius: 12px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; padding: 20px; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.8);}
        .close-modal { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; justify-content:center; align-items:center; font-weight: bold; transition: 0.2s;}
        .close-modal:hover { background: #ef4444; transform: rotate(90deg); }

        /* Mobile Adjustments */
        @media (max-width: 992px) { 
            .grid-3 { grid-template-columns: 1fr; } 
        }
        
        @media (max-width: 768px) {
            body { position: fixed; width: 100%; height: 100%; overflow: hidden; }
            #app { flex-direction: column; }
            
            /* Bottom Navigation */
            #sidebar {
                width: 100%; height: 65px; position: fixed; bottom: 0; left: 0; right: 0;
                flex-direction: row; border-right: none; border-top: 1px solid var(--glass-border);
                background: rgba(15, 23, 42, 0.98); z-index: 1000; transition: none;
            }
            .sidebar-header, .sidebar-footer { display: none !important; }
            .nav-links { flex-direction: row; width: 100%; padding: 5px; align-items: center; justify-content: space-around; overflow-x: auto; overflow-y: hidden; }
            .nav-item { flex-direction: column; padding: 5px 8px; gap: 4px; font-size: 10px; border-radius: 8px; min-width: 60px; justify-content: center; }
            .nav-item svg { width: 22px; height: 22px; margin: 0; }
            .nav-item:hover, .nav-item.active { border-left: none; border-bottom: 3px solid var(--secondary); background: transparent; transform: scale(1.05); }
            .nav-text { display: none !important; }
            
            #main { height: calc(100vh - 65px); padding: 15px; padding-bottom: 25px; }
            .header-top { padding-bottom: 10px; margin-bottom: 15px; }
            
            .grid-2, .grid-5, .grid-3 { grid-template-columns: 1fr; gap: 15px; }
            .card { padding: 15px; }
            .admin-panel .flex-row { flex-direction: column; align-items: stretch; }
            .admin-panel .flex-row > * { width: 100%; margin-bottom: 5px; flex: none !important; }
            
            .timeline-wrapper { overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch; padding-bottom: 10px; }
            .timeline-table { min-width: 700px; } 
            
            .kanban-board { flex-direction: column; min-height: auto; }
            .kanban-col { min-width: 0; }
            
            .profile-controls { justify-content: center; width: 100%; margin-top: 10px; }
            .profile-controls button { flex: 1; text-align: center; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="updateOverlay">
        <svg class="dadevs-logo" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="neonGradUpdate" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#22D3EE" />
                    <stop offset="100%" stop-color="#8B5CF6" />
                </linearGradient>
            </defs>
            <path d="M100 15L175 58V142L100 185L25 142V58L100 15Z" stroke="url(#neonGradUpdate)" stroke-width="8"/>
            <path d="M100 40V160" stroke="#FFF" stroke-width="12" stroke-linecap="round"/>
            <path d="M100 40C145 40 155 70 155 100C155 130 145 160 100 160" stroke="url(#neonGradUpdate)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M70 100L45 75M70 100L45 125" stroke="#FFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h2 class="neon" style="margin:0 0 10px 0; font-size: 24px;">Applying Update...</h2>
        <p style="color:#aaa; font-size: 14px; margin:0;">Please wait.</p>
    </div>

    <div id="authScreen" class="glass">
        <div style="display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom: 10px;">
            <svg class="dadevs-logo" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>

                if(!m.role || m.role === "undefined" || m.role === "null") { m.role = defaultUsers[m.id].role; dbUpdated = true; }
                if(!m.status || m.status === "undefined" || m.status === "null") { m.status = defaultUsers[m.id].status; dbUpdated = true; }
            }
            return m;
        });

        Object.keys(defaultUsers).forEach(key => {
            if (!appDB.members.find(m => m.id === key)) {
                appDB.members.push({
                    id: key, fullName: key, ...defaultUsers[key],
                    birthday: "", messenger: "", github: "", gmail: "", phone: "", avatar: ""

                dbUpdated = true;

    async function saveDB() {
        if (ENABLE_CLOUD_SYNC && JSONBIN_BIN_ID && JSONBIN_MASTER_KEY) {
            const syncEl = document.getElementById('syncStatus');
            if(syncEl) { syncEl.style.display="block"; syncEl.innerText = "⏳ Saving..."; }
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_MASTER_KEY }, body: JSON.stringify(appDB)
                });
                if (!response.ok) throw new Error("JSONBin rejected the payload.");
                if(syncEl) syncEl.innerText = "🟢 Saved to Cloud";
            } catch(e) { 
                if(syncEl) syncEl.innerText = "🔴 Save Failed"; 
                console.error(e);
            }
        }
        localStorage.setItem(DB_KEY, JSON.stringify(appDB));
    }

        const comments = getDB('comments');
        comments.push({
            id: generateId(), text: txt, author: currentUser.fullName,

    window.processRegister = function() {

        const role = document.getElementById("r_role").value;
        const secret = document.getElementById("r_secret").value;

        if (!u || !p) { err.innerText = "Username and password required."; err.style.display = "block"; return; }
        
        const members = getDB('members');
        let existingUser = members.find(m => m.id.toLowerCase() === u.toLowerCase());
        
        if (existingUser) {
            if (existingUser.pass && existingUser.pass !== "dadevs0.1" && existingUser.pass !== "brenduling" && existingUser.pass !== "undefined") {
                err.innerText = "Username already registered."; err.style.display = "block"; return;

            if (role === 'admin' && secret !== "brenduling231524") {
                err.innerText = "Invalid admin confirmation code."; err.style.display = "block"; return;

            existingUser.pass = p;
            existingUser.role = role;
            if(role === 'admin') existingUser.status = 'approved';
            else if(!existingUser.status) existingUser.status = 'pending';
            
            setDB('members', members);

    };

    window.logout = function() { localStorage.removeItem("session_user"); location.reload(); }

    async function initApp() {
        await initDB(); 
        const session = localStorage.getItem("session_user");
        const members = getDB('members');
        
        if (session && members.find(m => m.id === session)) {
            currentUser = members.find(m => m.id === session); 
            document.getElementById("authScreen").style.display = "none";
            document.getElementById("app").style.display = "flex";
            
            renderNav(); 
            loadModule("Dashboard");
            startAutoSync();
        } else {
            if(session) localStorage.removeItem("session_user");
            document.getElementById("authScreen").style.display = "block"; 
            document.getElementById("app").style.display = "none";
            
            const adminExists = members.some(m => m.role === 'admin' && m.pass && m.pass !== "undefined");
            if (!adminExists) {
                setAuthMode('register');
                document.getElementById('r_role').value = 'admin';
                document.getElementById('r_secret').style.display = 'block';
            } else {
                setAuthMode('login');
            }
        }
    }

    function renderNav() {
        const n = document.getElementById("navLinks");
        n.innerHTML = modules.map(m => `
            <div class="nav-item ${m === currentModule ? 'active' : ''}" onclick="loadModule('${m}')" title="${m}">
                ${navIcons[m]} <span class="nav-text">${m}</span>
            </div>
        `).join('');
    }

    let lastWidth = window.innerWidth;
    window.addEventListener('resize', () => {
        if(currentUser && window.innerWidth !== lastWidth) {
            lastWidth = window.innerWidth;
            renderNav(); 
        }
    });

    window.loadModule = function(m, silent = false) {
        currentModule = m; 
        document.getElementById("viewTitle").innerText = m;
        
        if (m !== 'Gallery') currentGalleryFolder = null;
        if (m !== 'Timeline') editingTimelineId = null;

        if(!silent) renderNav();
        
        const c = document.getElementById("contentArea");

        if (!isApproved()) {
            renderPendingScreen(c);
            return;
        }

        switch(m) {
            case "Dashboard": renderDashboard(c); break;
            case "Profile": renderProfile(c); break;
            case "Timeline": renderTimeline(c); break;
            case "Sprint Board": renderSprintBoard(c); break;
            case "Calendar": renderCalendar(c); break;
            case "Funds": renderFunds(c); break;
            case "Resources": renderResources(c); break;
            case "Gallery": renderGallery(c); break;
        }
    }

    window.toggleSettings = function() {

    window.saveMyProfile = function() {
        const fullName = document.getElementById('myFullName').value;
        const sticker = document.getElementById('mySticker').value;
        const birthday = document.getElementById('myBirthday').value;
        const messenger = document.getElementById('myMessenger').value;
        const github = document.getElementById('myGithub').value;
        const gmail = document.getElementById('myGmail').value;
        const phone = document.getElementById('myPhone').value;

        if (!fullName) return alert("Full Name is required");

        let members = getDB('members');
        const idx = members.findIndex(m => m.id === currentUser.id);
        if (idx > -1) {
            members[idx] = { ...members[idx], fullName, sticker, birthday, messenger, github, gmail, phone };
            setDB('members', members);
            currentUser = members[idx]; 
            alert("Profile Updated Successfully!");
            loadModule(currentModule);
        }
    };

    window.saveMyProfileFull = async function() {
        const fullName = document.getElementById('myFullName').value;
        const pass = document.getElementById('myPassword').value;
        const sticker = document.getElementById('mySticker').value;
        const birthday = document.getElementById('myBirthday').value;
        const messenger = document.getElementById('myMessenger').value;
        const github = document.getElementById('myGithub').value;
        const gmail = document.getElementById('myGmail').value;
        const phone = document.getElementById('myPhone').value;
        const fileInput = document.getElementById('myAvatarFile');

        if (!fullName) return alert("Full Name is required");

        let members = getDB('members');
        const idx = members.findIndex(m => m.id === currentUser.id);
        if (idx === -1) return;

        let avatar = members[idx].avatar;

        if(fileInput && fileInput.files.length > 0) {
            document.getElementById('syncStatus').style.display = "block";
            document.getElementById('syncStatus').innerText = "⏳ Uploading Avatar...";
            try {
                const file = fileInput.files[0];
                const formData = new FormData();
                formData.append("file", file);
                formData.append("upload_preset", "dadevs_preset");
                
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: "POST", body: formData });
                const data = await response.json();
                if (!data.secure_url) throw new Error(data.error?.message || "Cloudinary API Rejected");
                
                avatar = data.secure_url; 
            } catch(e) {
                alert("Avatar Upload Failed: " + e.message);
                document.getElementById('syncStatus').innerText = "🔴 Failed";
                return; 
            }
        }

        members[idx] = { ...members[idx], fullName, sticker, birthday, messenger, github, gmail, phone, avatar };
        if (pass) members[idx].pass = pass; 
        
        setDB('members', members);
        currentUser = members[idx]; 
        alert("Profile Updated Successfully!");
        loadModule('Profile');
    };

    window.approveMember = function(id) {
        let members = getDB('members'); let m = members.find(x => x.id === id);
        if (m) { m.status = 'approved'; setDB('members', members); loadModule('Profile'); }
    };
    window.rejectMember = function(id) {
        let members = getDB('members'); setDB('members', members.filter(x => x.id !== id)); loadModule('Profile');
    };
    window.deleteMember = function(id) {
        if(!confirm("Are you sure you want to completely remove this member?")) return;
        let members = getDB('members'); setDB('members', members.filter(x => x.id !== id)); loadModule('Profile');
    };

                    </div>
                    <button id="tlSubmitBtn" onclick="submitTimeline()" style="flex:1; margin-top: 14px;">Add Task</button>
                    <button id="tlCancelBtn" onclick="cancelEditTimeline()" style="flex:0.5; margin-top: 14px; display:none; background:rgba(255,255,255,0.1);">Cancel</button>
                </div>
            </div>`;
        }
        
        html += `<div class="glass card" style="padding-bottom: 5px;"><h3 style="margin-top:0; margin-bottom: 20px;">Project Schedule & Timeline</h3>`;
        if (timeline.length === 0) { 
            html += `<p style="color:#aaa; font-size: 13px;">No timeline data generated by Admin yet.</p></div>`; 
        } else {
            const dates = timeline.flatMap(t => [new Date(t.start).getTime(), new Date(t.scheduled).getTime(), t.end ? new Date(t.end).getTime() : null]).filter(d => d);
            const minDate = Math.min(...dates); let maxDate = Math.max(...dates); let totalSpan = maxDate - minDate;
            if (totalSpan === 0) totalSpan = 86400000; totalSpan = totalSpan * 1.05;

            const phases = [...new Set(timeline.map(t => t.phase || 'Unphased'))];

            html += `<div class="timeline-wrapper">`;
            
            phases.forEach((phaseName, pIdx) => {
                const phaseTasks = timeline.filter(t => (t.phase || 'Unphased') === phaseName);
                
                const isCollapsed = collapsedPhases[phaseName] || false;
                const displayState = isCollapsed ? 'none' : 'table-row-group';
                
                html += `
                <div class="phase-container" style="margin-bottom: 15px;">
                    <div class="phase-header" onclick="togglePhase('${phaseName.replace(/'/g, "\\'")}', 'phase_${pIdx}')">
                        <span>📋 ${phaseName} (${phaseTasks.length} Tasks)</span>
                        <span style="font-size: 10px;">▼ Expand / Collapse</span>
                    </div>
                    <table class="timeline-table">
                        <thead>
                            <tr>
                                <th style="width: 10%;" class="hide-mobile">ID</th>
                                <th style="width: 25%;">Task</th>
                                <th style="width: 5%; text-align:center;">Assigned</th>
                                <th style="width: 10%;" class="hide-mobile">Start</th>
                                <th style="width: 10%;">Target</th>
                                <th style="width: 10%;" class="hide-mobile">Actual</th>
                                <th style="width: 5%;">Prog.</th>
                                <th style="width: 25%; min-width: 100px;" class="hide-mobile">Gantt</th>
                                ${isAdmin() ? '<th style="width: 10%;">Act</th>' : ''}
                            </tr>
                        </thead>
                        <tbody id="phase_${pIdx}" style="display: ${displayState};">
                `;

                phaseTasks.forEach(t => {
                    const startT = new Date(t.start).getTime(); 
                    const schedT = new Date(t.scheduled).getTime();
                    const endT = t.end ? new Date(t.end).getTime() : schedT; 
                    
                    const leftPerc = ((startT - minDate) / totalSpan) * 100; 
                    let widthPerc = ((endT - startT) / totalSpan) * 100;
                    const schedPerc = ((schedT - minDate) / totalSpan) * 100;
                    if (widthPerc < 2) widthPerc = 2; 
                    
                    const prog = t.progress || 0;
                    const isDone = prog == 100;
                    const isLate = isDone && endT > schedT;
                    const owner = t.owner || 'Team';
                    const oColor = memberColors[owner] || 'var(--secondary)';
                    
                    const ownerObj = members.find(m=>m.id===owner);
                    const ownerName = ownerObj?.id || owner;
                    
                    let avatarHTML = '';
                    if(ownerObj && ownerObj.avatar) {
                        avatarHTML = `<img src="${ownerObj.avatar}" class="avatar-mini" style="border-color:${oColor}">`;
                    } else {
                        avatarHTML = `<div class="native-avatar avatar-mini" style="background:${oColor}; border:none;">${userSVGMini}</div>`;
                    }

                    let barColor = "linear-gradient(90deg, var(--primary), var(--secondary))"; 
                    if (isDone) barColor = isLate ? "linear-gradient(90deg, #ef4444, #b91c1c)" : "linear-gradient(90deg, #10b981, #059669)";
                    
                    const formatSmallDate = (dStr) => dStr ? dStr.substring(5) : '---';

                    html += `
                        <tr>
                            <td data-label="ID" class="hide-mobile" style="color:var(--accent); font-weight:bold;">${t.taskId}</td>
                            <td data-label="Task" style="font-weight:500;">${t.title}</td>
                            <td data-label="Owner" style="text-align:center;">
                                <div title="${ownerName}" style="display:inline-block; cursor:help;">
                                    <div class="avatar-mini-wrapper" style="width:28px; height:28px;">${avatarHTML}</div>
                                </div>
                            </td>
                            <td data-label="Start" class="hide-mobile" style="color:#aaa;">${formatSmallDate(t.start)}</td>
                            <td data-label="Target" style="color:var(--secondary);">${formatSmallDate(t.scheduled)}</td>
                            <td data-label="Actual" class="hide-mobile" style="color:${isDone ? (isLate ? '#ef4444' : '#10b981') : '#666'};">${formatSmallDate(t.end)}</td>
                            <td data-label="Prog." style="font-weight:bold;">${prog}%</td>
                            <td data-label="Gantt" class="hide-mobile" style="border:none;">
                                <div class="gantt-track">
                                    <div class="gantt-bar" style="left: ${leftPerc}%; width: ${widthPerc}%; background: ${barColor};">
                                        <div style="position:absolute; left:0; top:0; height:100%; width:${prog}%; background:rgba(0,0,0,0.4);"></div>
                                    </div>
                                    <div style="position:absolute; left:${schedPerc}%; top:0; height:100%; width:3px; background:var(--accent); z-index:2; box-shadow:0 0 8px var(--accent);"></div>
                                </div>
                            </td>
                            ${isAdmin() ? `
                            <td data-label="Act">
                                <div style="display:flex; gap:5px;">
                                    <button class="icon-btn" style="background:rgba(34,211,238,0.2); color:var(--secondary); padding: 6px 10px; border-radius:4px; font-size:10px;" onclick="editTimeline(${t.id})">✎</button>
                                    <button class="danger" style="position:relative; right:auto; top:auto; background:rgba(239, 68, 68, 0.2); padding: 6px 10px; border-radius:4px; font-size:10px; width:auto; margin:0;" onclick="deleteTimeline(${t.id})">✖</button>
                                </div>
                            </td>
                            ` : ''}
                        </tr>
                    `;
                });
                html += `</tbody></table></div></div>`;
            });
            html += `</div></div>`; 
        }

        html += `<h3 style="margin-top: 30px; margin-bottom: 15px; color: var(--secondary);">Individual Task Records</h3>`;
        html += `<div class="grid-5" style="margin-bottom: 20px;">`;
        
        members.forEach(m => {
            const mTasks = timeline.filter(t => t.owner === m.id);
            const mColor = memberColors[m.id] || 'var(--accent)';
            
            html += `
                <div class="glass card" style="padding: 15px; border-top: 3px solid ${mColor}; cursor:pointer;" onclick="showUserModal('${m.id}')">
                    <div style="font-weight: bold; color: ${mColor}; margin-bottom: 10px; border-bottom: 1px solid var(--glass-border); padding-bottom: 5px; display:flex; align-items:center; gap:8px;">
                        <div class="avatar-mini-wrapper">
                            ${m.avatar ? `<img src="${m.avatar}" class="avatar-mini">` : `<div class="native-avatar avatar-mini" style="background:${mColor}; border:none;">${userSVGMini}</div>`}
                        </div>
                        ${m.id}
                    </div>
                    <div style="display:flex; flex-direction:column; gap:8px; max-height: 250px; overflow-y: auto; padding-right: 5px;">
            `;
            if (mTasks.length === 0) {
                html += `<div style="font-size: 11px; color: #aaa; text-align: center;">No assigned tasks</div>`;
            } else {
                mTasks.sort((a,b) => new Date(a.scheduled) - new Date(b.scheduled)).forEach(t => {
                    const isDone = t.progress == 100;
                    const isLate = isDone && new Date(t.end) > new Date(t.scheduled);
                    const borderCol = isDone ? (isLate ? '#ef4444' : '#10b981') : 'var(--glass-border)';
                    
                    html += `
                        <div style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; border: 1px solid ${borderCol};">
                            <div style="display:flex; justify-content:space-between; margin-bottom: 4px;">
                                <span style="font-weight:bold; font-size:12px; color:${isDone ? '#fff' : '#fff'};">${t.title}</span>
                                <span style="font-size:10px; color:var(--accent);">${t.taskId}</span>
                            </div>
                            <div style="font-size:10px; color:#aaa;">Target: ${t.scheduled}</div>
                            ${isDone ? `<div style="font-size:10px; color:${isLate ? '#ef4444' : '#10b981'};">Done: ${t.end} ${isLate?'(Late)':'(On Time)'}</div>` : ''}
                            
                            <div style="margin-top: 5px; background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; overflow: hidden;">
                                <div style="width: ${t.progress || 0}%; background: ${isDone ? (isLate ? '#ef4444' : '#10b981') : mColor}; height: 100%;"></div>
                            </div>
                            <div style="font-size:10px; color:${mColor}; text-align:right; margin-top:2px;">${t.progress || 0}%</div>
                        </div>
                    `;
                });
            }
            html += `</div></div>`;
        });
        html += `</div>`;

        container.innerHTML = html;
    }
    
    window.submitTimeline = function() {
        const phase = document.getElementById('tlPhase').value || 'Phase 1';
        const title = document.getElementById('tlTitle').value; 
        const owner = document.getElementById('tlOwner').value; 
        const start = document.getElementById('tlStart').value; 
        const sched = document.getElementById('tlSched').value;
        const progress = document.getElementById('tlProgress').value || 0;
        const end = document.getElementById('tlEnd').disabled ? "" : document.getElementById('tlEnd').value;
        
        if(!title || !owner || !start || !sched) return alert("Fill Task Name, Owner, Start, and Scheduled Dates."); 
        if(progress == 100 && !end) return alert("Please provide the Actual End Date for completed tasks.");
        if(end && new Date(start) > new Date(end)) return alert("Start date must be before actual end date.");
        
        let tl = getDB('timeline'); 
        
        if (editingTimelineId) {
            const idx = tl.findIndex(t => t.id === editingTimelineId);
            if (idx > -1) {
                tl[idx] = { ...tl[idx], phase, title, owner, start, end: end || null, scheduled: sched, progress: parseInt(progress) };
            }
            editingTimelineId = null;
        } else {
            let maxId = 0;
            tl.forEach(t => {
                if(t.taskId && t.taskId.startsWith('TSK-')) {
                    let num = parseInt(t.taskId.split('-')[1]);
                    if(num > maxId) maxId = num;
                }
            });
            const taskId = `TSK-${(maxId + 1).toString().padStart(3, '0')}`;
            tl.push({ id: generateId(), taskId, phase, title, owner, start, end: end || null, scheduled: sched, progress: parseInt(progress) }); 
        }
        
        setDB('timeline', tl); loadModule('Timeline');
    }
    
    window.editTimeline = function(id) {
        const tl = getDB('timeline').find(t => t.id === id);
        if(!tl) return;
        
        editingTimelineId = id;
        document.getElementById('tlPhase').value = tl.phase || 'Phase 1';
        document.getElementById('tlTitle').value = tl.title;
        
        const ownerSelect = document.getElementById('tlOwner');
        if([...ownerSelect.options].some(o => o.value === tl.owner)) ownerSelect.value = tl.owner;
        else ownerSelect.value = "Team";
        
        document.getElementById('tlStart').value = tl.start;
        document.getElementById('tlSched').value = tl.scheduled || tl.end || ''; 
        document.getElementById('tlProgress').value = tl.progress || 0;
        
        const endInput = document.getElementById('tlEnd');
        if (tl.progress == 100) { endInput.disabled = false; endInput.value = tl.end || ''; } 
        else { endInput.disabled = true; endInput.value = ''; }
        
        document.getElementById('tlFormTitle').innerText = `Admin: Edit Task ${tl.taskId}`;
        document.getElementById('tlSubmitBtn').innerText = "Update Task";
        document.getElementById('tlCancelBtn').style.display = "block";
        document.getElementById('timelineAdminPanel').scrollIntoView({ behavior: 'smooth' });
    }
    window.cancelEditTimeline = function() { editingTimelineId = null; loadModule('Timeline'); }
    window.deleteTimeline = function(id) { setDB('timeline', getDB('timeline').filter(t => t.id !== id)); loadModule('Timeline'); }

                                <div style="font-size: 12px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 4px;">
                                    <strong>Del:</strong> ${s.deliverables}
                                </div>
                                ${isAdmin() ? `
                                <div style="margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
                                    <select onchange="moveSprint(${s.id}, this.value)" class="mobile-move-select">
                                        <option value="" disabled selected>Move to...</option>
                                        <option value="To Do">To Do</option>
                                        <option value="In Progress">In Progress</option>
                                        <option value="Review">Review</option>
                                        <option value="Done">Done</option>
                                    </select>
                                </div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        });
        html += `</div>`; container.innerHTML = html;
    }
    
    window.addSprintContainer = function() {
        const name = document.getElementById('smName').value;
        const weeks = document.getElementById('smWeeks').value;
        const phase = document.getElementById('smPhase').value;
        if(!name) return alert("Sprint Name is required.");
        const sprints = getDB('sprints');
        sprints.push({
            id: generateId(), name, weeks: weeks||1, phase: phase||'None',
            objectives: document.getElementById('smObj').value || 'TBD',
            deliverables: document.getElementById('smDel').value || 'TBD',
            status: 'To Do'
        });
        setDB('sprints', sprints); loadModule('Sprint Board');

    window.allowDrop = function(ev) { if(isAdmin()) ev.preventDefault(); }
    window.dragSprint = function(ev, id) { if(isAdmin()) ev.dataTransfer.setData("sprintId", id); }
    window.dropSprint = function(ev, newStatus) {
        if(!isAdmin()) return; ev.preventDefault(); const id = parseInt(ev.dataTransfer.getData("sprintId"));
        let sprints = getDB('sprints'); const sIdx = sprints.findIndex(s => s.id === id);
        if (sIdx > -1) { sprints[sIdx].status = newStatus; setDB('sprints', sprints); loadModule('Sprint Board'); }
    }
    window.moveSprint = function(id, newStatus) {
        if(!isAdmin() || !newStatus) return;
        let sprints = getDB('sprints'); const sIdx = sprints.findIndex(s => s.id === id);
        if (sIdx > -1) { sprints[sIdx].status = newStatus; setDB('sprints', sprints); loadModule('Sprint Board'); }
    }

    // --- MODULE: CALENDAR ---
    function renderCalendar(container) {
        const manualEvents = getDB('calendar'); 
        const timeline = getDB('timeline');
        const members = getDB('members');
        const currentYear = viewDate.getFullYear();
        
        let allEvents = [...manualEvents];
        
        timeline.forEach(t => {
            if (t.scheduled) {
                allEvents.push({ id: 'tl_' + t.id, title: `Due: ${t.title}`, date: t.scheduled, type: 'timeline-task', owner: t.owner });
            }
        });

        members.forEach(m => {
            if (m.birthday) {
                const bdayMD = m.birthday.substring(5); 
                allEvents.push({ id: 'bday_' + m.id, title: `🎂 ${m.fullName}'s Bday`, date: `${currentYear}-${bdayMD}`, type: 'birthday', owner: m.id });
            }
        });

        let html = '';
        if (isAdmin()) {
            html += `
            <div class="glass admin-panel">
                <h4 style="margin-top:0; color:var(--accent)">Admin: Schedule Manual Event</h4>
                <div class="flex-row">
                    <input id="evTitle" placeholder="Event Title" style="flex:2;">
                    <input id="evDate" type="date" style="flex:1;">
                    <select id="evType" style="flex:1;">
                        <option value="meeting">Meeting</option><option value="overnight">Overnight</option>
                        <option value="defense">Defense</option><option value="other">Other</option>
                    </select>
                    <button onclick="addEvent()" style="flex:1; margin:0;">Schedule</button>
                </div>
            </div>`;
        }

        const currentMonth = viewDate.getMonth(); 
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        const todayStr = new Date().toISOString().split('T')[0];
        
        const monthEvents = allEvents.filter(e => { const eDate = new Date(e.date); return eDate.getMonth() === currentMonth && eDate.getFullYear() === currentYear; }).sort((a,b) => new Date(a.date) - new Date(b.date));

        html += `
        <div class="grid-3">
            <div class="glass card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                    <h3 style="margin:0;" class="neon">${monthNames[currentMonth]} ${currentYear}</h3>
                    <div style="display:flex; gap: 5px;">
                        <button class="icon-btn" onclick="changeMonth(-1)">&#8592;</button>
                        <button class="icon-btn" onclick="changeMonth(1)">&#8594;</button>
                    </div>
                </div>
                <div class="cal-grid">
                    <div class="cal-header">Sun</div><div class="cal-header">Mon</div><div class="cal-header">Tue</div>
                    <div class="cal-header">Wed</div><div class="cal-header">Thu</div><div class="cal-header">Fri</div><div class="cal-header">Sat</div>`;
        
        for(let i = 0; i < firstDay; i++) { html += `<div class="cal-day empty"></div>`; }
        for(let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isToday = dateStr === todayStr ? 'today' : '';
            const dayEvents = allEvents.filter(e => e.date === dateStr);
            
            let dots = ''; 
            dayEvents.forEach(e => { 
                let style = '';
                if (e.type === 'timeline-task') {
                    let color = memberColors[e.owner] || 'var(--accent)';
                    style = `background: ${color}; box-shadow: 0 0 5px ${color};`;
                }
                dots += `<div class="cal-event-dot event-${e.type}" style="${style}" title="${e.title}"></div>`; 
            });
            html += `<div class="cal-day ${isToday}"><div style="font-size:14px;">${d}</div><div style="display:flex; gap:3px; flex-wrap:wrap; justify-content:center; width:100%; margin-top:2px;">${dots}</div></div>`;
        }
        
        html += `</div></div>
            <div class="glass card" style="display:flex; flex-direction:column;">
                <h3 style="margin-top:0; color:var(--accent);">Scheduled Events & Deadlines</h3><div style="flex:1; overflow-y:auto; padding-right:5px;">`;
        if(monthEvents.length === 0) { html += `<p style="color:#aaa; font-size:14px; text-align:center;">No events scheduled this month.</p>`; } 
        else {
            monthEvents.forEach(e => {
                let style = '';
                if (e.type === 'timeline-task') {
                    let color = memberColors[e.owner] || 'var(--accent)';
                    style = `background: ${color}; box-shadow: 0 0 5px ${color};`;
                }
                const isTimeline = e.type === 'timeline-task';
                const isBday = e.type === 'birthday';
                
                let borderCol = 'transparent';
                if(isTimeline) borderCol = memberColors[e.owner] || 'var(--accent)';
                if(isBday) borderCol = '#f59e0b';

                html += `
                <div class="event-list-item" style="border-left: 3px solid ${borderCol}">
                    <div class="cal-event-dot event-${e.type}" style="${style} width:12px; height:12px; margin:0;"></div>
                    <div style="flex:1;">
                        <div style="font-weight:bold; font-size:14px;">${e.title}</div>
                        <div style="font-size:11px; color:#aaa;">${e.date} &bull; <span style="text-transform:capitalize">${isTimeline ? `Timeline (${e.owner})` : e.type}</span></div>
                    </div>
                    ${(isAdmin() && !isTimeline && !isBday) ? `<button class="delete-btn" style="position:relative; top:0; right:0;" onclick="deleteEvent(${e.id})">✖</button>` : ''}
                </div>`;
            });
        }
        html += `</div></div></div>`; container.innerHTML = html;
    }
    window.changeMonth = function(dir) { viewDate.setMonth(viewDate.getMonth() + dir); loadModule('Calendar'); }
    window.addEvent = function() {

    function renderFunds(container) {

        let total = 0, income = 0, expenses = 0;
        let memberTotals = {};
        members.forEach(m => memberTotals[m.id] = 0);
        
        let incomeList = []; let expenseList = [];

        funds.forEach(f => { 
            if(f.type === 'in') { 
                total += f.amount; income += f.amount; 
                incomeList.push(f);
                if (memberTotals[f.contributor] !== undefined) memberTotals[f.contributor] += f.amount;

        if (isAdmin()) {

                <h4 style="margin-top:0; color:var(--accent)">Admin: Record Transaction</h4>
                <div class="flex-row">
                    <select id="fundType" style="flex:1;" onchange="
                        if(this.value === 'in') { document.getElementById('fundContributor').style.display='block'; document.getElementById('fundDesc').style.display='none'; }
                        else { document.getElementById('fundContributor').style.display='none'; document.getElementById('fundDesc').style.display='block'; }
                    ">
                        <option value="in">Contribution (Income)</option><option value="out">Expense (-)</option>
                    </select>
                    <input id="fundDate" type="date" value="${todayStr}" style="flex:1;">
                    <select id="fundContributor" style="flex:2; display:block;">
                        <option value="" disabled selected>Select Contributor...</option>

                        <option value="Other">Other / Misc Income</option>
                    </select>
                    <input id="fundDesc" placeholder="Expense Description" style="flex:2; display:none;">
                    <input id="fundAmt" type="number" placeholder="Amount (₱)" style="flex:1;">
                    <button onclick="addFund()" style="flex:1; margin:0;">Record</button>
                </div>
            </div>`;
        }

        html += `<div class="grid-2">`;
        html += `<div class="glass card"><h3 style="margin-top:0; color:#10b981;">Contributions History</h3><div style="display:flex; flex-direction:column; gap:10px;">`;
        if (incomeList.length === 0) html += `<p style="text-align:center; color:#aaa; font-size:12px;">No contributions.</p>`;
        else {
            incomeList.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(f => {
                const cName = members.find(m=>m.id === f.contributor)?.fullName || f.contributor || 'Unknown';
                html += `
                    <div style="display:flex; justify-content:space-between; padding:10px; background:rgba(0,0,0,0.2); border-radius:8px; align-items:center; border:1px solid var(--glass-border);">
                        <div><div style="font-weight:bold; color:var(--secondary); font-size:14px;">${cName}</div><div style="font-size:10px; color:#aaa;">${f.date}</div></div>
                        <div style="display:flex; align-items:center; gap: 10px;">
                            <div style="font-weight:bold; color:#10b981;">+₱${f.amount}</div>

                        </div>
                    </div>`;

        html += `</div></div>`;

        html += `<div class="glass card"><h3 style="margin-top:0; color:#ef4444;">Expenses History</h3><div style="display:flex; flex-direction:column; gap:10px;">`;
        if (expenseList.length === 0) html += `<p style="text-align:center; color:#aaa; font-size:12px;">No expenses.</p>`;
        else {
            expenseList.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(f => {

    window.addFund = function() {
        const type = document.getElementById('fundType').value;
        const date = document.getElementById('fundDate').value; 
        const amt = parseFloat(document.getElementById('fundAmt').value); 
        let desc = ""; let contributor = "";
        
        if (type === 'in') {
            contributor = document.getElementById('fundContributor').value;
            if(!contributor) return alert("Select a contributor.");
            desc = "Contribution";
        } else {
            desc = document.getElementById('fundDesc').value;
            if(!desc) return alert("Enter expense description.");
        }

        if (isNaN(amt) || amt <= 0 || !date) return alert("Enter valid date and amount.");
        
        const funds = getDB('funds'); 
        funds.push({ id: generateId(), date, desc, amount: amt, type, contributor }); 
        setDB('funds', funds); loadModule('Funds');
    }
    window.deleteFund = function(id) { setDB('funds', getDB('funds').filter(f => f.id !== id)); loadModule('Funds'); }

    // --- RESOURCES ---
    function renderResources(container) {
        const res = getDB('resources'); let html = '';
        
        const allUsedTags = [...new Set(res.flatMap(r => r.tags || []))];
        const allTags = [...new Set([...defaultResTags, ...allUsedTags])];
        const dlTags = allTags.map(t => `<div class="tag-chip" onclick="appendResTag('${t}')">+ ${t}</div>`).join('');

        if (isAdmin()) {
            html += `
            <div class="glass admin-panel" id="resAdminPanel">
                <h4 style="margin-top:0; color:var(--accent)" id="resFormTitle">Admin: Add Resource</h4>
                <div class="flex-row" style="margin-bottom:10px;">
                    <input id="resTitle" placeholder="Resource Title" style="flex:2;">
                    <select id="resType" style="flex:1;" onchange="

                        document.getElementById('resFile').style.display = this.value === 'file' ? 'block' : 'none';
                    ">
                        <option value="link">Web Link</option>
                        <option value="file">Upload File</option>
                    </select>
                </div>
                <div class="flex-row" style="margin-bottom:10px;">
                    <input id="resUrl" placeholder="Target URL" style="flex:2; display:block; margin:0;">
                    <input id="resFile" type="file" style="flex:2; display:none; margin:0; padding: 9px;" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,.zip,.rar">
                    <input id="resDesc" placeholder="Short Description" style="flex:2; margin:0;">
                </div>
                <div class="flex-row">
                    <input id="resTags" placeholder="Tags (Comma separated, e.g. Survey, Docs)" style="flex:3; margin:0;">
                    <button id="resSubmitBtn" onclick="addResource()" style="flex:1; margin:0;">Add Resource</button>
                    <button id="resCancelBtn" onclick="cancelEditResource()" style="flex:0.5; margin:0; display:none; background:rgba(255,255,255,0.1);">Cancel</button>
                </div>
                <div style="display:flex; gap:5px; margin-top:10px; flex-wrap:wrap;">
                    <span style="font-size:10px; color:#aaa; margin-right:5px; line-height:20px;">Quick Tags:</span>
                    ${dlTags}
                </div>
            </div>`;
        }

        const filterChips = allTags.map(t => `
            <div class="tag-chip ${resActiveTag === t ? 'active' : ''}" onclick="setResTag('${t}')">${t}</div>
        `).join('');

        html += `
        <div class="glass card">
            <div style="display:flex; gap:10px; margin-bottom: 15px;">
                <input class="res-search" placeholder="🔍 Search resources by title or description..." value="${resSearchTerm}" onkeyup="setResSearch(this.value)" id="resSearchInput">
            </div>
            <div style="display:flex; gap:5px; margin-bottom: 20px; flex-wrap:wrap;">
                <div class="tag-chip ${resActiveTag === null ? 'active' : ''}" onclick="setResTag(null)">All</div>
                ${filterChips}
            </div>
            <div style="display:flex; flex-direction:column; gap:10px;">
        `;

        let filteredRes = res.filter(r => {
            const matchesSearch = !resSearchTerm || r.title.toLowerCase().includes(resSearchTerm) || r.desc.toLowerCase().includes(resSearchTerm);
            const matchesTag = !resActiveTag || (r.tags && r.tags.includes(resActiveTag));
            return matchesSearch && matchesTag;
        });

        if (filteredRes.length === 0) {
            html += `<p style="color:#aaa; text-align:center;">No resources found.</p>`;
        } else {
            filteredRes.forEach(r => {
                const isFile = r.type === 'file';
                const tagDisplay = (r.tags || []).map(t => `<span style="background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:4px; font-size:9px; margin-right:5px;">${t}</span>`).join('');
                
                html += `
                    <div class="resource-item" style="display: flex; align-items: center; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; margin-bottom: 10px;">
                        <div style="display:flex; align-items:center; flex:1;">
                            <div class="resource-icon" style="width: 40px; height: 40px; border-radius: 8px; background: rgba(34,211,238,0.1); color: var(--secondary); display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 20px; margin-right: 15px; flex-shrink:0;">${isFile ? '📄' : '🔗'}</div>
                            <div>
                                <div style="font-weight:bold; font-size:16px;">${r.title}</div>
                                <div style="font-size:12px; color:#aaa; margin-top:4px;">${r.desc} ${isFile && r.fileName ? `(${r.fileName})` : ''}</div>
                                <div style="margin-top:6px;">${tagDisplay}</div>
                            </div>
                        </div>
                        <div style="display:flex; gap:10px; flex-wrap:wrap;">
                            ${isFile 
                                ? `<button onclick="downloadFile('${r.url}', '${r.fileName || 'resource'}')" style="width:auto; padding:8px 15px; margin:0; font-size:12px;">Download</button>`
                                : `<button onclick="window.open('${r.url}', '_blank')" style="width:auto; padding:8px 15px; margin:0; font-size:12px;">Open</button>`
                            }
                            ${isAdmin() ? `
                                <button class="icon-btn" style="background:rgba(34,211,238,0.2); color:var(--secondary); padding: 8px 15px; border-radius:8px; font-size:12px;" onclick="editResource(${r.id})">Edit</button>
                                <button class="danger" onclick="deleteResource(${r.id})" style="width:auto; padding:8px 15px; margin:0; font-size:12px;">Drop</button>
                            ` : ''}
                        </div>
                    </div>`;
            });
        }
        html += `</div></div>`; container.innerHTML = html;
        
        if(resSearchTerm !== '') {
            const el = document.getElementById('resSearchInput');
            if(el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }

    window.setResSearch = (val) => { 
        resSearchTerm = val.toLowerCase(); 
        renderResources(document.getElementById('contentArea')); 
    }
    window.setResTag = (tag) => { resActiveTag = resActiveTag === tag ? null : tag; loadModule('Resources', true); }
    window.appendResTag = (tag) => {
        const input = document.getElementById('resTags');
        let current = input.value.split(',').map(t=>t.trim()).filter(t=>t);
        if(!current.includes(tag)) current.push(tag);
        input.value = current.join(', ');
    }

    window.editResource = function(id) {
        const r = getDB('resources').find(x => x.id === id);
        if(!r) return;
        editingResourceId = id;
        document.getElementById('resTitle').value = r.title;
        document.getElementById('resType').value = r.type;
        
        if(r.type === 'link') {
            document.getElementById('resUrl').style.display = 'block';
            document.getElementById('resFile').style.display = 'none';
            document.getElementById('resUrl').value = r.url;
        } else {
            document.getElementById('resUrl').style.display = 'none';
            document.getElementById('resFile').style.display = 'block';
        }
        
        document.getElementById('resDesc').value = r.desc;
        document.getElementById('resTags').value = (r.tags || []).join(', ');
        
        document.getElementById('resFormTitle').innerText = "Admin: Edit Resource";
        document.getElementById('resSubmitBtn').innerText = "Update";
        document.getElementById('resCancelBtn').style.display = "block";
        document.getElementById('resAdminPanel').scrollIntoView({ behavior: 'smooth' });
    }

    window.cancelEditResource = function() { editingResourceId = null; loadModule('Resources'); }

    window.addResource = async function() {
        const title = document.getElementById('resTitle').value; 
        const type = document.getElementById('resType').value;
        const desc = document.getElementById('resDesc').value;
        const tagsStr = document.getElementById('resTags').value;
        const tags = tagsStr.split(',').map(t=>t.trim()).filter(t=>t);

        if(!title) return alert("Title is required.");

        let res = getDB('resources');
        let existing = editingResourceId ? res.find(r => r.id === editingResourceId) : null;

        if (type === 'link') {
            const url = document.getElementById('resUrl').value;
            if(!url) return alert("URL is required.");
            
            if (existing) {
                existing.title = title; existing.type = type; existing.url = url; existing.desc = desc; existing.tags = tags;
            } else {
                res.push({ id: generateId(), title, type, url, desc, tags }); 
            }
            editingResourceId = null;
            setDB('resources', res); loadModule('Resources');
        } else {
            const fileInput = document.getElementById('resFile');
            if(!fileInput.files[0] && !existing) return alert("Please select a file.");
            
            if (fileInput.files[0]) {
                const file = fileInput.files[0];
                if(file.size > 250000) return alert("File is too large for database storage. Use Web Link instead.");
                
                document.getElementById('syncStatus').style.display = "block";
                document.getElementById('syncStatus').innerText = "⏳ Processing file...";
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (existing) {
                        existing.title = title; existing.type = type; existing.url = e.target.result; existing.desc = desc; existing.fileName = file.name; existing.tags = tags;
                    } else {
                        res.push({ id: generateId(), title, type, url: e.target.result, desc, fileName: file.name, tags }); 
                    }
                    editingResourceId = null;
                    setDB('resources', res); loadModule('Resources');
                };
                reader.readAsDataURL(file);
            } else if (existing) {
                existing.title = title; existing.type = type; existing.desc = desc; existing.tags = tags;
                editingResourceId = null;
                setDB('resources', res); loadModule('Resources');
            }
        }
    }
    window.deleteResource = function(id) { setDB('resources', getDB('resources').filter(r => r.id !== id)); loadModule('Resources'); }

    function renderGallery(container) {

        if (isAdmin()) {

        if (currentGalleryFolder === null) {

                html += `<div><p style="color:#aaa;">No folders or images yet.</p></div>`;

                        <div style="font-size: 40px; margin-bottom: 10px;">🖼️</div>
                        <div style="font-weight: bold; font-size: 16px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); text-align:center; padding: 0 10px;">All Photos</div>
                        <div style="font-size: 12px; color: #fff; font-weight: bold; margin-top: 5px;">${totalImages} Items</div>
                    </div>
                </div>`;
                
                folderNames.forEach(fName => {
                    html += `
                    <div class="gallery-item" style="cursor:pointer;" onclick="window.openGalleryFolder('${fName}')">
                        <img src="${folders[fName].cover}" alt="Folder Cover" style="opacity: 0.4;">
                        <div class="folder-overlay">
                            <div style="font-size: 40px; margin-bottom: 10px;">📁</div>

                });

            }

    // Lightbox Logic
    window.openLightbox = function(url, caption) {

    window.openGalleryFolder = function(fName) { currentGalleryFolder = fName; loadModule('Gallery', true); }
    window.closeGalleryFolder = function() { currentGalleryFolder = null; loadModule('Gallery', true); }
    
    window.addPhoto = async function() {
        const fileInput = document.getElementById('galFile');
        const urlInput = document.getElementById('galUrl');
        const caption = document.getElementById('galCap').value || 'Untitled';
        const folder = document.getElementById('galFolder').value.trim() || 'Uncategorized';
        
        const gal = getDB('gallery');

        if (urlInput && urlInput.value.trim() !== '') {
            gal.push({ id: generateId(), url: urlInput.value.trim(), caption: caption, folder: folder });
            currentGalleryFolder = folder;
            setDB('gallery', gal); 
            loadModule('Gallery');
            return;
        }

        if(fileInput && fileInput.files.length > 0) {
            try {
                for(let i=0; i < fileInput.files.length; i++) {
                    const file = fileInput.files[i];
                    document.getElementById('syncStatus').style.display = "block";
                    document.getElementById('syncStatus').innerText = `⏳ Uploading to Cloudinary...`;
                    
                    const formData = new FormData();
                    formData.append("file", file);
                    formData.append("upload_preset", "dadevs_preset");
                    
                    const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { 
                        method: "POST", body: formData 
                    });
                    
                    const data = await response.json();
                    if (!data.secure_url) throw new Error(data.error?.message || "Cloudinary API Rejected");
                    
                    let finalCaption = fileInput.files.length > 1 ? `${caption} (${i+1})` : caption;
                    gal.push({ id: generateId(), url: data.secure_url, caption: finalCaption, folder: folder });
                }
                
                currentGalleryFolder = folder;
                setDB('gallery', gal); 
                loadModule('Gallery');
                document.getElementById('syncStatus').innerText = "🟢 Sync Complete";
            } catch(e) {
                alert("Cloudinary Upload Failed. Please check if 'dadevs_preset' is set to Unsigned.\n\nFallback: Upload the photo to Discord or Drive and paste the link in Option 2.");
                document.getElementById('syncStatus').innerText = "🔴 Failed";
            }
            return;
        }
        alert("Please either select a file OR paste an image link.");
    }
    
    window.deletePhoto = function(id) { 
        let gal = getDB('gallery');
        const photo = gal.find(g => g.id === id);
        const targetFolder = photo ? (photo.folder || 'Uncategorized') : null;
        gal = gal.filter(g => g.id !== id);
        
        if (targetFolder && currentGalleryFolder !== 'ALL_PHOTOS' && !gal.some(g => (g.folder || 'Uncategorized') === targetFolder)) {
            currentGalleryFolder = null; 
        }
        
        setDB('gallery', gal); loadModule('Gallery', true); 
    }

    // --- SECURITY OVERRIDES ---
    document.addEventListener("contextmenu", e => e.preventDefault());
    document.addEventListener("keydown", e => {
        if (e.key === "F12" || (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) || (e.ctrlKey && e.key === "U")) {
            e.preventDefault(); alert("DaDevs Security Protocol: Developer Tools Locked.");
        }
    });

    window.onload = async () => { await initApp(); };
</script>
</body>
</html>

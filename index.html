<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0F172A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DaDevs 0.1 - Workspace</title>
    <style>
        :root {
            --bg-1: #0F172A; --bg-2: #1E293B;
            --primary: #2D2A8C; --secondary: #22D3EE;
            --accent: #8B5CF6; --text: #f8fafc;
            --glass-bg: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
        }
        body {
            margin: 0; font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
            color: var(--text); overflow: hidden; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .glass {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .neon { color: var(--secondary); text-shadow: 0 0 8px rgba(34,211,238,0.4); }
        .accent { color: var(--accent); }
        
        /* Login */
        #login { padding: 40px; text-align: center; width: 320px; transition: opacity 0.5s; max-width: 90%; }
        input, select, textarea {
            width: 100%; padding: 10px 12px; margin: 8px 0; background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border); color: var(--text);
            border-radius: 8px; box-sizing: border-box; outline: none; font-family: inherit;
        }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        input:focus, select:focus, textarea:focus { border-color: var(--secondary); }
        button {
            width: 100%; padding: 12px; background: var(--accent); color: var(--text);
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
            margin-top: 5px;
        }
        button:hover { background: var(--primary); box-shadow: 0 0 15px rgba(34,211,238,0.35); }
        button.danger { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; }
        button.danger:hover { background: #ef4444; color: #fff; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        
        /* App Layout */
        #app { display: none; width: 100vw; height: 100vh; flex-direction: row; }
        
        /* Persistent Collapsible Sidebar */
        #sidebar {
            width: 250px; display: flex; flex-direction: column; border-right: 1px solid var(--glass-border);
            border-radius: 0; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
            background: rgba(15, 23, 42, 0.5); flex-shrink: 0; overflow: hidden;
        }
        #sidebar.collapsed { width: 75px; }

        .sidebar-header {
            display: flex; justify-content: space-between; align-items: center; padding: 20px; height: 75px;
            box-sizing: border-box; border-bottom: 1px solid var(--glass-border); white-space: nowrap;
        }
        #sidebar.collapsed .sidebar-header { justify-content: center; padding: 20px 0; }
        #sidebar.collapsed .brand-text { display: none; }

        .toggle-btn {
            background: none; border: none; color: var(--text); padding: 5px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; border-radius: 5px; transition: 0.2s; margin: 0; width: auto;
        }
        .toggle-btn:hover { color: var(--secondary); background: rgba(255,255,255,0.1); box-shadow: none; }

        .nav-links { flex: 1; padding: 15px 10px; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; gap: 8px; }
        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 12px; border-radius: 8px; cursor: pointer;
            transition: 0.2s; white-space: nowrap; font-weight: 500; font-size: 14px;
        }
        .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
        .nav-item:hover, .nav-item.active { background: rgba(34,211,238,0.1); color: var(--secondary); transform: translateX(5px); }
        #sidebar.collapsed .nav-item { justify-content: center; padding: 12px 0; transform: none; }
        #sidebar.collapsed .nav-item:hover { transform: translateY(-2px); }
        #sidebar.collapsed .nav-text { display: none; }

        .sidebar-footer { padding: 20px; border-top: 1px solid var(--glass-border); white-space: nowrap; display: flex; flex-direction: column; gap: 15px; }
        #sidebar.collapsed .sidebar-footer { padding: 20px 0; align-items: center; }
        #sidebar.collapsed .user-info { display: none; }
        
        .logout-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444; color: #ef4444; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin: 0; width: 100%;
        }
        .logout-btn:hover { background: #ef4444; color: #fff; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        #sidebar.collapsed .logout-btn { padding: 10px; width: auto; border: none; background: transparent; }
        #sidebar.collapsed .logout-btn-text { display: none; }

        /* Main Content */
        #main { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; transition: 0.3s; min-width: 0; }
        
        /* Modules */
        .card { padding: 20px; margin-bottom: 20px; transition: transform 0.3s; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; } 
        
        .kanban-board { display: flex; gap: 20px; min-height: 400px; overflow-x: auto; padding-bottom: 20px;}
        .kanban-col { flex: 1; min-width: 280px; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 15px; border: 1px solid var(--glass-border); }
        .kanban-col h3 { margin-top: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--secondary); border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
        .task-card { background: var(--glass-bg); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--glass-border); transition: 0.2s; cursor: grab; position: relative;}
        .task-card:hover { border-color: var(--secondary); transform: translateY(-2px); }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #ef4444; cursor: pointer; padding: 0; width: auto; font-size: 12px; }
        
        .admin-panel { padding: 20px; margin-bottom: 20px; border-left: 4px solid var(--accent); }
        .admin-panel .flex-row { display: flex; gap: 10px; align-items: center; }
        
        .gantt-row { display: flex; align-items: center; margin-bottom: 15px; }
        .gantt-label { width: 180px; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 15px;}
        .gantt-track { flex: 1; background: rgba(0,0,0,0.3); height: 24px; border-radius: 12px; position: relative; overflow: hidden; border: 1px solid var(--glass-border); min-width: 200px; }
        .gantt-bar { position: absolute; height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 12px; box-shadow: 0 0 10px rgba(34,211,238,0.4); display: flex; align-items: center; padding: 0 10px; font-size: 11px; font-weight: bold; color: #fff; box-sizing: border-box; overflow: hidden;}
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .gallery-item { position: relative; border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-border); aspect-ratio: 1 / 1; transition: 0.3s; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .gallery-item:hover img { transform: scale(1.05); }
        .gallery-caption { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); padding: 10px; font-size: 12px; backdrop-filter: blur(5px); }
        .folder-overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; cursor: pointer; transition: 0.3s;}
        .gallery-item:hover .folder-overlay { background: rgba(15, 23, 42, 0.5); }
        
        .resource-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; margin-bottom: 10px; }
        .resource-icon { width: 40px; height: 40px; border-radius: 8px; background: rgba(34,211,238,0.1); color: var(--secondary); display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 20px; margin-right: 15px;}

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-top: 15px; }
        .cal-header { font-weight: bold; color: var(--secondary); font-size: 12px; padding-bottom: 10px; }
        .cal-day { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px; border: 1px solid var(--glass-border); min-height: 50px; position: relative; display: flex; flex-direction: column; align-items: center;}
        .cal-day.empty { background: transparent; border: none; }
        .cal-day.today { border-color: var(--secondary); background: rgba(34,211,238,0.1); }
        .cal-event-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; }
        .event-meeting { background: #3b82f6; box-shadow: 0 0 5px #3b82f6;}
        .event-overnight { background: #8b5cf6; box-shadow: 0 0 5px #8b5cf6;}
        .event-defense { background: #ef4444; box-shadow: 0 0 5px #ef4444;}
        .event-other { background: #10b981; box-shadow: 0 0 5px #10b981;}
        .event-list-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--glass-border);}
        button.icon-btn { width: auto; padding: 8px 15px; background: rgba(255,255,255,0.1); margin: 0; }
        button.icon-btn:hover { background: var(--secondary); color: #000; }

        @media (max-width: 992px) { #main { padding: 20px; } .grid-3 { grid-template-columns: 1fr; } }
        @media (max-width: 768px) {
            #sidebar { width: 200px; } #sidebar.collapsed { width: 65px; } #main { padding: 15px; } .grid-2 { grid-template-columns: 1fr; }
            .admin-panel .flex-row { flex-direction: column; align-items: stretch; } .admin-panel .flex-row > * { width: 100%; margin-bottom: 5px; }
            .gantt-row { flex-direction: column; align-items: flex-start; } .gantt-label { width: 100%; margin-bottom: 5px; } .gantt-track { width: 100%; margin-bottom: 10px; }
            .resource-item { flex-direction: column; align-items: flex-start; gap: 15px; } .resource-item > div:last-child { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <div id="login" class="glass">
        <h1 class="neon">DaDevs <span class="accent">0.1</span></h1>
        <p style="color:#aaa;font-size:0.9em;margin-bottom:20px">Secure Workspace Access</p>
        
        <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; font-size: 13px; color: #ccc; margin-bottom: 25px; text-align: left; line-height: 1.6;">
            <span style="color: var(--secondary); font-weight: bold;">Admin:</span> Bren<br>

        </div>

    <div id="app">
        <div id="sidebar" class="glass">
            <div class="sidebar-header">
                <h2 class="neon brand-text" style="margin:0;">DaDevs <span class="accent">0.1</span></h2>

                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>

<script>
    // ==========================================
    // ☁️ CLOUD SYNC CONFIGURATION ☁️
    // ==========================================
    const ENABLE_CLOUD_SYNC = true; 
    const JSONBIN_BIN_ID = "69b53404aa77b81da9e359ea";
    const JSONBIN_MASTER_KEY = "$2a$10$Tro6Ud5UHq2VqKQnp8Kxo.1MFLWorIUvmpahlY7t9jqDPWr0Xg2em";
    // ==========================================

    // --- UTILITIES (IMAGE COMPRESSION) ---
    function compressImage(file, maxSize = 800, quality = 0.6) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    if (width > height && width > maxSize) { height *= maxSize / width; width = maxSize; } 
                    else if (height > maxSize) { width *= maxSize / height; height = maxSize; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    window.downloadFile = function(dataUrl, name) {
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = name || 'downloaded_file';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    // --- PWA SETUP ---
    const iconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" fill="#0F172A"/><text x="50%" y="50%" fill="#22D3EE" font-size="200" font-family="sans-serif" font-weight="bold" dominant-baseline="middle" text-anchor="middle">DD</text></svg>`;
    const manifest = {
        name: "DaDevs 0.1", short_name: "DaDevs", start_url: location.href, display: "standalone",
        background_color: "#0F172A", theme_color: "#0F172A",
        icons: [{ src: "data:image/svg+xml;charset=utf-8," + encodeURIComponent(iconSVG), sizes: "512x512", type: "image/svg+xml" }]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${URL.createObjectURL(manifestBlob)}">`);
    const swCode = `self.addEventListener('install', e => self.skipWaiting()); self.addEventListener('activate', e => e.waitUntil(clients.claim())); self.addEventListener('fetch', e => {});`;
    if ('serviceWorker' in navigator) navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode], { type: 'application/javascript' }))).catch(console.error);

    // --- SYSTEM DATA & AUTH ---
    const users = {
        "Bren": { pass: "brenduling", role: "admin", name: "Bren" },
        "Chua": { pass: "dadevs0.1", role: "viewer", name: "Chua" },
        "Tanya": { pass: "dadevs0.1", role: "viewer", name: "Tanya" },
        "Vince": { pass: "dadevs0.1", role: "viewer", name: "Vince" },
        "Ruth": { pass: "dadevs0.1", role: "viewer", name: "Ruth" },
        "Lilian": { pass: "dadevs0.1", role: "viewer", name: "Lilian" },
        "DaDevs": { pass: "dadevs0.1", role: "viewer", name: "DaDevs Account" },
        "Adviser": { pass: "dadevs0.1", role: "viewer", name: "Adviser" }
    };

    const modules = ["Dashboard", "Timeline", "Sprint Board", "Calendar", "Funds", "Resources", "Gallery"];
    
    const navIcons = {
        "Dashboard": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>`,
        "Timeline": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`,
        "Sprint Board": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg>`,
        "Calendar": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>`,
        "Funds": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>`,
        "Resources": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>`,
        "Gallery": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>`
    };

    let currentUser = null; 
    let currentModule = "Dashboard"; 
    let viewDate = new Date();
    let currentGalleryFolder = null; // Tracks active folder view

    const DB_KEY = 'dadevs_db_v5';
    let appDB = { tasks: [], funds: [], calendar: [], timeline: [], resources: [], gallery: [] };

    async function initDB() {
        if (ENABLE_CLOUD_SYNC && JSONBIN_BIN_ID && JSONBIN_MASTER_KEY) {
            document.getElementById('syncStatus').innerText = "☁️ Syncing...";
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, { headers: { 'X-Master-Key': JSONBIN_MASTER_KEY } });
                const data = await res.json();
                if (data.record && data.record.tasks) {
                    appDB = data.record;
                    localStorage.setItem(DB_KEY, JSON.stringify(appDB));
                }
                document.getElementById('syncStatus').innerText = "🟢 Online";
            } catch(e) { 
                console.error("Sync error", e); 
                document.getElementById('syncStatus').innerText = "🔴 Offline (Using Cache)"; 
                const local = localStorage.getItem(DB_KEY);
                if (local) appDB = JSON.parse(local);
            }
        } else {
            const local = localStorage.getItem(DB_KEY);
            if (local) appDB = JSON.parse(local);
            document.getElementById('syncStatus').innerText = "💾 Local Mode";
        }
    }

    async function saveDB() {
        if (ENABLE_CLOUD_SYNC && JSONBIN_BIN_ID && JSONBIN_MASTER_KEY && isAdmin()) {
            document.getElementById('syncStatus').innerText = "⏳ Saving...";
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_MASTER_KEY },
                    body: JSON.stringify(appDB)
                });
                document.getElementById('syncStatus').innerText = "🟢 Saved to Cloud";
                localStorage.setItem(DB_KEY, JSON.stringify(appDB)); 
            } catch(e) { 
                console.error("Save error", e); 
                document.getElementById('syncStatus').innerText = "🔴 Save Failed"; 
                localStorage.setItem(DB_KEY, JSON.stringify(appDB)); 
            }
        } else {
            localStorage.setItem(DB_KEY, JSON.stringify(appDB));
        }
    }

    const getDB = (table) => appDB[table] || [];
    const setDB = (table, data) => { appDB[table] = data; saveDB(); };
    const generateId = () => Math.floor(Math.random() * 1000000);
    const isAdmin = () => currentUser && currentUser.role === 'admin';

    window.addEventListener('storage', (e) => {
        if (e.key === DB_KEY && currentUser && !ENABLE_CLOUD_SYNC) {
            appDB = JSON.parse(e.newValue || "{}"); loadModule(currentModule, true);
        }
    });

    let autoSyncTimer;
    function startAutoSync() {
        if (ENABLE_CLOUD_SYNC && !isAdmin()) {
            if(autoSyncTimer) clearInterval(autoSyncTimer);
            autoSyncTimer = setInterval(async () => { await initDB(); loadModule(currentModule, true); }, 5000);
        }
    }

    // --- AUTHENTICATION ---
    async function login() {
        const u = document.getElementById("user").value; const p = document.getElementById("pass").value;
        if (users[u] && users[u].pass === p) { localStorage.setItem("session_user", u); await initApp(); } 
        else { document.getElementById("err").style.display = "block"; }
    }

    function logout() { localStorage.removeItem("session_user"); location.reload(); }

    async function initApp() {
        const session = localStorage.getItem("session_user");
        if (session && users[session]) {
            currentUser = users[session]; 
            
            document.getElementById("login").style.display = "none";
            document.getElementById("app").style.display = "flex";
            if (window.innerWidth <= 992) document.getElementById('sidebar').classList.add('collapsed');

            const footerHTML = `
                <div class="user-info">
                    <div style="color: var(--secondary); font-weight: bold;">${currentUser.name}</div>
                    <div style="font-size: 11px; color: #aaa;">Role: ${currentUser.role.toUpperCase()}</div>
                </div>
                <button class="logout-btn" onclick="logout()" title="Logout">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    <span class="logout-btn-text">Logout</span>
                </button>
            `;

    function loadModule(m, silent = false) {
        currentModule = m; document.getElementById("viewTitle").innerText = m;

        const firstDay = new Date(currentYear, currentMonth, 1).getDay();

        const todayStr = new Date().toISOString().split('T')[0];
        const monthEvents = events.filter(e => { const eDate = new Date(e.date); return eDate.getMonth() === currentMonth && eDate.getFullYear() === currentYear; }).sort((a,b) => new Date(a.date) - new Date(b.date));

        for(let i = 0; i < firstDay; i++) { html += `<div class="cal-day empty"></div>`; }
        for(let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isToday = dateStr === todayStr ? 'today' : '';

            let dots = ''; dayEvents.forEach(e => { dots += `<div class="cal-event-dot event-${e.type}" title="${e.title}"></div>`; });
            html += `<div class="cal-day ${isToday}"><div style="font-size:14px;">${d}</div><div style="display:flex; gap:3px; flex-wrap:wrap; justify-content:center; width:100%; margin-top:2px;">${dots}</div></div>`;

    // --- TIMELINE ---
    function renderTimeline(container) {
        const timeline = getDB('timeline'); let html = '';
        if (isAdmin()) {
            html += `
            <div class="glass admin-panel">
                <h4 style="margin-top:0; color:var(--accent)">Admin: Add Gantt Task</h4>
                <div class="flex-row">
                    <input id="tlTitle" placeholder="Task Name" style="flex:2;">
                    <input id="tlStart" type="date" style="flex:1;" title="Start Date">
                    <input id="tlEnd" type="date" style="flex:1;" title="End Date">
                    <button onclick="addTimeline()" style="flex:1; margin:0;">Add</button>
                </div>
            </div>`;
        }
        html += `<div class="glass card"><h3 style="margin-top:0; margin-bottom: 20px;">Project Timeline</h3>`;
        if (timeline.length === 0) { html += `<p style="color:#aaa;">No timeline data generated by Admin yet.</p></div>`; container.innerHTML = html; return; }
        
        const dates = timeline.flatMap(t => [new Date(t.start).getTime(), new Date(t.end).getTime()]);
        const minDate = Math.min(...dates); let maxDate = Math.max(...dates); let totalSpan = maxDate - minDate;
        if (totalSpan === 0) totalSpan = 86400000; totalSpan = totalSpan * 1.05;

        html += `<div style="display:flex; flex-direction:column; gap: 10px; overflow-x: auto; padding-bottom: 10px;">`;
        timeline.forEach(t => {
            const startT = new Date(t.start).getTime(); const endT = new Date(t.end).getTime();
            const leftPerc = ((startT - minDate) / totalSpan) * 100; let widthPerc = ((endT - startT) / totalSpan) * 100;
            if (widthPerc < 2) widthPerc = 2; 
            html += `
                <div class="gantt-row">
                    <div class="gantt-label" title="${t.title}">${t.title}</div>
                    <div class="gantt-track">
                        <div class="gantt-bar" style="left: ${leftPerc}%; width: ${widthPerc}%;">${t.start}</div>
                    </div>
                    ${isAdmin() ? `<button class="delete-btn" style="position:relative; margin-left:15px; background:rgba(239, 68, 68, 0.2); padding: 5px 10px; border-radius:5px; flex-shrink: 0;" onclick="deleteTimeline(${t.id})">Drop</button>` : ''}
                </div>`;
        });
        html += `</div></div>`; container.innerHTML = html;
    }
    function addTimeline() {
        const title = document.getElementById('tlTitle').value; const start = document.getElementById('tlStart').value; const end = document.getElementById('tlEnd').value;
        if(!title || !start || !end) return alert("Fill all fields."); if(new Date(start) > new Date(end)) return alert("Start date must be before end date.");
        const tl = getDB('timeline'); tl.push({ id: generateId(), title, start, end }); setDB('timeline', tl); loadModule('Timeline');
    }
    function deleteTimeline(id) { setDB('timeline', getDB('timeline').filter(t => t.id !== id)); loadModule('Timeline'); }

    function allowDrop(ev) { if(isAdmin()) ev.preventDefault(); }
    function dragTask(ev, id) { if(isAdmin()) ev.dataTransfer.setData("taskId", id); }
    function dropTask(ev, newStatus) {
        if(!isAdmin()) return; ev.preventDefault(); const id = parseInt(ev.dataTransfer.getData("taskId"));

    async function addResource() {
        const title = document.getElementById('resTitle').value; 
        const type = document.getElementById('resType').value;
        const desc = document.getElementById('resDesc').value;
        if(!title) return alert("Title is required.");

        if (type === 'link') {
            const url = document.getElementById('resUrl').value;
            if(!url) return alert("URL is required.");
            const res = getDB('resources'); res.push({ id: generateId(), title, type, url, desc }); 
            setDB('resources', res); loadModule('Resources');
        } else {
            const fileInput = document.getElementById('resFile');
            if(!fileInput.files[0]) return alert("Please select a file.");
            const file = fileInput.files[0];
            
            if(file.size > 250000) return alert("File is too large! Max size is 250KB for JSON database storage.");
            
            document.getElementById('syncStatus').innerText = "⏳ Processing file...";
            const reader = new FileReader();
            reader.onload = (e) => {
                const res = getDB('resources'); 
                res.push({ id: generateId(), title, type, url: e.target.result, desc, fileName: file.name }); 
                setDB('resources', res); loadModule('Resources');
            };
            reader.readAsDataURL(file);
        }
    }
    function deleteResource(id) { setDB('resources', getDB('resources').filter(r => r.id !== id)); loadModule('Resources'); }

                    <span style="font-size:24px;">📁</span> ${currentGalleryFolder}
                </h3>
                <button class="icon-btn" onclick="window.closeGalleryFolder()" style="background: rgba(255,255,255,0.15);">🔙 Back to Folders</button>
            </div>`;
            
            const folderItems = gal.filter(g => (g.folder || 'Uncategorized') === currentGalleryFolder);
            
            if (folderItems.length === 0) {
                html += `<p style="color:#aaa;">Folder is empty.</p>`;
            } else {
                html += `<div class="gallery-grid">`;
                folderItems.forEach(g => {
                    html += `
                    <div class="gallery-item">
                        <img src="${g.url}" alt="${g.caption}" onerror="this.src='https://via.placeholder.com/300x300?text=Invalid+Image'">
                        <div class="gallery-caption">
                            <div style="margin-bottom: ${isAdmin() ? '5px' : '0'};">${g.caption}</div>
                            ${isAdmin() ? `<button class="danger" style="padding: 4px; font-size: 10px; margin:0;" onclick="deletePhoto(${g.id})">Delete</button>` : ''}
                        </div>
                    </div>`;
                });
                html += `</div>`;
            }
        }
        container.innerHTML = html;
    }

    // Global hooks for gallery folder navigation
    window.openGalleryFolder = function(fName) {
        currentGalleryFolder = fName;
        loadModule('Gallery', true); 
    }
    window.closeGalleryFolder = function() {
        currentGalleryFolder = null;
        loadModule('Gallery', true);
    }
    
    async function addPhoto() {
        const fileInput = document.getElementById('galFile');
        const files = fileInput.files;
        const caption = document.getElementById('galCap').value || 'Untitled';
        const folder = document.getElementById('galFolder').value.trim() || 'Uncategorized';
        
        if(files.length === 0) return alert("Please select at least one image.");
        document.getElementById('syncStatus').innerText = "⏳ Compressing & Uploading...";
        
        const gal = getDB('gallery');
        
        // Loop through multiple files
        for(let i=0; i < files.length; i++) {
            const base64 = await compressImage(files[i]);
            let finalCaption = files.length > 1 ? `${caption} (${i+1})` : caption;
            gal.push({ id: generateId(), url: base64, caption: finalCaption, folder: folder });
        }
        
        // Automatically open the folder we just uploaded to
        currentGalleryFolder = folder;
        
        setDB('gallery', gal); 
        loadModule('Gallery');
    }
    
    function deletePhoto(id) { 
        let gal = getDB('gallery');
        const photo = gal.find(g => g.id === id);
        const targetFolder = photo ? (photo.folder || 'Uncategorized') : null;
        
        gal = gal.filter(g => g.id !== id);
        
        // Check if we just deleted the last item in the current folder
        if (targetFolder && !gal.some(g => (g.folder || 'Uncategorized') === targetFolder)) {
            currentGalleryFolder = null; // Kick back to root view
        }
        
        setDB('gallery', gal); 
        loadModule('Gallery', true); 
    }

    // --- SECURITY OVERRIDES ---
    document.addEventListener("contextmenu", e => e.preventDefault());
    document.addEventListener("keydown", e => {
        if (e.key === "F12" || (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) || (e.ctrlKey && e.key === "U")) {
            e.preventDefault(); alert("DaDevs Security Protocol: Developer Tools Locked.");
        }
    });

    window.onload = async () => { await initApp(); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0F172A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>DaDevs Workspace</title>
    <style>
        :root {
            /* Deep Space Neon Palette */
            --bg-1: #0F172A; 
            --bg-2: #1E293B;
            --primary: #2D2A8C; 
            --secondary: #22D3EE; 
            --accent: #8B5CF6; 
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(0,0,0,0.25);
            --glass-bg: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
            --nav-bg: rgba(15, 23, 42, 0.85);
            
            /* Global Member Colors */
            --c-bren: #ef4444; 
            --c-chua: #f59e0b; 
            --c-tanya: #10b981; 
            --c-vince: #3b82f6; 
            --c-ruth: #8b5cf6; 
            --c-team: #64748b;
        }

        /* Light Theme Override */
        body.light-theme {
            --bg-1: #f8fafc; --bg-2: #e2e8f0;
            --text: #0f172a;
            --text-muted: #475569;
            --card-bg: rgba(255,255,255,0.7);
            --glass-bg: rgba(255,255,255,0.85);
            --glass-border: rgba(0,0,0,0.15);
            --nav-bg: rgba(248, 250, 252, 0.85);
        }
        body.light-theme .neon { text-shadow: none; color: var(--secondary); font-weight: 800; }
        body.light-theme input, body.light-theme select, body.light-theme textarea { background: rgba(255,255,255,0.9); color: #000; border: 1px solid #cbd5e1; }
        body.light-theme .timeline-table td { border-color: rgba(0,0,0,0.05); }
        body.light-theme .unique-member-card { background: linear-gradient(145deg, rgba(255,255,255,1) 0%, rgba(241,245,249,1) 100%); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        body.light-theme .chat-messages { background: #fff; border-radius: 8px; }
        body.light-theme .comment-box { background: #f1f5f9; border-color: #cbd5e1; color: #000; }
        body.light-theme .comment-box .comment-body { color: #333; }
        body.light-theme .card, body.light-theme .admin-panel { background: rgba(255,255,255,0.8); }

        body {
            margin: 0; font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
            color: var(--text); overflow: hidden; height: 100dvh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            transition: background 0.3s, color 0.3s;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 3px; opacity: 0.5;}
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .glass {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .neon { color: var(--secondary); text-shadow: 0 0 8px var(--secondary); }
        .accent { color: var(--accent); }
        
        .dadevs-logo { width: 40px; height: 40px; flex-shrink: 0; transition: transform 0.3s ease; }
        .dadevs-logo:hover { transform: scale(1.05) rotate(5deg); }
        
        /* Auto-Update Overlay */
        #updateOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 99999; display: none; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: var(--text);
        }
        @keyframes pulseLogo { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        #updateOverlay .dadevs-logo { animation: pulseLogo 1.5s infinite ease-in-out; width: 80px; height: 80px; margin-bottom: 20px; }

        /* Auth Screen */
        #authScreen { padding: 30px; text-align: center; width: 320px; max-width: 90%; z-index: 10; transition: opacity 0.5s; display: none; }
        .auth-tabs { display: flex; margin-bottom: 15px; border-bottom: 1px solid var(--glass-border); }
        .auth-tab { flex: 1; padding: 10px; cursor: pointer; color: var(--text-muted); transition: 0.3s; font-weight: bold; font-size: 13px; border-bottom: 2px solid transparent; }
        .auth-tab.active { color: var(--secondary); border-bottom-color: var(--secondary); text-shadow: 0 0 8px var(--secondary); }

        input, select, textarea {
            width: 100%; padding: 10px; margin: 6px 0; background: var(--card-bg);
            border: 1px solid var(--glass-border); color: var(--text);
            border-radius: 6px; box-sizing: border-box; outline: none; font-family: inherit; font-size: 13px; transition: border-color 0.3s;
        }
        input:disabled, textarea:disabled { background: rgba(0,0,0,0.5); color: var(--text-muted); cursor: not-allowed; border-color: rgba(255,255,255,0.05); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        body.light-theme input[type="date"]::-webkit-calendar-picker-indicator { filter: none; }
        input:focus:not(:disabled), select:focus, textarea:focus { border-color: var(--secondary); box-shadow: 0 0 8px var(--secondary); }
        
        button {
            width: 100%; padding: 10px; background: var(--accent); color: #fff;
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 5px; font-size: 13px;
        }
        button:hover { background: var(--secondary); transform: translateY(-2px); box-shadow: 0 4px 15px var(--secondary); }
        button:active { transform: translateY(0); }
        button.danger { background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #ef4444; }
        button.danger:hover { background: #ef4444; color: #fff; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
        button.success { background: rgba(16, 185, 129, 0.15); border: 1px solid #10b981; color: #10b981; }
        button.success:hover { background: #10b981; color: #fff; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        
        /* App Layout */
        #app { display: none; width: 100vw; height: 100dvh; flex-direction: column; position: relative; }
        
        /* Universal Floating Dock */
        #bottomNav {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 4px; padding: 8px 15px; z-index: 1000;
            background: var(--nav-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 40px; border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); transition: background 0.3s;
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; 
            padding: 6px 12px; border-radius: 10px; cursor: pointer; transition: 0.2s; color: var(--text-muted);
        }
        .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; transition: 0.2s; stroke: currentColor;}
        .nav-text { font-size: 9px; font-weight: 600; transition: 0.2s; display: none; }
        .nav-item:hover, .nav-item.active { background: rgba(255, 255, 255, 0.1); color: var(--secondary); transform: translateY(-3px); }
        .nav-item:hover svg, .nav-item.active svg { transform: scale(1.1); filter: drop-shadow(0 0 5px var(--secondary)); }
        .nav-item:hover .nav-text, .nav-item.active .nav-text { display: block; }

        /* Main Content */
        #main { flex: 1; padding: 15px; padding-bottom: 90px; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; transition: 0.3s; min-width: 0; box-sizing: border-box; word-wrap: break-word; }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; width: 100%; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; position: sticky; top:0; background: linear-gradient(180deg, var(--bg-1) 70%, transparent); z-index:50;}
        .header-actions { display: flex; align-items: center; gap: 8px; }
        
        /* Sleek Headers */
        .header-btn { background: transparent !important; border: none !important; box-shadow: none !important; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 12px; transition: 0.3s; margin:0; font-weight: bold;}
        #topProfileBtn { padding: 0; background: transparent !important; border: none !important; margin-left: 2px; outline: none; cursor: pointer;}
        #topProfileBtn:hover { transform: scale(1.08); filter: drop-shadow(0 0 8px var(--secondary)); }

        .notif-bell { position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; background: transparent !important; border: none !important; box-shadow: none !important; overflow: visible; transition: 0.2s; color: var(--text); }
        .notif-bell svg { transition: 0.3s; width: 18px; height: 18px;}
        .notif-bell:hover svg { filter: drop-shadow(0 0 8px var(--secondary)); color: var(--secondary); transform: scale(1.1); }
        .notif-dot { position: absolute; top: 2px; right: 2px; transform: translate(25%, -25%); background: #ef4444; width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 5px #ef4444; display: none; z-index: 5;}
        .notif-dropdown { position: absolute; top: 40px; right: 0; width: 280px; background: var(--bg-2); border: 1px solid var(--glass-border); border-radius: 10px; padding: 12px; z-index: 2500; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.8); max-height: 350px; overflow-y:auto;}
        
        /* Universal Chat Panel */
        #chatPanel {
            position: fixed; right: -350px; top: 0; width: 320px; max-width: 100vw; height: 100vh;
            background: var(--bg-1); border-left: 1px solid var(--glass-border);
            z-index: 2000; transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); display:flex; flex-direction:column;
            box-shadow: -5px 0 25px rgba(0,0,0,0.7);
        }
        #chatPanel.open { right: 0; }
        .chat-header { padding: 15px; border-bottom: 1px solid var(--glass-border); display:flex; justify-content:space-between; align-items:center; background: var(--card-bg);}
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display:flex; flex-direction:column; gap: 8px; scroll-behavior: smooth;}
        .chat-input-area { padding: 12px; border-top: 1px solid var(--glass-border); background: var(--bg-2); }
        .mention { color: var(--secondary); font-weight: bold; background: rgba(34, 211, 238, 0.1); padding: 0 4px; border-radius: 4px; }

        /* Compact Cards & Grids */
        .card { padding: 15px; margin-bottom: 15px; transition: transform 0.3s; word-break: break-word; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; } 
        .grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; } 
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        .funds-contributions-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 150px)); justify-content: center; gap: 12px; }

        .contact-link { display: flex; justify-content: center; align-items: center; width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text); text-decoration: none; font-size: 13px; transition: 0.3s; }
        .contact-link:hover { background: var(--secondary); color: #000; transform: translateY(-4px); border-color: var(--secondary); box-shadow: 0 4px 12px rgba(34, 211, 238, 0.4); }
        
        .avatar-container { position: relative; display: inline-flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .native-avatar { border-radius: 50%; display: flex; justify-content: center; align-items: center; overflow: hidden; border: 3px solid var(--glass-border); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); flex-shrink: 0; }
        .native-avatar svg { fill: currentColor; }
        .avatar-img { border-radius: 50%; object-fit: cover; border: 3px solid var(--glass-border); box-shadow: 0 4px 15px rgba(0,0,0,0.5); flex-shrink: 0; width: 100%; height: 100%; }
        .avatar-sticker { position: absolute; bottom: -4px; right: -4px; font-size: 16px; background: var(--bg-1); border-radius: 50%; width: 22px; height: 22px; display: flex; justify-content: center; align-items: center; border: 2px solid var(--glass-border); box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 2; }
        
        .avatar-mini-wrapper { position: relative; width: 24px; height: 24px; flex-shrink: 0; display: inline-block; }
        .avatar-mini { width: 100% !important; height: 100% !important; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); flex-shrink: 0; display: inline-flex; justify-content: center; align-items: center; margin: 0; padding: 0;}
        .avatar-sticker-mini { position: absolute; bottom: -3px; right: -3px; font-size: 9px; background: var(--bg-1); border-radius: 50%; width: 12px; height: 12px; display: flex; justify-content: center; align-items: center; border: 1px solid var(--glass-border); z-index: 2; }

        .unique-member-card {
            border: 1px solid var(--glass-border); border-radius: 12px; 
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, var(--card-bg) 100%);
            position: relative; overflow: visible; margin-top: 25px; text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease; display:flex; flex-direction:column;
        }
        .unique-member-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); border-color: var(--secondary); }

        .kanban-board { display: flex; gap: 15px; min-height: 350px; overflow-x: auto; padding-bottom: 15px; scroll-snap-type: x mandatory;}
        .kanban-col { flex: 1; min-width: 260px; display: flex; flex-direction: column; background: var(--card-bg); border-radius: 10px; padding: 12px; border: 1px solid var(--glass-border); scroll-snap-align: center;}
        .task-card { background: var(--glass-bg); padding: 12px; border-radius: 6px; margin-bottom: 8px; border: 1px solid var(--glass-border); transition: 0.2s; cursor: grab; position: relative;}
        .task-card:hover { border-color: var(--secondary); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .delete-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; color: #ef4444; cursor: pointer; padding: 0; width: auto; font-size: 11px; transition: transform 0.2s;}
        .delete-btn:hover { transform: scale(1.2); background: none; box-shadow: none; color: #ff0000; }
        
        .admin-panel { padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--accent); background: var(--card-bg); }
        .admin-panel .flex-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        
        /* Timeline Table Adaptive CSS */
        .phase-header { background: var(--card-bg); padding: 10px 12px; border-radius: 8px; font-weight: bold; color: var(--text); cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-left: 4px solid var(--secondary); transition: 0.2s; font-size: 13px; }
        .phase-header:hover { transform: translateX(2px); background: rgba(34, 211, 238, 0.1); }
        .timeline-table { width: 100%; border-collapse: collapse; min-width: 750px; } /* Enforce minimum width so it scrolls cleanly on mobile */
        .timeline-table th { text-align: left; padding: 8px 10px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--glass-border); white-space: nowrap; }
        .timeline-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; vertical-align: middle; white-space: nowrap; }
        .timeline-table td.wrap-text { white-space: normal; min-width: 150px; line-height: 1.4; } /* Allow only the title to wrap */
        .gantt-track { background: var(--card-bg); height: 18px; border-radius: 9px; position: relative; overflow: hidden; border: 1px solid var(--glass-border); width: 100%; min-width: 150px; }
        .gantt-bar { position: absolute; height: 100%; border-radius: 9px; display: flex; align-items: center; font-size: 9px; font-weight: bold; color: #fff; box-sizing: border-box; overflow: hidden; transition: 0.3s; }
        
        /* Gallery UI */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .gallery-item { position: relative; border-radius: 10px; overflow: hidden; border: 1px solid var(--glass-border); aspect-ratio: 1 / 1; transition: 0.3s; background: var(--card-bg); cursor: pointer;}
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
        .gallery-item:hover img { transform: scale(1.08); }
        .gallery-caption { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding: 12px 8px 8px 8px; font-size: 11px; transition: 0.3s; color: #fff;}
        .folder-overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.75); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; transition: 0.3s; backdrop-filter: blur(2px);}
        .gallery-item:hover .folder-overlay { background: rgba(15, 23, 42, 0.5); }
        .feat-badge { position: absolute; top:5px; left:5px; background: #f59e0b; color: #000; font-size:9px; font-weight:bold; padding: 2px 5px; border-radius: 8px; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}

        /* Custom Alert & Modal Logic (Smart UI) */
        #customDialogOverlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 1000000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .dialog-content { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 25px 20px; border-radius: 12px; width: 320px; max-width: 90vw; text-align: center; box-shadow: 0 15px 50px rgba(0,0,0,0.6); transform: scale(0.9); opacity: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .dialog-content.active { transform: scale(1); opacity: 1; }
        .dialog-icon { font-size: 36px; margin-bottom: 12px; display: inline-block; }
        .dialog-msg { margin-bottom: 20px; font-size: 14px; color: var(--text); line-height: 1.5; font-weight: 500;}
        .dialog-btns { display: flex; gap: 8px; justify-content: center; }

        /* Lightbox Image Viewer */
        #lightboxModal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 100000; display: none; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(8px); }
        #lightboxImg { max-width: 90vw; max-height: 80vh; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); object-fit: contain; }
        #lightboxCaption { margin-top: 15px; color: #fff; font-size: 15px; font-weight: bold; text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .close-lightbox { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; justify-content:center; align-items:center; font-weight: bold; font-size: 16px; transition: 0.2s;}
        .close-lightbox:hover { background: #ef4444; transform: rotate(90deg); }
        
        .res-search { width: 100%; padding: 10px 12px; background: var(--card-bg); border: 1px solid var(--glass-border); color: var(--text); border-radius: 6px; margin-bottom: 12px; outline: none; transition: 0.3s;}
        .res-search:focus { border-color: var(--secondary); box-shadow: 0 0 10px rgba(34, 211, 238, 0.2); }
        .tag-chip { background: rgba(34, 211, 238, 0.1); color: var(--secondary); padding: 4px 10px; border-radius: 10px; font-size: 10px; font-weight: bold; cursor: pointer; border: 1px solid rgba(34, 211, 238, 0.3); transition: 0.2s; white-space: nowrap; user-select: none; }
        .tag-chip:hover, .tag-chip.active { background: var(--secondary); color: #fff; transform: translateY(-2px); }
        
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; margin-top: 12px; }
        .cal-header { font-weight: bold; color: var(--secondary); font-size: 11px; padding-bottom: 8px; }
        .cal-day { background: var(--card-bg); padding: 8px; border-radius: 6px; border: 1px solid var(--glass-border); min-height: 45px; position: relative; display: flex; flex-direction: column; align-items: center; transition: 0.2s;}
        .cal-day.active-day { cursor: pointer; }
        .cal-day.active-day:hover:not(.empty) { background: rgba(255,255,255,0.1); transform: scale(1.05); border-color: var(--secondary);}
        .cal-day.empty { background: transparent; border: none; }
        .cal-day.today { border-color: var(--secondary); background: rgba(34, 211, 238, 0.15); }
        .cal-event-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 4px; }
        
        .comment-box { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 8px; padding: 10px; margin-bottom: 8px; transition: 0.2s;}
        .comment-box:hover { border-color: rgba(255,255,255,0.2); }
        .comment-header { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 11px; color: var(--text-muted); }
        .comment-author { font-weight: bold; color: var(--secondary); }
        .comment-body { font-size: 12px; word-break: break-word; color: var(--text); line-height: 1.4; }

        /* User Modal Overlay */
        #userModal { position: fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(0,0,0,0.8); z-index: 10000; display: none; justify-content:center; align-items:center; padding: 15px; box-sizing: border-box; backdrop-filter: blur(5px);}
        .modal-content { background: var(--bg-1); border: 1px solid var(--glass-border); border-radius: 10px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; padding: 20px; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.8);}
        .close-modal { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: flex; justify-content:center; align-items:center; font-weight: bold; transition: 0.2s;}

            } catch(e) { 
                setStatus("🔴 Offline (Cache)"); 
                const local = localStorage.getItem(DB_KEY); if (local) appDB = JSON.parse(local);
            }
        } else {
            const local = localStorage.getItem(DB_KEY); if (local) appDB = JSON.parse(local);
            setStatus("💾 Local Mode");
        }

        if(!appDB.comments) appDB.comments = [];
        if(!appDB.sprints) appDB.sprints = [];
        if(!appDB.members) appDB.members = [];
        if(!appDB.notifications) appDB.notifications = [];

        // INITIALIZE DEFAULT USERS IF NOT ALREADY IN DB
        const defaultUsers = {
            "Bren": { pass: "brenduling", role: "Admin", systemRole: "admin", status: "approved", sticker: "👑" },
            "Chua": { pass: "dadevs0.1", role: "Member", systemRole: "viewer", status: "approved", sticker: "🃏" },
            "Tanya": { pass: "dadevs0.1", role: "Member", systemRole: "viewer", status: "approved", sticker: "🏀" },
            "Vince": { pass: "dadevs0.1", role: "Member", systemRole: "viewer", status: "approved", sticker: "💎" },
            "Ruth": { pass: "dadevs0.1", role: "Member", systemRole: "viewer", status: "approved", sticker: "📖" },
            "Lilian": { pass: "dadevs0.1", role: "Member", systemRole: "viewer", status: "approved", sticker: "👤" },
            "DaDevs": { pass: "dadevs0.1", role: "Member", systemRole: "viewer", status: "approved", sticker: "💻" },
            "Adviser": { pass: "dadevs0.1", role: "Member", systemRole: "viewer", status: "approved", sticker: "👨‍🏫" }
        };

        let dbUpdated = false;

        appDB.members = appDB.members.map(m => {
            if (!m.systemRole) {
                m.systemRole = (m.role && m.role.toLowerCase().includes('admin')) ? 'admin' : 'viewer';
                dbUpdated = true;
            }
            if (defaultUsers[m.id]) {
                if(!m.pass || m.pass === "undefined" || m.pass === "null") { m.pass = defaultUsers[m.id].pass; dbUpdated = true; }
                if(!m.role || m.role === "undefined" || m.role === "null") { m.role = defaultUsers[m.id].role; dbUpdated = true; }
                if(!m.status || m.status === "undefined" || m.status === "null") { m.status = defaultUsers[m.id].status; dbUpdated = true; }
            }
            return m;
        });

        Object.keys(defaultUsers).forEach(key => {
            if (!appDB.members.find(m => m.id === key)) {
                appDB.members.push({
                    id: key, fullName: key, ...defaultUsers[key],
                    birthday: "", messenger: "", github: "", gmail: "", phone: "", avatar: ""
                });
                dbUpdated = true;
            }
        });

        if (dbUpdated) {
            localStorage.setItem(DB_KEY, JSON.stringify(appDB));
            saveDB(); 
        }

        // Apply Custom Themes
        if(currentUser) {
            if(currentUser.accent) document.documentElement.style.setProperty('--accent', currentUser.accent);
            if(currentUser.secondary) document.documentElement.style.setProperty('--secondary', currentUser.secondary);
        }

        updateNotifUI();
    }

    async function saveDB() {
        if (ENABLE_CLOUD_SYNC && JSONBIN_BIN_ID && JSONBIN_MASTER_KEY) {
            const syncEl = document.getElementById('syncStatus');
            if(syncEl) { syncEl.style.display="block"; syncEl.innerText = "⏳ Saving..."; }
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_MASTER_KEY }, body: JSON.stringify(appDB)
                });
                if (!response.ok) throw new Error("JSONBin rejected the payload.");
                if(syncEl) syncEl.innerText = "🟢 Saved to Cloud";
            } catch(e) { 
                if(syncEl) syncEl.innerText = "🔴 Save Failed"; 
                console.error(e);
            }
        }
        localStorage.setItem(DB_KEY, JSON.stringify(appDB));
    }

    const getDB = (table) => appDB[table] || [];
    const setDB = (table, data) => { appDB[table] = data; saveDB(); };
    const generateId = () => Math.floor(Math.random() * 1000000);
    
    const isAdmin = () => {
        if (!currentUser) return false;
        if (sessionStorage.getItem('viewAsViewer') === 'true') return false;
        return currentUser.systemRole === 'admin' || currentUser.role.toLowerCase().includes('admin') || currentUser.id.toLowerCase() === 'bren';
    };
    
    const isApproved = () => currentUser && currentUser.status === 'approved';

    function checkUnreadBadges() {
        if (!currentUser) return;
        const comments = getDB('comments');
        const notifs = getDB('notifications');
        
        if (comments.length > 0 && comments[comments.length-1].id !== currentUser.lastSeenChatId) {
            document.getElementById('chatBadge').style.display = 'block';
        } else {
            document.getElementById('chatBadge').style.display = 'none';
        }
        
        if (notifs.length > 0 && notifs[0].id !== currentUser.lastSeenNotifId) {
            document.getElementById('notifBadge').style.display = 'block';
        } else {
            document.getElementById('notifBadge').style.display = 'none';
        }
    }

    let autoSyncTimer;
    let lastDBHash = "";
    function startAutoSync() {
        if (ENABLE_CLOUD_SYNC) {
            if(autoSyncTimer) clearInterval(autoSyncTimer);
            autoSyncTimer = setInterval(async () => { 
                await initDB(); 
                
                checkUnreadBadges(); // Keep red dots updated silently
                
                const currentHash = JSON.stringify(appDB);
                if (currentHash !== lastDBHash) {
                    lastDBHash = currentHash;
                    
                    // Interaction checks for Zero Interruption
                    const activeTag = document.activeElement ? document.activeElement.tagName : '';
                    const isTyping = ['INPUT', 'TEXTAREA', 'SELECT'].includes(activeTag);
                    const modalsOpen = 
                        document.getElementById('lightboxModal').style.display === 'flex' ||
                        document.getElementById('customDialogOverlay').style.display === 'flex' ||
                        document.getElementById('userModal').style.display === 'flex';

                    if (!isTyping && !isDraggingCard && !modalsOpen) {
                        // Scroll Preservation
                        const mainEl = document.getElementById("main");
                        const scrollPos = mainEl ? mainEl.scrollTop : 0;
                        
                        loadModule(currentModule, true); 
                        renderUniversalComments();
                        
                        // Small timeout to ensure DOM painted before restoring scroll
                        setTimeout(() => { if (mainEl) mainEl.scrollTop = scrollPos; }, 50);
                    }
                }
            }, 6000); // 6-second interval
        }
    }

    // --- CHAT & NOTIFICATIONS ---
    window.toggleChat = function() {
        const panel = document.getElementById('chatPanel');
        panel.classList.toggle('open');
        if (panel.classList.contains('open')) {
            const comments = getDB('comments');
            if(comments.length > 0 && currentUser) {
                currentUser.lastSeenChatId = comments[comments.length-1].id;
                updateUserInDB();
            }
            document.getElementById('chatBadge').style.display = 'none';
            renderUniversalComments();
            document.getElementById("chatMessagesArea").scrollTop = document.getElementById("chatMessagesArea").scrollHeight;
        }
    }

    function renderUniversalComments() {
        if (!isApproved()) return;
        const clist = document.getElementById("chatMessagesArea");
        const comments = getDB('comments'); 
        
        if (comments.length === 0) {
            clist.innerHTML = `<p style="font-size: 12px; color:var(--text-muted); text-align:center;">No discussions here yet.</p>`;
        } else {
            clist.innerHTML = comments.map(c => `
                <div class="comment-box" style="padding:10px;">
                    <div class="comment-header">
                        <span class="comment-author">${c.author}</span>
                        <span>${c.date} ${isAdmin() ? `<span style="color:#ef4444; cursor:pointer; margin-left:10px; font-weight:bold;" onclick="deleteComment(${c.id})">✖</span>` : ''}</span>
                    </div>
                    <div class="comment-body">${c.text}</div>
                </div>
            `).join('');
        }
    }

    window.postGlobalComment = function() {
        let txt = document.getElementById("globalCommentTxt").value.trim();
        if (!txt) return;
        
        // Mentions highlight
        txt = txt.replace(/@(\w+)/g, '<span class="mention">@$1</span>');

        const comments = getDB('comments');
        const newChat = {
            id: generateId(), text: txt, author: currentUser.fullName, 
            date: new Date().toLocaleString()
        };
        comments.push(newChat);
        setDB('comments', comments);
        
        currentUser.lastSeenChatId = newChat.id; // Mark as read for the sender
        updateUserInDB();
        
        document.getElementById("globalCommentTxt").value = "";
        
        addNotification(`💬 New message from ${currentUser.fullName}`);
        renderUniversalComments();
        
        setTimeout(() => {
            const area = document.getElementById("chatMessagesArea");
            area.scrollTop = area.scrollHeight;
        }, 100);
    };

    window.deleteComment = function(id) {
        if(!isAdmin()) return;
        setDB('comments', getDB('comments').filter(c => c.id !== id));
        renderUniversalComments();
    };

    window.clearChat = function() {
        if(!isAdmin()) return;
        customConfirm("Are you sure you want to clear ALL chat history?", () => {
            setDB('comments', []);
            renderUniversalComments();
        });
    }

    function toggleNotifications() {
        const dd = document.getElementById('notifDropdown');
        dd.style.display = dd.style.display === 'block' ? 'none' : 'block';
        if (dd.style.display === 'block') {
            const notifs = getDB('notifications');
            if(notifs.length > 0 && currentUser) {
                currentUser.lastSeenNotifId = notifs[0].id;
                updateUserInDB();
            }
            document.getElementById('notifBadge').style.display = 'none';
        }
        updateNotifUI();
    }
    
    window.addNotification = function(msg) {
        const notifs = getDB('notifications');
        notifs.unshift({ id: generateId(), msg: msg, time: new Date().toLocaleTimeString() });
        if(notifs.length > 50) notifs.pop(); // Keep last 50
        setDB('notifications', notifs);
        checkUnreadBadges();
        updateNotifUI();
    }

    window.clearNotifs = function() {
        if(!isAdmin()) return;
        setDB('notifications', []);
        updateNotifUI();
    }

    function updateNotifUI() {
        const list = document.getElementById('notifList');
        if(!list) return;
        
        const notifs = getDB('notifications');
        let msgs = [...notifs];
        
        if (isAdmin()) {
            const pendingCount = getDB('members').filter(m => m.status === 'pending').length;
            if (pendingCount > 0) msgs.unshift({msg: `🔴 You have ${pendingCount} pending account requests.`, time: 'Now'});
        }
        
        if (msgs.length === 0) {
            list.innerHTML = `<p style="margin:0; text-align:center; color:var(--text-muted);">No new notifications</p>`;
        } else {
            list.innerHTML = msgs.map(m => `
                <div style="padding:8px; border-bottom:1px solid var(--glass-border); line-height:1.4;">
                    <div style="font-size:12px;">${m.msg}</div>
                    <div style="font-size:9px; color:#888; margin-top:2px;">${m.time}</div>
                </div>
            `).join('');
        }
    }

    // --- THEME ---
    window.toggleTheme = function() {
        const isLight = document.body.classList.toggle('light-theme');
        if (currentUser) {
            currentUser.theme = isLight ? 'light' : 'dark';
            updateUserInDB();
        }
    }

    window.toggleViewerMode = function() {
        const isViewer = sessionStorage.getItem('viewAsViewer') === 'true';
        sessionStorage.setItem('viewAsViewer', isViewer ? 'false' : 'true');
        location.reload();
    }

    // --- AUTHENTICATION FLOW ---
    window.setAuthMode = function(mode) {
        document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
        document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
        document.getElementById('formLogin').style.display = mode === 'login' ? 'block' : 'none';
        document.getElementById('formRegister').style.display = mode === 'register' ? 'block' : 'none';
        document.getElementById('l_err').style.display = 'none';
        document.getElementById('r_err').style.display = 'none';
        document.getElementById('r_succ').style.display = 'none';
    };

    window.processLogin = async function() {
        const u = document.getElementById("l_user").value.trim();
        const p = document.getElementById("l_pass").value;
        const members = getDB('members');
        
        if (u.toLowerCase() === 'bren' && p === 'brenduling') {
            let m = members.find(x => x.id.toLowerCase() === 'bren');
            if (m) {
                m.pass = 'brenduling'; m.role = 'Admin'; m.systemRole = 'admin'; m.status = 'approved';
                setDB('members', members);
            }
            localStorage.setItem("session_user", "Bren");
            await initApp();
            return;
        }
        
        const user = members.find(m => m.id.toLowerCase() === u.toLowerCase() && m.pass === p);
        
        if (user) {
            if (user.status === 'removed') return customAlert("Your access to this workspace has been revoked.", "🚫");
            localStorage.setItem("session_user", user.id);
            await initApp();
        } else {
            document.getElementById("l_err").style.display = "block";
        }
    };

    window.processRegister = function() {
        const u = document.getElementById("r_user").value.trim();
        const p = document.getElementById("r_pass").value;
        const reqRole = document.getElementById("r_role").value;
        const secret = document.getElementById("r_secret").value;
        const err = document.getElementById("r_err");
        
        if (!u || !p) { err.innerText = "Username and password required."; err.style.display = "block"; return; }
        
        const members = getDB('members');
        let existingUser = members.find(m => m.id.toLowerCase() === u.toLowerCase());
        
        if (existingUser) {
            if (existingUser.pass && existingUser.pass !== "dadevs0.1" && existingUser.pass !== "brenduling" && existingUser.pass !== "undefined") {
                err.innerText = "Username already registered."; err.style.display = "block"; return;
            }
            if (reqRole === 'admin' && secret !== "brenduling231524") {
                err.innerText = "Invalid admin confirmation code."; err.style.display = "block"; return;
            }
            
            existingUser.pass = p;
            existingUser.role = reqRole === 'admin' ? 'Admin' : 'Member';
            existingUser.systemRole = reqRole === 'admin' ? 'admin' : 'viewer';
            
            if(reqRole === 'admin' && secret === "brenduling231524") existingUser.status = 'approved';
            else if(!existingUser.status || existingUser.status === 'undefined') existingUser.status = 'pending';
            
            setDB('members', members);
        } else {
            if (reqRole === 'admin' && secret !== "brenduling231524") {
                err.innerText = "Invalid admin confirmation code."; err.style.display = "block"; return;
            }
            members.push({
                id: u, fullName: u, pass: p, role: reqRole === 'admin' ? 'Admin' : 'Member', systemRole: reqRole === 'admin' ? 'admin' : 'viewer',
                status: (reqRole === 'admin' && secret === "brenduling231524") ? 'approved' : 'pending',
                birthday: "", messenger: "", github: "", gmail: "", phone: "", sticker: "👤", avatar: ""
            });
            setDB('members', members);
        }
        
        document.getElementById("r_err").style.display = "none";
        document.getElementById("r_succ").style.display = "block";
        setTimeout(() => setAuthMode('login'), 2000);
    };

    window.logout = function() { localStorage.removeItem("session_user"); sessionStorage.removeItem('viewAsViewer'); location.reload(); }

    async function initApp() {
        await initDB(); 
        const session = localStorage.getItem("session_user");
        const members = getDB('members');
        
        if (session && members.find(m => m.id === session)) {
            currentUser = members.find(m => m.id === session); 
            
            if (currentUser.status === 'removed') {
                localStorage.removeItem("session_user");
                customAlert("Your access to this workspace has been revoked.", "🚫");
                return;
            }

            document.getElementById("authScreen").style.display = "none";
            document.getElementById("app").style.display = "flex";
            
            if (currentUser.theme === 'light') document.body.classList.add('light-theme');
            else document.body.classList.remove('light-theme');
            
            // Set Header Profile Container
            const mColor = getMemberColor(currentUser.id);
            const ppContainer = document.getElementById("topProfileContainer");
            if(currentUser.avatar) {
                ppContainer.innerHTML = `<img src="${currentUser.avatar}" style="width:100%; height:100%; object-fit:cover; border-radius:50%; border: 2px solid ${mColor};">`;
            } else {
                ppContainer.innerHTML = `<div class="native-avatar" style="width:100%; height:100%; background:${mColor}; border: 2px solid ${mColor}; margin:0;">${userSVG}</div>`;
            }

            if(isAdmin()) {
                document.getElementById('clearNotifsBtn').style.display = "block";
                document.getElementById('clearChatBtn').style.display = "block";
            }
            
            checkUnreadBadges();
            lastDBHash = JSON.stringify(appDB);
            renderNav(); 
            loadModule("Dashboard");
            startAutoSync();
        } else {
            if(session) localStorage.removeItem("session_user");
            document.getElementById("authScreen").style.display = "block"; 
            document.getElementById("app").style.display = "none";
            
            const adminExists = members.some(m => m.systemRole === 'admin' && m.pass && m.pass !== "undefined");
            if (!adminExists) {
                setAuthMode('register');
                document.getElementById('r_role').value = 'admin';
                document.getElementById('r_secret').style.display = 'block';
            } else {
                setAuthMode('login');
            }
        }
    }

    function renderNav() {
        const n = document.getElementById("bottomNav");
        n.innerHTML = modules.map(m => `
            <div class="nav-item ${m === currentModule ? 'active' : ''}" onclick="loadModule('${m}')" title="${m}">
                ${navIcons[m]} <span class="nav-text">${m}</span>
            </div>
        `).join('');
    }

    let lastWidth = window.innerWidth;
    window.addEventListener('resize', () => {
        if(currentUser && window.innerWidth !== lastWidth) {
            lastWidth = window.innerWidth;
            renderNav(); 
        }
    });

    window.loadModule = function(m, silent = false) {
        currentModule = m; 
        document.getElementById("viewTitle").innerText = m;
        
        if (m !== 'Gallery') currentGalleryFolder = null;
        if (m !== 'Timeline') editingTimelineId = null;

        if(!silent) renderNav();
        
        const c = document.getElementById("contentArea");

        if (!isApproved()) {
            renderPendingScreen(c);
            return;
        }

        switch(m) {
            case "Dashboard": renderDashboard(c); break;
            case "Profile": renderProfile(c); break;
            case "Timeline": renderTimeline(c); break;
            case "Sprint Board": renderSprintBoard(c); break;
            case "Calendar": renderCalendar(c); break;
            case "Funds": renderFunds(c); break;
            case "Resources": renderResources(c); break;
            case "Gallery": renderGallery(c); break;
        }
    }

    window.saveMyProfileFull = async function() {
        const fullName = document.getElementById('myFullNameSettings').value;
        const pass = document.getElementById('myPassword').value;
        const roleStr = document.getElementById('myRoleSettings') ? document.getElementById('myRoleSettings').value : null;
        const sticker = document.getElementById('myStickerSettings').value;
        const birthday = document.getElementById('myBirthdaySettings').value;
        const messenger = document.getElementById('myMessengerSettings').value;
        const github = document.getElementById('myGithubSettings').value;
        const gmail = document.getElementById('myGmailSettings').value;
        const phone = document.getElementById('myPhoneSettings').value;
        const fileInput = document.getElementById('myAvatarFile');
        const secondaryCol = document.getElementById('mySecondaryColor').value;
        const accentCol = document.getElementById('myAccentColor').value;

        if (!fullName) return customAlert("Full Name is required");

        let avatar = currentUser.avatar;

        if(fileInput && fileInput.files.length > 0) {
            document.getElementById('syncStatus').style.display = "block";
            document.getElementById('syncStatus').innerText = "⏳ Uploading Avatar...";
            try {
                const file = fileInput.files[0];
                const formData = new FormData();
                formData.append("file", file);
                formData.append("upload_preset", "dadevs_preset");
                
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: "POST", body: formData });
                const data = await response.json();
                if (!data.secure_url) throw new Error(data.error?.message || "Cloudinary API Rejected");
                
                avatar = data.secure_url; 
            } catch(e) {
                customAlert("Avatar Upload Failed: " + e.message);
                document.getElementById('syncStatus').innerText = "🔴 Failed";
                return; 
            }
        }

        currentUser.fullName = fullName;
        currentUser.sticker = sticker;
        currentUser.birthday = birthday;
        currentUser.messenger = messenger;
        currentUser.github = github;
        currentUser.gmail = gmail;
        currentUser.phone = phone;
        currentUser.avatar = avatar;
        currentUser.secondary = secondaryCol;
        currentUser.accent = accentCol;
        if (pass) currentUser.pass = pass; 
        
        // Let Admins Edit their own display role securely
        if (isAdmin() && roleStr) {
            currentUser.role = roleStr;
        }
        
        updateUserInDB();
        
        document.documentElement.style.setProperty('--secondary', secondaryCol);
        document.documentElement.style.setProperty('--accent', accentCol);
        
        customAlert("Profile Updated Successfully!", "✅");
        
        // Update header PP immediately
        const mColor = getMemberColor(currentUser.id);
        const ppContainer = document.getElementById("topProfileContainer");
        if(currentUser.avatar) {
            ppContainer.innerHTML = `<img src="${currentUser.avatar}" style="width:100%; height:100%; object-fit:cover; border-radius:50%; border: 2px solid ${mColor};">`;
        } else {
            ppContainer.innerHTML = `<div class="native-avatar" style="width:100%; height:100%; background:${mColor}; border: 2px solid ${mColor}; margin:0;">${userSVG}</div>`;
        }

        loadModule('Profile');
    };

    window.approveMember = function(id) {
        let members = getDB('members'); let m = members.find(x => x.id === id);
        if (m) { m.status = 'approved'; setDB('members', members); loadModule('Profile'); }
    };
    window.rejectMember = function(id) {
        let members = getDB('members'); setDB('members', members.filter(x => x.id !== id)); loadModule('Profile');
    };
    window.removeMember = function(id) {
        customConfirm(`Are you sure you want to permanently revoke ${id}'s access?`, () => {
            let members = getDB('members');
            const idx = members.findIndex(m => m.id === id);
            if(idx > -1) {
                members[idx].status = 'removed';
                setDB('members', members);
                loadModule('Profile');
            }
        });
    };
    
    window.updateMemberRole = function(id, newRole) {
        if (!isAdmin() && sessionStorage.getItem('viewAsViewer') !== 'true') return;
        let members = getDB('members');
        let m = members.find(x => x.id === id);
        if (m) {
            m.role = newRole;
            setDB('members', members);
        }
    }

    // --- MODULE: TIMELINE ---
    window.togglePhase = function(phaseName, elementId) {

        loadModule('Timeline', true); // Re-render to update the chevron text and table display
    }

    function renderTimeline(container) {
        const timeline = getDB('timeline'); 
        const members = getDB('members').filter(m => m.status === 'approved');
        let html = '';
        
        if (isAdmin()) {
            const memberOpts = members.map(m => `<option value="${m.id}">${m.fullName}</option>`).join('');
            const uniquePhases = [...new Set(timeline.map(t => t.phase || 'Phase 1'))];
            const phaseListHtml = uniquePhases.map(f => `<option value="${f}">`).join('');

            html += `
            <div class="glass admin-panel" id="timelineAdminPanel">
                <h4 style="margin-top:0; color:var(--accent)" id="tlFormTitle">Admin: Add Timeline Task</h4>
                <datalist id="phaseOptions">${phaseListHtml}</datalist>
                <div class="flex-row" style="margin-bottom: 10px;">
                    <input id="tlPhase" placeholder="Phase (e.g. Phase 1)" list="phaseOptions" style="flex:1; margin:0;" value="${timeline.length > 0 ? timeline[timeline.length-1].phase || 'Phase 1' : 'Phase 1'}">
                    <input id="tlTitle" placeholder="Task Name" style="flex:2;">
                    <select id="tlOwner" style="flex:1; margin:0;">
                        <option value="" disabled selected>Assign Owner...</option>
                        ${memberOpts}
                        <option value="Team">Team</option>
                    </select>
                    <input id="tlProgress" type="number" min="0" max="100" placeholder="Progress %" style="flex:1;" oninput="
                        const endInput = document.getElementById('tlEnd');
                        if(this.value == 100) { endInput.disabled = false; if(!endInput.value) endInput.value = new Date().toISOString().split('T')[0]; } 
                        else { endInput.disabled = true; endInput.value = ''; }
                    ">
                </div>
                <div class="flex-row">
                    <div style="flex:1; display:flex; flex-direction:column;">
                        <label style="font-size:10px; color:var(--text-muted); margin-bottom:2px;">Start Date</label>
                        <input id="tlStart" type="date" style="margin:0;">
                    </div>
                    <div style="flex:1; display:flex; flex-direction:column;">
                        <label style="font-size:10px; color:var(--text-muted); margin-bottom:2px;">Scheduled Deadline</label>
                        <input id="tlSched" type="date" style="margin:0;">
                    </div>
                    <div style="flex:1; display:flex; flex-direction:column;">
                        <label style="font-size:10px; color:var(--text-muted); margin-bottom:2px;">End Date (Actual)</label>
                        <input id="tlEnd" type="date" style="margin:0;" disabled title="Only editable when progress is 100%">
                    </div>
                    <button id="tlSubmitBtn" onclick="submitTimeline()" style="flex:1; margin-top: 14px;">Add Task</button>
                    <button id="tlCancelBtn" onclick="cancelEditTimeline()" style="flex:0.5; margin-top: 14px; display:none; background:rgba(255,255,255,0.1);">Cancel</button>
                </div>
            </div>`;
        }
        
        html += `<div class="glass card" style="padding-bottom: 5px;"><h3 style="margin-top:0; margin-bottom: 20px;">Project Schedule & Timeline</h3>`;
        if (timeline.length === 0) { 
            html += `<p style="color:var(--text-muted); font-size: 13px;">No timeline data generated by Admin yet.</p></div>`; 
        } else {
            const dates = timeline.flatMap(t => [new Date(t.start).getTime(), new Date(t.scheduled).getTime(), t.end ? new Date(t.end).getTime() : null]).filter(d => d);
            const minDate = Math.min(...dates); let maxDate = Math.max(...dates); let totalSpan = maxDate - minDate;
            if (totalSpan === 0) totalSpan = 86400000; totalSpan = totalSpan * 1.05;

            const phases = [...new Set(timeline.map(t => t.phase || 'Unphased'))];

            html += `<div class="timeline-wrapper">`;
            
            phases.forEach((phaseName, pIdx) => {
                const phaseTasks = timeline.filter(t => (t.phase || 'Unphased') === phaseName);
                
                const isCollapsed = collapsedPhases[phaseName] || false;
                const tableDisplayState = isCollapsed ? 'none' : 'table';
                
                html += `
                <div class="phase-container" style="margin-bottom: 15px;">
                    <div class="phase-header" onclick="togglePhase('${phaseName.replace(/'/g, "\\'")}', 'phase_${pIdx}')">
                        <span>📋 ${phaseName} (${phaseTasks.length} Tasks)</span>
                        <span style="font-size: 12px; color: var(--secondary);">${isCollapsed ? '▼ Show Tasks' : '▲ Hide Tasks'}</span>
                    </div>
                    
                    <div style="overflow-x: auto; margin-bottom: 15px;">
                        <table class="timeline-table" style="display: ${tableDisplayState};">
                            <thead>
                                <tr>
                                    <th style="width: 8%;">ID</th>
                                    <th style="width: 25%;">Task</th>
                                    <th style="width: 5%; text-align:center;">Owner</th>
                                    <th style="width: 10%;">Start</th>
                                    <th style="width: 10%;">Sched</th>
                                    <th style="width: 10%;">Actual</th>
                                    <th style="width: 5%;">Prog</th>
                                    <th style="width: 22%; min-width: 150px;">Gantt</th>
                                    ${isAdmin() ? '<th style="width: 5%;">Act</th>' : ''}
                                </tr>
                            </thead>
                            <tbody>
                `;

                phaseTasks.forEach(t => {
                    const startT = new Date(t.start).getTime(); 
                    const schedT = new Date(t.scheduled).getTime();
                    const endT = t.end ? new Date(t.end).getTime() : schedT; 
                    
                    const leftPerc = ((startT - minDate) / totalSpan) * 100; 
                    let widthPerc = ((endT - startT) / totalSpan) * 100;
                    const schedPerc = ((schedT - minDate) / totalSpan) * 100;
                    if (widthPerc < 2) widthPerc = 2; 
                    
                    const prog = t.progress || 0;
                    const isDone = prog == 100;
                    const isLate = isDone && endT > schedT;
                    const owner = t.owner || 'Team';
                    const oColor = getMemberColor(owner);
                    
                    const ownerObj = members.find(m=>m.id===owner);
                    const ownerName = ownerObj?.id || owner;
                    
                    let avatarHTML = '';
                    if(ownerObj && ownerObj.avatar) {
                        avatarHTML = `<img src="${ownerObj.avatar}" class="avatar-mini" style="border-color:${oColor}">`;
                    } else {
                        avatarHTML = `<div class="native-avatar avatar-mini" style="background:${oColor}; border:none;">${userSVGMini}</div>`;
                    }

                    let barColor = "linear-gradient(90deg, var(--primary), var(--secondary))"; 
                    if (isDone) barColor = isLate ? "linear-gradient(90deg, #ef4444, #b91c1c)" : "linear-gradient(90deg, #10b981, #059669)";
                    
                    const formatSmallDate = (dStr) => dStr ? dStr.substring(5) : '---';

                    html += `
                        <tr>

    window.submitTimeline = function() {
        const phase = document.getElementById('tlPhase').value || 'Phase 1';
        const title = document.getElementById('tlTitle').value; 
        const owner = document.getElementById('tlOwner').value; 
        const start = document.getElementById('tlStart').value; 
        const sched = document.getElementById('tlSched').value;
        const progress = document.getElementById('tlProgress').value || 0;
        const end = document.getElementById('tlEnd').disabled ? "" : document.getElementById('tlEnd').value;
        
        if(!title || !owner || !start || !sched) return customAlert("Fill Task Name, Owner, Start, and Scheduled Dates."); 
        if(progress == 100 && !end) return customAlert("Please provide the Actual End Date for completed tasks.");
        if(end && new Date(start) > new Date(end)) return customAlert("Start date must be before actual end date.");
        
        let tl = getDB('timeline'); 
        
        if (editingTimelineId) {
            const idx = tl.findIndex(t => t.id === editingTimelineId);
            if (idx > -1) {
                tl[idx] = { ...tl[idx], phase, title, owner, start, end: end || null, scheduled: sched, progress: parseInt(progress) };
            }
            editingTimelineId = null;
        } else {
            let maxId = 0;
            tl.forEach(t => {
                if(t.taskId && t.taskId.startsWith('TSK-')) {
                    let num = parseInt(t.taskId.split('-')[1]);
                    if(num > maxId) maxId = num;
                }
            });
            const taskId = `TSK-${(maxId + 1).toString().padStart(3, '0')}`;
            tl.push({ id: generateId(), taskId, phase, title, owner, start, end: end || null, scheduled: sched, progress: parseInt(progress) }); 
        }
        
        setDB('timeline', tl); 
        addNotification(`📋 Timeline Updated: ${title}`);
        loadModule('Timeline');
    }
    
    window.editTimeline = function(id) {
        const tl = getDB('timeline').find(t => t.id === id);
        if(!tl) return;
        
        editingTimelineId = id;
        document.getElementById('tlPhase').value = tl.phase || 'Phase 1';
        document.getElementById('tlTitle').value = tl.title;
        
        const ownerSelect = document.getElementById('tlOwner');
        if([...ownerSelect.options].some(o => o.value === tl.owner)) ownerSelect.value = tl.owner;
        else ownerSelect.value = "Team";
        
        document.getElementById('tlStart').value = tl.start;
        document.getElementById('tlSched').value = tl.scheduled || tl.end || ''; 
        document.getElementById('tlProgress').value = tl.progress || 0;
        
        const endInput = document.getElementById('tlEnd');
        if (tl.progress == 100) { endInput.disabled = false; endInput.value = tl.end || ''; } 
        else { endInput.disabled = true; endInput.value = ''; }
        
        document.getElementById('tlFormTitle').innerText = `Admin: Edit Task ${tl.taskId}`;
        document.getElementById('tlSubmitBtn').innerText = "Update Task";
        document.getElementById('tlCancelBtn').style.display = "block";
        document.getElementById('timelineAdminPanel').scrollIntoView({ behavior: 'smooth' });
    }
    window.cancelEditTimeline = function() { editingTimelineId = null; loadModule('Timeline'); }
    window.deleteTimeline = function(id) { 
        customConfirm("Are you sure you want to delete this task?", () => {
            setDB('timeline', getDB('timeline').filter(t => t.id !== id)); loadModule('Timeline');
        });
    }

    // --- MODULE: CALENDAR ---
    window.showDayEvents = function(dateStr) {
        const manualEvents = getDB('calendar'); 
        const timeline = getDB('timeline');
        const members = getDB('members');
        let dayEvents = [];

        manualEvents.forEach(e => { if(e.date === dateStr) dayEvents.push(e); });
        timeline.forEach(t => { if(t.scheduled === dateStr) dayEvents.push({ title: `Due: ${t.title}`, type: 'timeline-task', owner: t.owner }); });
        
        const [year, month, day] = dateStr.split('-');
        members.forEach(m => {
            if (m.birthday && m.birthday.substring(5) === `${month}-${day}`) {
                dayEvents.push({ title: `🎂 ${m.fullName}'s Bday`, type: 'birthday', owner: m.id });
            }
        });

        if(dayEvents.length === 0) {
            customAlert(`No events or tasks scheduled for ${dateStr}.`, "📅");
            return;
        }

        let msgHtml = `<h4 style="margin: 0 0 10px 0; color: var(--secondary); text-align: left;">📅 ${dateStr}</h4><div style="text-align: left; max-height: 250px; overflow-y: auto; padding-right:5px;">`;
        dayEvents.forEach(e => {
            let color = 'var(--text)';
            if(e.type === 'timeline-task') color = getMemberColor(e.owner);
            if(e.type === 'birthday') color = '#f59e0b';
            msgHtml += `
            <div style="padding: 12px; border-left: 4px solid ${color}; background: var(--card-bg); margin-bottom: 8px; border-radius: 6px;">
                <div style="font-weight:bold; font-size:14px; color: ${color};">${e.title}</div>
                <div style="font-size:10px; color:var(--text-muted); margin-top:4px; text-transform:capitalize;">
                    ${e.type === 'timeline-task' ? 'Task' : e.type} ${e.owner ? `(${e.owner})` : ''}
                </div>
            </div>`;
        });
        msgHtml += `</div>`;
        
        customAlert(msgHtml, "", true); 
    };

    function renderCalendar(container) {
        const manualEvents = getDB('calendar'); 
        const timeline = getDB('timeline');
        const members = getDB('members');
        const currentYear = viewDate.getFullYear();
        
        let allEvents = [...manualEvents];
        
        timeline.forEach(t => {
            if (t.scheduled) {
                allEvents.push({ id: 'tl_' + t.id, title: `Due: ${t.title}`, date: t.scheduled, type: 'timeline-task', owner: t.owner });
            }
        });

        members.forEach(m => {
            if (m.birthday) {
                const bdayMD = m.birthday.substring(5); 
                allEvents.push({ id: 'bday_' + m.id, title: `🎂 ${m.fullName}'s Bday`, date: `${currentYear}-${bdayMD}`, type: 'birthday', owner: m.id });
            }
        });

        let html = '';
        if (isAdmin()) {
            html += `
            <div class="glass admin-panel">
                <h4 style="margin-top:0; color:var(--accent)">Admin: Schedule Manual Event</h4>
                <div class="flex-row">
                    <input id="evTitle" placeholder="Event Title" style="flex:2;">
                    <input id="evDate" type="date" style="flex:1;">
                    <select id="evType" style="flex:1;">
                        <option value="meeting">Meeting</option><option value="overnight">Overnight</option>
                        <option value="defense">Defense</option><option value="other">Other</option>
                    </select>
                    <button onclick="addEvent()" style="flex:1; margin:0;">Schedule</button>
                </div>
            </div>`;
        }

        const currentMonth = viewDate.getMonth(); 
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const monthShortNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        const todayStr = new Date().toISOString().split('T')[0];
        
        const monthEvents = allEvents.filter(e => { const eDate = new Date(e.date); return eDate.getMonth() === currentMonth && eDate.getFullYear() === currentYear; }).sort((a,b) => new Date(a.date) - new Date(b.date));

        html += `
        <div class="grid-3">
            <div class="glass card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                    <h3 style="margin:0;" class="neon">${monthNames[currentMonth]} ${currentYear}</h3>
                    <div style="display:flex; gap: 5px;">
                        <button class="icon-btn" onclick="changeMonth(-1)">&#8592;</button>
                        <button class="icon-btn" onclick="changeMonth(1)">&#8594;</button>
                    </div>
                </div>
                <div class="cal-grid">
                    <div class="cal-header">Sun</div><div class="cal-header">Mon</div><div class="cal-header">Tue</div>
                    <div class="cal-header">Wed</div><div class="cal-header">Thu</div><div class="cal-header">Fri</div><div class="cal-header">Sat</div>`;
        
        for(let i = 0; i < firstDay; i++) { html += `<div class="cal-day empty"></div>`; }
        for(let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isToday = dateStr === todayStr ? 'today' : '';
            const dayEvents = allEvents.filter(e => e.date === dateStr);
            
            let dots = ''; 
            dayEvents.forEach(e => { 
                let style = '';
                if (e.type === 'timeline-task') {
                    let color = getMemberColor(e.owner);
                    style = `background: ${color}; box-shadow: 0 0 5px ${color};`;
                }
                dots += `<div class="cal-event-dot event-${e.type}" style="${style}" title="${e.title}"></div>`; 
            });
            html += `<div class="cal-day active-day ${isToday}" onclick="showDayEvents('${dateStr}')" title="Click to view events"><div style="font-size:14px;">${d}</div><div style="display:flex; gap:3px; flex-wrap:wrap; justify-content:center; width:100%; margin-top:2px;">${dots}</div></div>`;
        }
        
        html += `</div></div>
            <div class="glass card" style="display:flex; flex-direction:column;">
                <h3 style="margin-top:0; color:var(--accent);">Scheduled Events & Deadlines</h3><div style="flex:1; overflow-y:auto; padding-right:5px;">`;
        if(monthEvents.length === 0) { html += `<p style="color:var(--text-muted); font-size:14px; text-align:center;">No events scheduled this month.</p>`; } 
        else {
            monthEvents.forEach(e => {
                let style = '';
                if (e.type === 'timeline-task') {
                    let color = getMemberColor(e.owner);
                    style = `background: ${color}; box-shadow: 0 0 5px ${color};`;
                }
                const isTimeline = e.type === 'timeline-task';
                const isBday = e.type === 'birthday';
                
                let borderCol = 'transparent';
                if(isTimeline) borderCol = getMemberColor(e.owner);
                if(isBday) borderCol = '#f59e0b';
                
                const eDay = parseInt(e.date.split('-')[2]);

                html += `
                <div class="event-list-item" style="display:flex; align-items:center; padding: 12px; background: var(--card-bg); border-radius: 10px; margin-bottom: 10px; border-left: 4px solid ${borderCol}; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor:pointer;" onclick="showDayEvents('${e.date}')">
                    <div style="background: rgba(255,255,255,0.1); border-radius: 6px; padding: 6px; text-align:center; min-width:40px; margin-right:12px;">
                        <div style="font-size:10px; text-transform:uppercase; color: ${borderCol}; font-weight:bold;">${monthShortNames[currentMonth]}</div>
                        <div style="font-size:16px; font-weight:bold; color:var(--text);">${eDay}</div>
                    </div>
                    <div style="flex:1;">
                        <div style="font-weight:bold; font-size:14px; color:var(--text);">${e.title}</div>
                        <div style="font-size:11px; color:var(--text-muted);">${e.date} &bull; <span style="text-transform:capitalize">${isTimeline ? `Timeline (${e.owner})` : e.type}</span></div>
                    </div>
                    ${(isAdmin() && !isTimeline && !isBday) ? `<button class="danger" style="position:relative; width:auto; padding: 4px 8px; margin:0; font-size: 10px;" onclick="event.stopPropagation(); deleteEvent(${e.id})">✖</button>` : ''}
                </div>`;
            });
        }
        html += `</div></div></div>`; container.innerHTML = html;
    }

    function renderFunds(container) {
        const funds = getDB('funds'); 
        const members = getDB('members');
        
        let total = 0, income = 0, expenses = 0;
        let memberTotals = {};
        members.forEach(m => memberTotals[m.id] = 0);
        
        let incomeList = []; let expenseList = [];

        funds.forEach(f => { 
            if(f.type === 'in') { 
                total += f.amount; income += f.amount; 
                incomeList.push(f);
                if (memberTotals[f.contributor] !== undefined) memberTotals[f.contributor] += f.amount;
            } else { 
                total -= f.amount; expenses += f.amount; 
                expenseList.push(f);
            } 
        });

        let html = `
            <div class="stats-grid" style="margin-bottom: 20px;">
                <div class="glass card" style="text-align: center; padding: 15px; margin-bottom:0;">
                    <h3 style="color:var(--text-muted); margin:0 0 5px 0; font-size:12px; text-transform:uppercase;">Total Balance</h3>
                    <h2 class="neon" style="font-size: 28px; margin:0;">₱${total.toLocaleString()}</h2>
                </div>
